name: Release CLI

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party
          key: third-party-cli-macos-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}
          restore-keys: third-party-cli-macos-

      - uses: tecolicom/actions-use-homebrew-tools@v1
        with:
          tools: ninja

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Build pagx (arm64)
        run: node build_pag pagx-cli -a arm64 -i -DPAG_BUILD_CLI=ON -DPAG_BUILD_SHARED=OFF

      - name: Build pagx (x64)
        run: node build_pag pagx-cli -a x64 -i -DPAG_BUILD_CLI=ON -DPAG_BUILD_SHARED=OFF

      - name: Create Universal Binary
        run: |
          lipo -create out/release/mac/arm64/pagx out/release/mac/x64/pagx \
            -output out/release/mac/pagx-universal
          lipo -info out/release/mac/pagx-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagx-darwin
          path: out/release/mac/pagx-universal

      - name: Save Third-Party Cache
        if: steps.third-party-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party
          key: third-party-cli-macos-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party
          key: third-party-cli-linux-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}
          restore-keys: third-party-cli-linux-

      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libxml2-dev libfontconfig1-dev libgles2-mesa-dev libegl1-mesa-dev
          version: 1.1

      - name: Build pagx
        run: node build_pag pagx-cli -a x64 -i -DPAG_BUILD_CLI=ON -DPAG_BUILD_SHARED=OFF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagx-linux
          path: out/release/linux/x64/pagx

      - name: Save Third-Party Cache
        if: steps.third-party-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party
          key: third-party-cli-linux-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Get Third-Party Cache
        id: third-party-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party
          key: third-party-cli-windows-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}
          restore-keys: third-party-cli-windows-

      - uses: seanmiddleditch/gha-setup-ninja@master

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run depsync
        run: |
          npm install depsync -g
          depsync
        shell: bash

      - name: Install LibXml2 via vcpkg
        run: vcpkg install libxml2:x64-windows

      - name: Build pagx
        run: >
          node build_pag pagx-cli -a x64 -i
          -DPAG_BUILD_CLI=ON
          -DPAG_BUILD_SHARED=OFF
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagx-win32
          path: out/release/win/x64/pagx.exe

      - name: Save Third-Party Cache
        if: steps.third-party-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party
          key: third-party-cli-windows-${{ hashFiles('DEPS') }}-${{ hashFiles('vendor.json') }}

  publish:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./cli/npm/package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare npm package
        run: |
          mkdir -p npm-package/bin/darwin npm-package/bin/linux npm-package/bin/win32
          cp pagx-darwin/pagx-universal npm-package/bin/darwin/pagx
          cp pagx-linux/pagx npm-package/bin/linux/pagx
          cp pagx-win32/pagx.exe npm-package/bin/win32/pagx.exe
          chmod +x npm-package/bin/darwin/pagx npm-package/bin/linux/pagx
          cp cli/npm/pagx.js npm-package/bin/pagx.js
          cp cli/npm/package.json npm-package/package.json
          cp cli/npm/README.md npm-package/README.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish ./npm-package --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli/v${{ steps.version.outputs.value }}
          name: pagx CLI v${{ steps.version.outputs.value }}
          body: |
            ## pagx CLI v${{ steps.version.outputs.value }}

            ### Install

            ```bash
            npm install -g @libpag/pagx
            ```

            Or download the binary for your platform from the assets below.
          files: |
            pagx-darwin/pagx-universal
            pagx-linux/pagx
            pagx-win32/pagx.exe
