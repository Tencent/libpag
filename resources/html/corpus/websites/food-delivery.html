              <span className="bg-ink-900 text-white px-1 rounded">02</span>
              <span>:</span>
              <span className="bg-ink-900 text-white px-1 rounded">17</span>
              <span>:</span>
              <span className="bg-ink-900 text-white px-1 rounded">45</span>
            </div>
          </div>
          <div className="flex items-center text-[11px] text-ink-500">
            更多 <Icon.Chevron className="w-3 h-3"/>
          </div>
        </div>
        <div className="mt-3 flex gap-3 overflow-x-auto no-scrollbar">
          {flashItems.map((it, i) => (
            <div key={i} className="shrink-0 w-[92px]">
              <div className="relative">
                <img src={it.img} alt="" className="w-[92px] h-[92px] object-cover rounded-xl"/>
                <Badge className="absolute top-1 left-1 bg-red-500 text-white">秒杀</Badge>
              </div>
              <div className="mt-1.5 text-[11px] text-ink-900 truncate">{it.name}</div>
              <div className="flex items-baseline gap-1 mt-0.5">
                <span className="text-red-500 font-bold text-[14px]">¥{it.price}</span>
                <span className="text-[10px] text-ink-500 line-through">¥{it.old}</span>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function TabsBar() {
  const tabs = ['推荐', '美食', '商超便利', '果蔬', '医药', '鲜花'];
  const [active, setActive] = useState(0);
  return (
    <div className="px-2 mt-3 sticky top-0 z-30">
      <div className="bg-white rounded-full shadow-card px-2 h-10 flex items-center overflow-x-auto no-scrollbar">
        {tabs.map((t, i) => (
          <button key={i} onClick={() => setActive(i)}
            className={cn(
              "shrink-0 px-3 h-7 rounded-full text-[13px] transition",
              active === i ? "bg-ink-900 text-white font-semibold" : "text-ink-700"
            )}>
            {t}
          </button>
        ))}
      </div>
    </div>
  );
}

function FilterPills() {
  const pills = ['综合排序', '距离最近', '配送最快', '品牌商家', '筛选'];
  return (
    <div className="px-2 mt-2 flex gap-1.5 overflow-x-auto no-scrollbar">
      {pills.map((p, i) => (
        <span key={i} className={cn(
          "shrink-0 h-7 px-2.5 rounded-full text-[12px] flex items-center bg-white shadow-sm",
          i === 0 ? "text-ink-900 font-semibold" : "text-ink-700"
        )}>
          {p}
          <Icon.Chevron className="w-2.5 h-2.5 ml-1 rotate-90"/>
        </span>
      ))}
    </div>
  );
}

function ShopCard({ s }) {
  return (
    <Card className="p-3 flex gap-3">
      <div className="relative shrink-0">
        <img src={s.img} className="w-[88px] h-[88px] rounded-xl object-cover" alt=""/>
        <Badge className="absolute top-1 left-1 bg-red-500 text-white">{s.badge}</Badge>
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1">
          <Badge className="bg-ink-900 text-brand">{s.tag}</Badge>
          <h3 className="text-[14px] font-bold text-ink-900 truncate">{s.name}</h3>
        </div>
        <div className="flex items-center gap-1.5 mt-1 text-[11px] text-ink-700">
          <Icon.Star className="w-3 h-3 text-orange-500"/>
          <span className="text-orange-500 font-semibold">{s.rating}</span>
          <span>{s.sold}</span>
          <span className="text-ink-300">|</span>
          <span>{s.distance}</span>
        </div>
        <div className="flex items-center gap-1 mt-1 text-[11px]">
          <span className="text-red-500 font-medium">{s.delivery}</span>
        </div>
        <div className="mt-1.5 flex flex-wrap gap-1">
          {s.discount.map((d, i) => (
            <span key={i} className="text-[10px] text-red-500 border border-red-200 bg-red-50 rounded px-1 py-[1px]">
              {d}
            </span>
          ))}
        </div>
      </div>
    </Card>
  );
}

function ShopList() {
  return (
    <div className="px-2 mt-2 space-y-2 pb-24">
      {shops.map((s, i) => <ShopCard key={i} s={s}/>)}
      <div className="text-center text-[11px] text-ink-500 py-3">— 没有更多了 —</div>
    </div>
  );
}

function TabBar() {
  const items = [
    { name: '首页', icon: Icon.Home,  active: true },
    { name: '订单', icon: Icon.Order, active: false },
    { name: '',     icon: null,        center: true },
    { name: '购物车', icon: Icon.Cart, active: false, badge: 2 },
    { name: '我的',  icon: Icon.Me,   active: false },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 z-40">
      <div className="relative h-[78px] bg-white shadow-tabbar rounded-t-2xl">
        <div className="grid grid-cols-5 h-full pt-1.5 pb-5">
          {items.map((it, i) => {
            if (it.center) {
              return (
                <div key={i} className="flex justify-center">
                  <div className="-mt-6 w-14 h-14 rounded-full bg-gradient-to-br from-brand to-brand-dark shadow-lg flex flex-col items-center justify-center text-ink-900">
                    <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Zm0 2.3 6.5 3.6L12 11.5 5.5 7.9 12 4.3ZM5 9.6l6 3.4v7L5 16.6V9.6Zm14 0v7l-6 3.4v-7l6-3.4Z"/></svg>
                    <span className="text-[10px] font-bold mt-0.5">外卖</span>
                  </div>
                </div>
              );
            }
            const I = it.icon;
            return (
              <button key={i} className={cn(
                "relative flex flex-col items-center justify-center gap-0.5",
                it.active ? "text-accent" : "text-ink-500"
              )}>
                <I className="w-6 h-6"/>
                <span className="text-[10px]">{it.name}</span>
                {it.badge ? (
                  <span className="absolute top-0 right-6 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center">{it.badge}</span>
                ) : null}
              </button>
            );
          })}
        </div>
        {/* home indicator */}
        <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-ink-900 rounded-full"/>
      </div>
    </div>
  );
}

function App() {
  return (
    <div className="phone-frame">
      <div className="notch"/>
      <div className="gradient-header relative min-h-[844px] pb-[90px]">
        <StatusBar/>
        <Header/>
        <Categories/>
        <Banner/>
        <FlashSale/>
        <TabsBar/>
        <FilterPills/>
        <ShopList/>
        <TabBar/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
