<!DOCTYPE html>
<html>
  <head>
    <title>Zhihu</title>
  </head>
  <body style="width: 390px; height: 780px; background-color: #F6F6F6; font-family: PingFang SC; font-size: 14px; color: #1A1A1A;">
    <div style="display: flex; flex-direction: column; width: 100%; height: 100%;">

      <!-- Top bar -->
      <div style="display: flex; flex-direction: row; align-items: center; padding: 10px 16px; background-color: #FFFFFF; gap: 10px;">
        <span style="font-size: 22px; font-weight: bold; color: #0066FF; font-family: 'Times New Roman', serif; letter-spacing: -1px;">知乎</span>
        <div style="flex: 1; display: flex; flex-direction: row; align-items: center; padding: 6px 12px; background-color: #F2F3F5; border-radius: 16px; gap: 6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">
            <circle cx="6" cy="6" r="4.5" fill="none" stroke="#9AA0A6" stroke-width="1.4"/>
            <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#9AA0A6" stroke-width="1.4" stroke-linecap="round"/>

        <!-- Camera icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">

        <span style="font-size: 14px; color: #8590A6;">关注</span>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
          <span style="font-size: 16px; font-weight: bold; color: #1A1A1A;">推荐</span>
          <div style="width: 16px; height: 3px; background-color: #0066FF; border-radius: 1.5px;"></div>
        </div>
        <span style="font-size: 14px; color: #8590A6;">热榜</span>

      <!-- Card 1: Question with image -->

          <span style="font-size: 12px; color: #8590A6;">·</span>
          <span style="font-size: 12px; color: #8590A6;">心理学话题优秀答主</span>
        </div>

        <span style="font-size: 16px; font-weight: bold; color: #1A1A1A; line-height: 22px;">为什么越长大越觉得，独处是一种被低估的能力？</span>

        <div style="display: flex; flex-direction: row; gap: 10px;">
          <span style="flex: 1; font-size: 13px; color: #444444; line-height: 19px;">独处不是孤独，而是与自己和解的过程。在快节奏的生活里，我们习惯用社交、信息填满空白，却忘了真正的成长来源于安静的时刻……</span>
          <div style="width: 90px; height: 68px; border-radius: 4px; overflow: hidden;">
            <img src="images_zhihu/workspace.png" style="width: 90px; height: 68px;"/>

              <path d="M6 1.5 L 10.5 7 L 8 7 L 8 10.5 L 4 10.5 L 4 7 L 1.5 7 Z" fill="#0066FF"/>
            </svg>
            <span style="font-size: 11px; color: #0066FF;">赞同 3.2万</span>
          </div>
          <!-- Comment -->
          <div style="display: flex; flex-direction: row; align-items: center; gap: 4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">
              <path d="M2 3 L 12 3 C 12.5 3 13 3.5 13 4 L 13 9.5 C 13 10 12.5 10.5 12 10.5 L 5.5 10.5 L 3 12.5 L 3 10.5 L 2 10.5 C 1.5 10.5 1 10 1 9.5 L 1 4 C 1 3.5 1.5 3 2 3 Z" fill="none" stroke="#8590A6" stroke-width="1.2"/>

            <span style="font-size: 11px; color: #8590A6;">487 评论</span>
          </div>
          <!-- Share -->
          <div style="display: flex; flex-direction: row; align-items: center; gap: 4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">
              <circle cx="3" cy="7" r="1.8" fill="none" stroke="#8590A6" stroke-width="1.2"/>
              <circle cx="11" cy="3" r="1.8" fill="none" stroke="#8590A6" stroke-width="1.2"/>
              <circle cx="11" cy="11" r="1.8" fill="none" stroke="#8590A6" stroke-width="1.2"/>

              <line x1="4.6" y1="7.8" x2="9.4" y2="10.2" stroke="#8590A6" stroke-width="1.2"/>
            </svg>
            <span style="font-size: 11px; color: #8590A6;">分享</span>

          <div style="flex: 1;"></div>

            <circle cx="7" cy="7" r="1.2" fill="#C8C8C8"/>
            <circle cx="11" cy="7" r="1.2" fill="#C8C8C8"/>
          </svg>
        </div>

      </div>

      <!-- Divider -->
      <div style="width: 100%; height: 6px; background-color: #F6F6F6;"></div>

      <!-- Card 2: Article with cover -->
      <div style="display: flex; flex-direction: column; padding: 12px 16px; background-color: #FFFFFF; gap: 8px;">

        <span style="font-size: 15px; font-weight: bold; color: #1A1A1A; line-height: 21px;">从清晨到日落：我在大理徒步的第七天</span>

              <path d="M6 1.5 L 10.5 7 L 8 7 L 8 10.5 L 4 10.5 L 4 7 L 1.5 7 Z" fill="#0066FF"/>
            </svg>
            <span style="font-size: 11px; color: #0066FF;">赞同 8,964</span>

            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 14 14">

        <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
          <span style="width: 16px; font-size: 14px; font-weight: bold; color: #FF4D4F;">1</span>
          <span style="flex: 1; font-size: 13px; color: #1A1A1A;">如何看待年轻人流行"反向旅游"现象？</span>
          <div style="padding: 1px 5px; background-color: #FFF1F0; border-radius: 3px;">
            <span style="font-size: 10px; color: #FF7A45;">沸</span>

        </div>

        <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
          <span style="width: 16px; font-size: 14px; font-weight: bold; color: #FF7A45;">2</span>
          <span style="flex: 1; font-size: 13px; color: #1A1A1A;">读完一本好书后那种"怅然若失"是什么？</span>
          <div style="padding: 1px 5px; background-color: #FFF1F0; border-radius: 3px;">
            <span style="font-size: 10px; color: #FF4D4F;">热</span>
          </div>
        </div>

        <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
          <span style="width: 16px; font-size: 14px; font-weight: bold; color: #FFA940;">3</span>
          <span style="flex: 1; font-size: 13px; color: #1A1A1A;">为什么有些人的"松弛感"很自然？</span>
          <div style="padding: 1px 5px; background-color: #F2F8FF; border-radius: 3px;">
            <span style="font-size: 10px; color: #0066FF;">新</span>
          </div>
        </div>

      </div>

      <!-- Bottom Tab bar -->
      <div style="display: flex; flex-direction: row; align-items: center; height: 56px; background-color: #FFFFFF;">
        <!-- Home -->
        <div style="display: flex; flex-direction: column; flex: 1; align-items: center; gap: 3px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
            <path d="M11 2 L 2 10 L 4 10 L 4 19 L 9 19 L 9 13 L 13 13 L 13 19 L 18 19 L 18 10 L 20 10 Z" fill="#0066FF"/>

            <rect x="3" y="5" width="16" height="12" rx="2" fill="none" stroke="#8590A6" stroke-width="1.5"/>

            <circle cx="11" cy="11" r="8" fill="none" stroke="#8590A6" stroke-width="1.5"/>
            <path d="M14.5 7.5 L 12 12 L 7.5 14.5 L 10 10 Z" fill="#8590A6"/>
          </svg>
          <span style="font-size: 10px; color: #8590A6;">发现</span>
        </div>
        <!-- Message -->
        <div style="display: flex; flex-direction: column; flex: 1; align-items: center; gap: 3px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
            <path d="M11 3 C 6 3 2.5 6 2.5 9.7 C 2.5 12 4 14 6.3 15 L 5.5 18.5 L 9.2 16.3 C 9.8 16.4 10.4 16.4 11 16.4 C 16 16.4 19.5 13.4 19.5 9.7 C 19.5 6 16 3 11 3 Z" fill="none" stroke="#8590A6" stroke-width="1.5"/>
