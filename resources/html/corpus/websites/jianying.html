<!DOCTYPE html>
<html>
  <head>
    <title>JianYing Home</title>
  </head>
  <body style="width: 375px; height: 812px; background-color: #0B0B0F; font-family: PingFang SC; color: #FFFFFF;">

    <!-- Root vertical container -->
    <div style="display: flex; flex-direction: column; width: 100%; height: 100%;">

      <!-- ===== Status bar ===== -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 14px 20px 6px 20px; height: 44px;">
        <span style="font-size: 15px; font-weight: bold; color: #FFFFFF;">9:41</span>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
          <!-- signal bars -->
          <div style="display: flex; flex-direction: row; align-items: flex-end; gap: 2px;">
            <div style="width: 3px; height: 4px; background-color: #FFFFFF; border-radius: 1px;"></div>
            <div style="width: 3px; height: 6px; background-color: #FFFFFF; border-radius: 1px;"></div>
            <div style="width: 3px; height: 8px; background-color: #FFFFFF; border-radius: 1px;"></div>
            <div style="width: 3px; height: 10px; background-color: #FFFFFF; border-radius: 1px;"></div>
          </div>
          <!-- battery -->
          <div style="display: flex; flex-direction: row; align-items: center; gap: 1px;">
            <div style="width: 22px; height: 11px; border-radius: 3px; background-color: #FFFFFF;"></div>
            <div style="width: 2px; height: 5px; background-color: #FFFFFF; border-radius: 1px;"></div>
          </div>
        </div>
      </div>

      <!-- ===== Top nav ===== -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 6px 20px 6px 20px;">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 22px;">
          <span style="font-size: 18px; color: #FFFFFF; font-weight: bold;">创作</span>
          <span style="font-size: 16px; color: #8A8A93;">模板</span>
          <span style="font-size: 16px; color: #8A8A93;">消息</span>
          <span style="font-size: 16px; color: #8A8A93;">我</span>
        </div>
        <div style="width: 32px; height: 32px; border-radius: 16px; overflow: hidden;">
          <img src="images_jianying/avatar.png" style="width: 100%; height: 100%;"/>
        </div>
      </div>

      <!-- ===== Search bar ===== -->
      <div style="padding: 8px 16px 8px 16px;">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; height: 38px; padding: 0 14px 0 14px; background-color: #1B1B22; border-radius: 19px;">
          <!-- search icon: ring + handle -->
          <div style="width: 14px; height: 14px; border-radius: 7px; border: 1.5px solid #8A8A93;"></div>
          <span style="font-size: 13px; color: #8A8A93;">搜索你想要的视频灵感</span>
        </div>
      </div>

      <!-- ===== Primary CTA - 开始创作 ===== -->
      <div style="padding: 4px 16px 4px 16px;">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 12px; padding: 14px 18px 14px 18px; background-image: linear-gradient(135deg, #2C7CFE 0%, #7B5BFF 60%, #C24BFF 100%); border-radius: 16px;">
          <div style="width: 42px; height: 42px; border-radius: 14px; background-color: #FFFFFF33; display: flex; flex-direction: row; align-items: center; justify-content: center;">
            <div style="width: 18px; height: 14px; border-radius: 3px; border: 2px solid #FFFFFF;"></div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
            <span style="font-size: 16px; font-weight: bold; color: #FFFFFF;">开始创作</span>
            <span style="font-size: 12px; color: #FFFFFFCC;">导入素材开始你的剪辑之旅</span>
          </div>
          <div style="width: 24px; height: 24px; border-radius: 12px; background-color: #FFFFFF33;"></div>
        </div>
      </div>

      <!-- ===== Quick entries grid (single row of 4) ===== -->
      <div style="display: flex; flex-direction: row; align-items: center; padding: 12px 8px 6px 8px;">
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <div style="width: 46px; height: 46px; border-radius: 14px; background-color: #1B1B22; display: flex; flex-direction: row; align-items: center; justify-content: center;">
            <div style="width: 22px; height: 16px; border-radius: 3px; border: 2px solid #4DB8FF;"></div>
          </div>
          <span style="font-size: 11px; color: #DADADF;">剪同款</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <div style="width: 46px; height: 46px; border-radius: 14px; background-color: #1B1B22; display: flex; flex-direction: row; align-items: center; justify-content: center;">
            <div style="width: 22px; height: 18px; border-radius: 4px; background-color: #FFB84D;"></div>
          </div>
          <span style="font-size: 11px; color: #DADADF;">拍摄</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <div style="width: 46px; height: 46px; border-radius: 14px; background-color: #1B1B22; display: flex; flex-direction: row; align-items: center; justify-content: center;">
            <div style="width: 20px; height: 22px; border-radius: 3px; border: 2px solid #FF6B9A;"></div>
          </div>
          <span style="font-size: 11px; color: #DADADF;">图文成片</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;">
          <div style="width: 46px; height: 46px; border-radius: 14px; background-color: #1B1B22; display: flex; flex-direction: row; align-items: center; justify-content: center;">
            <div style="width: 22px; height: 22px; border-radius: 11px; background-color: #B07BFF;"></div>
          </div>
          <span style="font-size: 11px; color: #DADADF;">AI作图</span>
        </div>
      </div>

      <!-- ===== Section title ===== -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 10px 20px 6px 20px;">
        <span style="font-size: 16px; font-weight: bold; color: #FFFFFF;">推荐模板</span>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 4px;">
          <span style="font-size: 12px; color: #8A8A93;">查看更多</span>
          <div style="width: 6px; height: 6px; border-top: 1.4px solid #8A8A93; border-right: 1.4px solid #8A8A93;"></div>
        </div>
      </div>

      <!-- ===== Template grid (2 columns) ===== -->
      <div style="display: flex; flex-direction: row; padding: 0 12px 0 12px; gap: 10px; flex: 1;">
        <!-- col 1 -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
          <!-- card 1 -->
          <div style="width: 100%; height: 168px; border-radius: 12px; overflow: hidden; background-color: #1B1B22;">
            <img src="images_jianying/tpl1.png" style="width: 100%; height: 100%;"/>
          </div>
          <!-- card 1 caption -->
          <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 4px 0 4px;">
            <span style="font-size: 12px; color: #FFFFFF; font-weight: bold;">街拍卡点</span>
            <span style="font-size: 10px; color: #8A8A93;">128.5w</span>
          </div>
          <!-- card 3 -->
          <div style="width: 100%; height: 148px; border-radius: 12px; overflow: hidden; background-color: #1B1B22;">
            <img src="images_jianying/tpl3.png" style="width: 100%; height: 100%;"/>
          </div>
          <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 4px 0 4px;">
            <span style="font-size: 12px; color: #FFFFFF; font-weight: bold;">萌宠日常</span>
            <span style="font-size: 10px; color: #8A8A93;">56.3w</span>
          </div>
        </div>
        <!-- col 2 -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
          <!-- card 2 -->
          <div style="width: 100%; height: 148px; border-radius: 12px; overflow: hidden; background-color: #1B1B22;">
            <img src="images_jianying/tpl2.png" style="width: 100%; height: 100%;"/>
          </div>
          <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 4px 0 4px;">
            <span style="font-size: 12px; color: #FFFFFF; font-weight: bold;">美食日记</span>
            <span style="font-size: 10px; color: #8A8A93;">89.1w</span>
          </div>
          <!-- card 4 -->
          <div style="width: 100%; height: 168px; border-radius: 12px; overflow: hidden; background-color: #1B1B22;">
            <img src="images_jianying/tpl4.png" style="width: 100%; height: 100%;"/>
          </div>
          <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 4px 0 4px;">
            <span style="font-size: 12px; color: #FFFFFF; font-weight: bold;">旅行vlog</span>
            <span style="font-size: 10px; color: #8A8A93;">42.7w</span>
          </div>
        </div>
      </div>

      <!-- ===== Bottom Tab bar ===== -->
      <div style="height: 70px; background-color: #131319; display: flex; flex-direction: row; align-items: center; padding: 6px 4px 16px 4px;">
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 22px; height: 18px; border-radius: 2px; background-color: #FFFFFF;"></div>
          <span style="font-size: 10px; color: #FFFFFF; font-weight: bold;">首页</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 22px; height: 18px; border-radius: 3px; border: 1.6px solid #8A8A93;"></div>
          <span style="font-size: 10px; color: #8A8A93;">剪同款</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0;">
          <div style="width: 44px; height: 32px; border-radius: 8px; background-image: linear-gradient(135deg, #2C7CFE 0%, #C24BFF 100%);"></div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 22px; height: 18px; border-radius: 6px; border: 1.6px solid #8A8A93;"></div>
          <span style="font-size: 10px; color: #8A8A93;">消息</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 18px; height: 18px; border-radius: 9px; border: 1.6px solid #8A8A93;"></div>
          <span style="font-size: 10px; color: #8A8A93;">我的</span>
        </div>
      </div>

    </div>
  </body>
</html>
