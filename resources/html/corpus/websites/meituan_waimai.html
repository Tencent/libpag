<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>美团外卖</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            DEFAULT: '#FFD100',
            dark: '#FFC400',
          },
          accent: '#FF6B00',
          ink: {
            900: '#0F1115',
            700: '#3A3F47',
            500: '#6B7280',
            300: '#C9CDD4',
            100: '#F2F3F5',
          },
        },
        boxShadow: {
          card: '0 4px 16px rgba(15,17,21,0.06)',
          tabbar: '0 -4px 16px rgba(15,17,21,0.06)',
        },
      }

<style>
  html, body { background: #F2F3F5; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
  /* hide scrollbar for horizontal lists */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  /* phone frame */
  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: #F2F3F5;
    border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 10px #111 inset, 0 0 0 12px #222;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #111;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 18px;
    z-index: 50;
  }
  .gradient-header {
    background: linear-gradient(180deg, #FFD100 0%, #FFDD3C 50%, #F2F3F5 100%);
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center py-8">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ---------- shadcn-style primitives ---------- */
const cn = (...c) => c.filter(Boolean).join(' ');

const Card = ({ className, children, ...p }) => (
  <div className={cn("bg-white rounded-2xl shadow-card", className)} {...p}>{children}</div>
);

const Badge = ({ className, children }) => (
  <span className={cn("inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold", className)}>{children}</span>
);

const Button = ({ className, children, ...p }) => (
  <button className={cn("inline-flex items-center justify-center rounded-full font-medium transition active:scale-95", className)} {...p}>{children}</button>
);

const Avatar = ({ src, alt, className }) => (
  <img src={src} alt={alt} className={cn("rounded-full object-cover", className)} />
);

/* ---------- icons (inline SVG) ---------- */
const Icon = {
  Search:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  Pin:     (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z"/></svg>,
  Chevron: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" {...p}><path d="m9 6 6 6-6 6"/></svg>,
  Bell:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>,
  Scan:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3"/><path d="M3 12h18"/></svg>,
  Home:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg>,
  Order:   (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>,
  Cart:    (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M3 4h2l2.4 12.3a2 2 0 0 0 2 1.7h7.5a2 2 0 0 0 2-1.5L21 8H6"/><circle cx="9" cy="21" r="1.5"/><circle cx="18" cy="21" r="1.5"/></svg>,
  Me:      (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>,
  Star:    (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="m12 17.3-6.18 3.7 1.64-7.03L2 9.24l7.19-.62L12 2l2.81 6.62L22 9.24l-5.46 4.73L18.18 21z"/></svg>,
  Clock:   (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  Plus:    (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>,
  Mic:     (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>,
};

/* ---------- data ---------- */
const categories = [
  { name: '美食',   color: 'from-orange-400 to-red-500',  emoji: '🍜' },
  { name: '甜点饮品', color: 'from-pink-400 to-rose-500',  emoji: '🧋' },
  { name: '汉堡披萨', color: 'from-amber-400 to-orange-500', emoji: '🍔' },
  { name: '商店超市', color: 'from-emerald-400 to-green-500', emoji: '🛒' },
  { name: '水果蔬菜', color: 'from-lime-400 to-green-500',  emoji: '🍎' },
  { name: '药品健康', color: 'from-sky-400 to-blue-500',    emoji: '💊' },
  { name: '鲜花绿植', color: 'from-fuchsia-400 to-pink-500', emoji: '💐' },
  { name: '跑腿代购', color: 'from-violet-400 to-purple-500', emoji: '🛵' },
  { name: '夜宵',   color: 'from-indigo-400 to-blue-600',  emoji: '🍢' },
  { name: '全部分类', color: 'from-zinc-300 to-zinc-400',    emoji: '⋯' },
];

const flashItems = [
  { name: '霸王茶姬·伯牙绝弦', price: 12.9, old: 19, img: 'https://images.unsplash.com/photo-1558857563-c0c6ee6ff8a3?w=300&q=80' },
  { name: '麦当劳·麦辣鸡腿堡',  price: 14.5, old: 22, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&q=80' },
  { name: '瑞幸·生椰拿铁',     price: 9.9,  old: 19, img: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=300&q=80' },
  { name: '塔斯汀·中国汉堡',   price: 13.8, old: 21, img: 'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=300&q=80' },
];

const shops = [
  {
    name: '海底捞外送·人民广场店',
    tag: '品牌',
    rating: 4.9, sold: '月售10000+',
    delivery: '免配送费 · 35分钟',
    distance: '1.2km',
    discount: ['满60减20', '满120减35', '新客立减15'],
    img: 'https://images.unsplash.com/photo-1552566626-52f8b828add9?w=400&q=80',
    badge: '神价',
  },
  {
    name: '霸王茶姬·南京东路店',
    tag: '人气',
    rating: 4.8, sold: '月售8000+',
    delivery: '配送¥2 · 28分钟',
    distance: '0.6km',
    discount: ['第二杯半价', '满30减5'],
    img: 'https://images.unsplash.com/photo-1544787219-7f47ccb76574?w=400&q=80',
    badge: '直营',
  },
  {
    name: '老乡鸡·中式快餐',
    tag: '招牌',
    rating: 4.7, sold: '月售6000+',
    delivery: '免配送费 · 32分钟',
    distance: '0.9km',
    discount: ['满25减5', '满40减10'],
    img: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80',
    badge: '招牌',
  },
  {
    name: '麦当劳·静安店',
    tag: '品牌',
    rating: 4.9, sold: '月售20000+',
    delivery: '配送¥3 · 25分钟',
    distance: '0.4km',
    discount: ['会员日5折', '免运费'],
    img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=400&q=80',
    badge: '24h',
  },
];

/* ---------- sections ---------- */
function StatusBar() {
  return (
    <div className="relative h-11 px-7 flex items-center justify-between text-[14px] font-semibold text-ink-900 z-40">
      <span>9:41</span>
      <div className="flex items-center gap-1">
        {/* signal */}
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
        {/* wifi */}
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.5a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm-3.4-3.4a4.8 4.8 0 0 1 6.8 0l1.6-1.6a7 7 0 0 0-10 0l1.6 1.6ZM1.4 5a9.3 9.3 0 0 1 13.2 0L16 3.6a11.4 11.4 0 0 0-16 0L1.4 5Z"/></svg>
        {/* battery */}
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </div>
    </div>
  );
}

function Header() {
  return (
    <div className="px-4 pt-1 pb-2 text-ink-900">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-1 max-w-[60%]">
          <Icon.Pin className="w-5 h-5 text-ink-900"/>
          <div className="leading-tight">
            <div className="text-[15px] font-bold truncate">上海·世纪大道地铁站</div>
            <div className="text-[11px] text-ink-700 truncate">浦东新区世纪大道100号 · 环球金融中心</div>
          </div>
          <Icon.Chevron className="w-3.5 h-3.5 mt-0.5 text-ink-900"/>
        </div>
        <div className="flex items-center gap-3">
          <Icon.Scan className="w-5 h-5"/>
          <div className="relative">
            <Icon.Bell className="w-5 h-5"/>
            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] rounded-full w-3.5 h-3.5 flex items-center justify-center">3</span>
          </div>
        </div>
      </div>
      {/* search */}
      <div className="mt-3 bg-white rounded-full px-3 h-10 flex items-center shadow-card">
        <Icon.Search className="w-4 h-4 text-ink-500"/>
        <div className="flex-1 px-2 text-[13px] text-ink-500 truncate">
          <span className="text-red-500 font-medium mr-1">[神券]</span>霸王茶姬 伯牙绝弦 第二杯半价
        </div>
        <Icon.Mic className="w-4 h-4 text-ink-500 mr-2"/>
        <Button className="bg-ink-900 text-white text-[12px] px-3.5 h-7">搜索</Button>
      </div>
    </div>
  );
}

function Categories() {
  return (
    <div className="px-2 mt-2">
      <Card className="px-2 py-3">
        <div className="grid grid-cols-5 gap-y-3">
          {categories.map((c, i) => (
            <div key={i} className="flex flex-col items-center gap-1">
              <div className={cn("w-12 h-12 rounded-2xl bg-gradient-to-br flex items-center justify-center text-2xl shadow-sm", c.color)}>
                <span>{c.emoji}</span>
              </div>
              <span className="text-[11px] text-ink-900">{c.name}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function Banner() {
  return (
    <div className="px-2 mt-2 grid grid-cols-2 gap-2">
      <Card className="p-3 bg-gradient-to-br from-red-500 to-orange-500 text-white">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-[11px] opacity-90">百亿补贴</div>
            <div className="text-[15px] font-bold leading-tight mt-0.5">爆款直降</div>
            <div className="text-[10px] mt-0.5 bg-white/20 inline-block px-1.5 py-0.5 rounded">最高立减¥30</div>
          </div>
          <div className="text-3xl">🔥</div>
        </div>
      </Card>
      <Card className="p-3 bg-gradient-to-br from-violet-500 to-fuchsia-500 text-white">
        <div className="flex items-center justify-between">
          <div>
            <div className="text-[11px] opacity-90">会员日</div>
            <div className="text-[15px] font-bold leading-tight mt-0.5">88VIP立减</div>
            <div className="text-[10px] mt-0.5 bg-white/20 inline-block px-1.5 py-0.5 rounded">每周三专享</div>
          </div>
          <div className="text-3xl">👑</div>
        </div>
      </Card>
    </div>
  );
}

function FlashSale() {
  return (
    <div className="px-2 mt-2">
      <Card className="p-3">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="px-2 py-0.5 rounded bg-gradient-to-r from-red-500 to-orange-500 text-white text-[12px] font-bold">限时秒杀</div>
            <div className="flex items-center gap-1 text-[11px] text-ink-700">
              <Icon.Clock className="w-3.5 h-3.5"/>
              <span>距结束</span>
              <span className="bg-ink-900 text-white px-1 rounded">02</span>
              <span>:</span>
              <span className="bg-ink-900 text-white px-1 rounded">17</span>
              <span>:</span>
              <span className="bg-ink-900 text-white px-1 rounded">45</span>
            </div>
          </div>
          <div className="flex items-center text-[11px] text-ink-500">
            更多 <Icon.Chevron className="w-3 h-3"/>
          </div>
        </div>
        <div className="mt-3 flex gap-3 overflow-x-auto no-scrollbar">
          {flashItems.map((it, i) => (
            <div key={i} className="shrink-0 w-[92px]">
              <div className="relative">
                <img src={it.img} alt="" className="w-[92px] h-[92px] object-cover rounded-xl"/>
                <Badge className="absolute top-1 left-1 bg-red-500 text-white">秒杀</Badge>
              </div>
              <div className="mt-1.5 text-[11px] text-ink-900 truncate">{it.name}</div>
              <div className="flex items-baseline gap-1 mt-0.5">
                <span className="text-red-500 font-bold text-[14px]">¥{it.price}</span>
                <span className="text-[10px] text-ink-500 line-through">¥{it.old}</span>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function TabsBar() {
  const tabs = ['推荐', '美食', '商超便利', '果蔬', '医药', '鲜花'];
  const [active, setActive] = useState(0);
  return (
    <div className="px-2 mt-3 sticky top-0 z-30">
      <div className="bg-white rounded-full shadow-card px-2 h-10 flex items-center overflow-x-auto no-scrollbar">
        {tabs.map((t, i) => (
          <button key={i} onClick={() => setActive(i)}
            className={cn(
              "shrink-0 px-3 h-7 rounded-full text-[13px] transition",
              active === i ? "bg-ink-900 text-white font-semibold" : "text-ink-700"
            )}>
            {t}
          </button>
        ))}
      </div>
    </div>
  );
}

function FilterPills() {
  const pills = ['综合排序', '距离最近', '配送最快', '品牌商家', '筛选'];
  return (
    <div className="px-2 mt-2 flex gap-1.5 overflow-x-auto no-scrollbar">
      {pills.map((p, i) => (
        <span key={i} className={cn(
          "shrink-0 h-7 px-2.5 rounded-full text-[12px] flex items-center bg-white shadow-sm",
          i === 0 ? "text-ink-900 font-semibold" : "text-ink-700"
        )}>
          {p}
          <Icon.Chevron className="w-2.5 h-2.5 ml-1 rotate-90"/>
        </span>
      ))}
    </div>
  );
}

function ShopCard({ s }) {
  return (
    <Card className="p-3 flex gap-3">
      <div className="relative shrink-0">
        <img src={s.img} className="w-[88px] h-[88px] rounded-xl object-cover" alt=""/>
        <Badge className="absolute top-1 left-1 bg-red-500 text-white">{s.badge}</Badge>
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1">
          <Badge className="bg-ink-900 text-brand">{s.tag}</Badge>
          <h3 className="text-[14px] font-bold text-ink-900 truncate">{s.name}</h3>
        </div>
        <div className="flex items-center gap-1.5 mt-1 text-[11px] text-ink-700">
          <Icon.Star className="w-3 h-3 text-orange-500"/>
          <span className="text-orange-500 font-semibold">{s.rating}</span>
          <span>{s.sold}</span>
          <span className="text-ink-300">|</span>
          <span>{s.distance}</span>
        </div>
        <div className="flex items-center gap-1 mt-1 text-[11px]">
          <span className="text-red-500 font-medium">{s.delivery}</span>
        </div>
        <div className="mt-1.5 flex flex-wrap gap-1">
          {s.discount.map((d, i) => (
            <span key={i} className="text-[10px] text-red-500 border border-red-200 bg-red-50 rounded px-1 py-[1px]">
              {d}
            </span>
          ))}
        </div>
      </div>
    </Card>
  );
}

function ShopList() {
  return (
    <div className="px-2 mt-2 space-y-2 pb-24">
      {shops.map((s, i) => <ShopCard key={i} s={s}/>)}
      <div className="text-center text-[11px] text-ink-500 py-3">— 没有更多了 —</div>
    </div>
  );
}

function TabBar() {
  const items = [
    { name: '首页', icon: Icon.Home,  active: true },
    { name: '订单', icon: Icon.Order, active: false },
    { name: '',     icon: null,        center: true },
    { name: '购物车', icon: Icon.Cart, active: false, badge: 2 },
    { name: '我的',  icon: Icon.Me,   active: false },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 z-40">
      <div className="relative h-[78px] bg-white shadow-tabbar rounded-t-2xl">
        <div className="grid grid-cols-5 h-full pt-1.5 pb-5">
          {items.map((it, i) => {
            if (it.center) {
              return (
                <div key={i} className="flex justify-center">
                  <div className="-mt-6 w-14 h-14 rounded-full bg-gradient-to-br from-brand to-brand-dark shadow-lg flex flex-col items-center justify-center text-ink-900">
                    <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Zm0 2.3 6.5 3.6L12 11.5 5.5 7.9 12 4.3ZM5 9.6l6 3.4v7L5 16.6V9.6Zm14 0v7l-6 3.4v-7l6-3.4Z"/></svg>
                    <span className="text-[10px] font-bold mt-0.5">外卖</span>
                  </div>
                </div>
              );
            }
            const I = it.icon;
            return (
              <button key={i} className={cn(
                "relative flex flex-col items-center justify-center gap-0.5",
                it.active ? "text-accent" : "text-ink-500"
              )}>
                <I className="w-6 h-6"/>
                <span className="text-[10px]">{it.name}</span>
                {it.badge ? (
                  <span className="absolute top-0 right-6 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center">{it.badge}</span>
                ) : null}
              </button>
            );
          })}
        </div>
        {/* home indicator */}
        <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-ink-900 rounded-full"/>
      </div>
    </div>
  );
}

function App() {
  return (
    <div className="phone-frame">
      <div className="notch"/>
      <div className="gradient-header relative min-h-[844px] pb-[90px]">
        <StatusBar/>
        <Header/>
        <Categories/>
        <Banner/>
        <FlashSale/>
        <TabsBar/>
        <FilterPills/>
        <ShopList/>
        <TabBar/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
