<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          border: "hsl(220 13% 91%)",
          input: "hsl(220 13% 91%)",
          ring: "hsl(262 83% 58%)",
          background: "hsl(0 0% 100%)",
          foreground: "hsl(222 47% 11%)",
          primary: {
            DEFAULT: "hsl(262 83% 58%)",
            foreground: "hsl(0 0% 100%)",
          },
          secondary: {
            DEFAULT: "hsl(220 14% 96%)",
            foreground: "hsl(222 47% 11%)",
          },
          muted: {
            DEFAULT: "hsl(220 14% 96%)",
            foreground: "hsl(220 9% 46%)",
          },
          accent: {
            DEFAULT: "hsl(220 14% 96%)",
            foreground: "hsl(222 47% 11%)",
          },
          aria: {
            purple: "#615CED",
            blue: "#3B82F6",
            gradient1: "#615CED",
            gradient2: "#8B5CF6",
          }
        },
        borderRadius: {
          lg: "0.75rem",
          md: "0.5rem",
          sm: "0.375rem",
        },
        animation: {
          'fade-in': 'fadeIn 0.3s ease-in-out',
          'slide-up': 'slideUp 0.4s ease-out',
        },
        keyframes: {
          fadeIn: {
            '0%': { opacity: '0' },
            '100%': { opacity: '1' },
          },
          slideUp: {
            '0%': { opacity: '0', transform: 'translateY(10px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
        },
      },
    },
  };
</script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  .aria-gradient {
    background: linear-gradient(135deg, #615CED 0%, #8B5CF6 50%, #EC4899 100%);

  .aria-gradient-text {
    background: linear-gradient(135deg, #615CED 0%, #8B5CF6 50%, #EC4899 100%);

  .glass-card {
    background: rgba(255, 255, 255, 0.7);

    -webkit-backdrop-filter: blur(10px);

</head>
<body class="bg-gradient-to-br from-slate-50 via-purple-50/30 to-blue-50/30 min-h-screen">

<script type="text/babel">

    globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,

    arrowUp: <><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></>,

  return (

         strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>

};

// ===== shadcn-style Button =====
const Button = ({ children, variant = "default", size = "default", className = "", ...props }) => {
  const variants = {
    default: "bg-primary text-primary-foreground hover:bg-primary/90",
    ghost: "hover:bg-accent hover:text-accent-foreground",
    outline: "border border-border bg-background hover:bg-accent hover:text-accent-foreground",
    secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
  };
  const sizes = {
    default: "h-10 px-4 py-2",
    sm: "h-8 px-3 text-sm",
    icon: "h-9 w-9",
    iconSm: "h-7 w-7",
  };
  return (
    <button
      className={`inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:opacity-50 disabled:pointer-events-none ${variants[variant]} ${sizes[size]} ${className}`}
      {...props}
    >
      {children}
    </button>
  );
};

// ===== Avatar =====
const Avatar = ({ children, className = "" }) => (
  <div className={`relative flex shrink-0 overflow-hidden rounded-full ${className}`}>{children}</div>
);

// ===== Sidebar =====
const Sidebar = ({ collapsed, onToggle, conversations, activeId, setActiveId, onNew }) => {
  return (
    <aside className={`${collapsed ? "w-0 -ml-72" : "w-72"} transition-all duration-300 bg-white/60 backdrop-blur-xl border-r border-slate-200/60 flex flex-col h-screen overflow-hidden`}>
      <div className="p-3 flex flex-col gap-2 border-b border-slate-200/60">
        <div className="flex items-center justify-between mb-1">
          <div className="flex items-center gap-2 px-2">
            <div className="w-8 h-8 rounded-lg aria-gradient flex items-center justify-center">
              <Icon name="sparkles" className="w-5 h-5 text-white" />
            </div>
            <span className="font-bold text-base text-slate-800">智言助手</span>
          </div>
          <Button variant="ghost" size="iconSm" onClick={onToggle} className="text-slate-600">
            <Icon name="menu" className="w-4 h-4" />
          </Button>
        </div>
        <Button onClick={onNew} className="w-full justify-start gap-2 aria-gradient text-white hover:opacity-90 shadow-md shadow-purple-500/20" size="default">
          <Icon name="plus" className="w-4 h-4" />
          <span>新建对话</span>
        </Button>
        <div className="relative mt-1">
          <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
          <input
            type="text"
            placeholder="搜索历史对话"
            className="w-full h-9 pl-9 pr-3 rounded-md bg-slate-100/80 border border-transparent focus:bg-white focus:border-slate-200 outline-none text-sm placeholder:text-slate-400"
          />
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-2 py-3">
        <div className="text-xs font-medium text-slate-500 px-3 py-2">今天</div>
        {conversations.filter(c => c.group === "today").map(c => (
          <ConvItem key={c.id} conv={c} active={c.id === activeId} onClick={() => setActiveId(c.id)} />
        ))}
        <div className="text-xs font-medium text-slate-500 px-3 py-2 mt-2">7 天内</div>
        {conversations.filter(c => c.group === "week").map(c => (
          <ConvItem key={c.id} conv={c} active={c.id === activeId} onClick={() => setActiveId(c.id)} />
        ))}
        <div className="text-xs font-medium text-slate-500 px-3 py-2 mt-2">30 天内</div>
        {conversations.filter(c => c.group === "month").map(c => (
          <ConvItem key={c.id} conv={c} active={c.id === activeId} onClick={() => setActiveId(c.id)} />
        ))}
      </div>

      <div className="border-t border-slate-200/60 p-3 space-y-1">
        <button className="w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-slate-100 transition-colors text-sm text-slate-700">
          <Icon name="palette" className="w-4 h-4" />
          <span>智能体广场</span>
          <span className="ml-auto text-[10px] px-1.5 py-0.5 rounded bg-purple-100 text-purple-600 font-medium">NEW</span>
        </button>
        <button className="w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-slate-100 transition-colors text-sm text-slate-700">
          <Icon name="book" className="w-4 h-4" />
          <span>我的知识库</span>
        </button>
        <div className="flex items-center gap-3 px-2 py-2 mt-1 rounded-md hover:bg-slate-100 transition-colors cursor-pointer">
          <Avatar className="w-8 h-8">
            <div className="w-full h-full aria-gradient flex items-center justify-center text-white text-xs font-bold">Y</div>
          </Avatar>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-medium text-slate-800 truncate">Yucong</div>
            <div className="text-xs text-slate-500 truncate">Plus 会员</div>
          </div>
          <Icon name="settings" className="w-4 h-4 text-slate-400" />
        </div>
      </div>
    </aside>
  );
};

const ConvItem = ({ conv, active, onClick }) => (
  <button
    onClick={onClick}
    className={`group w-full flex items-center gap-2 px-3 py-2 rounded-md transition-colors text-sm ${
      active ? "bg-purple-50 text-purple-700" : "text-slate-700 hover:bg-slate-100"
    }`}
  >
    <span className="flex-1 text-left truncate">{conv.title}</span>
    <span className={`opacity-0 group-hover:opacity-100 transition-opacity ${active ? "opacity-100" : ""}`}>
      <Icon name="moreH" className="w-4 h-4 text-slate-400" />
    </span>
  </button>
);

// ===== Top Bar =====
const TopBar = ({ onToggleSidebar, sidebarCollapsed, model, setModel }) => {
  const [open, setOpen] = useState(false);
  const models = [
    { id: "aria3-max", name: "Aria3-Max", desc: "最新旗舰模型，推理能力最强", tag: "推荐" },
    { id: "aria3-plus", name: "Aria3-Plus", desc: "均衡的性能与速度", tag: "" },
    { id: "aria3-turbo", name: "Aria3-Turbo", desc: "更快的响应速度", tag: "快速" },
    { id: "aria-vl-max", name: "Aria-VL-Max", desc: "视觉理解模型", tag: "多模态" },
    { id: "aria-coder", name: "Aria-Coder", desc: "代码专家模型", tag: "代码" },
  ];
  return (
    <header className="h-14 px-4 flex items-center justify-between border-b border-slate-200/60 bg-white/60 backdrop-blur-xl">
      <div className="flex items-center gap-2">
        {sidebarCollapsed && (
          <Button variant="ghost" size="icon" onClick={onToggleSidebar} className="text-slate-600">
            <Icon name="menu" />
          </Button>
        )}
        <div className="relative">
          <button
            onClick={() => setOpen(!open)}
            className="flex items-center gap-2 px-3 py-1.5 rounded-md hover:bg-slate-100 transition-colors"
          >
            <span className="font-semibold text-slate-800">{models.find(m => m.id === model)?.name}</span>
            <Icon name="chevronDown" className={`w-4 h-4 text-slate-500 transition-transform ${open ? "rotate-180" : ""}`} />
          </button>
          {open && (
            <>
              <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
              <div className="absolute left-0 top-full mt-2 w-80 bg-white rounded-xl shadow-xl border border-slate-200 z-20 p-2 animate-fade-in">
                {models.map(m => (
                  <button
                    key={m.id}
                    onClick={() => { setModel(m.id); setOpen(false); }}
                    className={`w-full flex items-start gap-3 p-3 rounded-lg transition-colors text-left ${
                      model === m.id ? "bg-purple-50" : "hover:bg-slate-50"
                    }`}
                  >
                    <div className="w-8 h-8 rounded-lg aria-gradient flex items-center justify-center flex-shrink-0">
                      <Icon name="sparkles" className="w-4 h-4 text-white" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="font-medium text-slate-800">{m.name}</span>
                        {m.tag && <span className="text-[10px] px-1.5 py-0.5 rounded bg-purple-100 text-purple-600 font-medium">{m.tag}</span>}
                      </div>
                      <div className="text-xs text-slate-500 mt-0.5">{m.desc}</div>
                    </div>
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
      <div className="flex items-center gap-2">
        <Button variant="ghost" size="sm" className="text-slate-600 gap-1.5">
          <Icon name="sparkles" className="w-4 h-4 text-purple-500" />
          <span>升级 Plus</span>
        </Button>
        <Button variant="ghost" size="icon" className="text-slate-600">
          <Icon name="sun" />
        </Button>
        <Button variant="ghost" size="icon" className="text-slate-600">
          <Icon name="globe" />
        </Button>
      </div>
    </header>
  );
};

// ===== Welcome Screen =====
const WelcomeScreen = ({ onSendPrompt }) => {
  const suggestions = [
    { icon: "pen", color: "from-purple-500 to-pink-500", title: "帮我写作", desc: "撰写一封商务邮件" },
    { icon: "code", color: "from-blue-500 to-cyan-500", title: "代码助手", desc: "用 Python 实现快速排序" },
    { icon: "lightbulb", color: "from-amber-500 to-orange-500", title: "创意启发", desc: "为新产品起一个好名字" },
    { icon: "languages", color: "from-emerald-500 to-teal-500", title: "翻译润色", desc: "翻译这段文字到英文" },
    { icon: "fileText", color: "from-rose-500 to-red-500", title: "文档总结", desc: "总结一篇长文的核心要点" },
    { icon: "bot", color: "from-indigo-500 to-purple-500", title: "知识问答", desc: "解释量子计算的基本原理" },
  ];

  return (
    <div className="flex-1 flex flex-col items-center justify-center px-4 pb-8 animate-fade-in">
      <div className="w-20 h-20 rounded-2xl aria-gradient flex items-center justify-center mb-6 shadow-lg shadow-purple-500/30">
        <Icon name="sparkles" className="w-10 h-10 text-white" strokeWidth={2.5} />
      </div>
      <h1 className="text-4xl font-bold mb-3">
        <span className="aria-gradient-text">你好，我是智言助手</span>
      </h1>
      <p className="text-slate-500 mb-10 text-center max-w-md">
        我可以帮你写作、答疑、编程、翻译，让我们一起开始吧～
      </p>

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 w-full max-w-3xl">
        {suggestions.map((s, i) => (
          <button
            key={i}
            onClick={() => onSendPrompt(s.desc)}
            className="group p-4 rounded-xl bg-white/80 backdrop-blur border border-slate-200/60 hover:border-purple-300 hover:shadow-lg hover:shadow-purple-500/10 transition-all text-left animate-slide-up"
            style={{ animationDelay: `${i * 50}ms` }}
          >
            <div className={`w-9 h-9 rounded-lg bg-gradient-to-br ${s.color} flex items-center justify-center mb-3 group-hover:scale-110 transition-transform`}>
              <Icon name={s.icon} className="w-5 h-5 text-white" />
            </div>
            <div className="font-medium text-slate-800 text-sm mb-1">{s.title}</div>
            <div className="text-xs text-slate-500">{s.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
};

// ===== Message =====
const MessageBubble = ({ msg }) => {
  const isUser = msg.role === "user";
  return (
    <div className={`group flex gap-3 mb-6 animate-fade-in ${isUser ? "flex-row-reverse" : ""}`}>
      <Avatar className="w-8 h-8 flex-shrink-0">
        {isUser ? (
          <div className="w-full h-full bg-gradient-to-br from-slate-600 to-slate-800 flex items-center justify-center text-white text-xs font-bold">
            Y
          </div>
        ) : (
          <div className="w-full h-full aria-gradient flex items-center justify-center">
            <Icon name="sparkles" className="w-4 h-4 text-white" />
          </div>
        )}
      </Avatar>
      <div className={`flex-1 min-w-0 ${isUser ? "flex flex-col items-end" : ""}`}>
        <div className={`inline-block max-w-[85%] px-4 py-3 rounded-2xl text-[15px] leading-relaxed whitespace-pre-wrap ${
          isUser
            ? "bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-tr-sm shadow-md shadow-purple-500/20"
            : "bg-white border border-slate-200/60 text-slate-800 rounded-tl-sm shadow-sm"
        }`}>
          {msg.content}
          {msg.streaming && <span className="inline-block w-1.5 h-4 bg-purple-500 ml-0.5 align-middle animate-pulse"></span>}
        </div>
        {!isUser && !msg.streaming && (
          <div className="flex items-center gap-1 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <Button variant="ghost" size="iconSm" className="text-slate-400 hover:text-slate-700">
              <Icon name="copy" className="w-4 h-4" />
            </Button>
            <Button variant="ghost" size="iconSm" className="text-slate-400 hover:text-slate-700">
              <Icon name="refresh" className="w-4 h-4" />
            </Button>
            <Button variant="ghost" size="iconSm" className="text-slate-400 hover:text-slate-700">
              <Icon name="thumbsUp" className="w-4 h-4" />
            </Button>
            <Button variant="ghost" size="iconSm" className="text-slate-400 hover:text-slate-700">
              <Icon name="thumbsDown" className="w-4 h-4" />
            </Button>
          </div>
        )}
      </div>
    </div>
  );
};

// ===== Input Area =====
const InputArea = ({ onSend, loading, onStop }) => {
  const [input, setInput] = useState("");
  const [deepThink, setDeepThink] = useState(false);
  const [webSearch, setWebSearch] = useState(false);
  const textareaRef = useRef(null);

  const handleSend = () => {
    if (!input.trim() || loading) return;
    onSend(input.trim());
    setInput("");
    if (textareaRef.current) textareaRef.current.style.height = "auto";
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const handleInput = (e) => {
    setInput(e.target.value);
    const ta = textareaRef.current;
    if (ta) {
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
    }
  };

  return (
    <div className="px-4 pb-4 pt-2">
      <div className="max-w-3xl mx-auto">
        <div className="bg-white rounded-2xl border border-slate-200 shadow-lg shadow-slate-200/40 overflow-hidden focus-within:border-purple-300 focus-within:shadow-purple-200/40 transition-all">
          <textarea
            ref={textareaRef}
            value={input}
            onChange={handleInput}
            onKeyDown={handleKeyDown}
            placeholder='给"智言助手"发送消息  (Shift + Enter 换行)'
            rows={1}
            className="w-full px-4 pt-4 pb-2 resize-none outline-none text-[15px] placeholder:text-slate-400 max-h-[200px]"
          />
          <div className="flex items-center justify-between px-3 pb-2.5">
            <div className="flex items-center gap-1">
              <Button variant="ghost" size="iconSm" className="text-slate-500 hover:text-slate-700" title="上传图片">
                <Icon name="image" className="w-[18px] h-[18px]" />
              </Button>
              <Button variant="ghost" size="iconSm" className="text-slate-500 hover:text-slate-700" title="上传文件">
                <Icon name="paperclip" className="w-[18px] h-[18px]" />
              </Button>
              <div className="w-px h-4 bg-slate-200 mx-1"></div>
              <button
                onClick={() => setDeepThink(!deepThink)}
                className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium transition-all ${
                  deepThink
                    ? "bg-purple-100 text-purple-700 border border-purple-200"
                    : "text-slate-600 hover:bg-slate-100 border border-transparent"
                }`}
              >
                <Icon name="lightbulb" className="w-3.5 h-3.5" />
                <span>深度思考</span>
              </button>
              <button
                onClick={() => setWebSearch(!webSearch)}
                className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium transition-all ${
                  webSearch
                    ? "bg-blue-100 text-blue-700 border border-blue-200"
                    : "text-slate-600 hover:bg-slate-100 border border-transparent"
                }`}
              >
                <Icon name="globe" className="w-3.5 h-3.5" />
                <span>联网搜索</span>
              </button>
            </div>
            <div className="flex items-center gap-2">
              <Button variant="ghost" size="iconSm" className="text-slate-500 hover:text-slate-700">
                <Icon name="mic" className="w-[18px] h-[18px]" />
              </Button>
              {loading ? (
                <button
                  onClick={onStop}
                  className="w-8 h-8 rounded-full bg-slate-800 hover:bg-slate-700 text-white flex items-center justify-center transition-all"
                >
                  <Icon name="stop" className="w-4 h-4" />
                </button>
              ) : (
                <button
                  onClick={handleSend}
                  disabled={!input.trim()}
                  className="w-8 h-8 rounded-full aria-gradient text-white flex items-center justify-center transition-all hover:opacity-90 disabled:opacity-30 disabled:cursor-not-allowed shadow-md shadow-purple-500/20"
                >
                  <Icon name="arrowUp" className="w-4 h-4" strokeWidth={2.5} />
                </button>
              )}
            </div>
          </div>
        </div>
        <div className="text-center text-xs text-slate-400 mt-2">
          内容由 AI 生成，请仔细甄别。<span className="text-purple-500 hover:underline cursor-pointer">用户协议</span> ·{" "}
          <span className="text-purple-500 hover:underline cursor-pointer">隐私政策</span>
        </div>
      </div>
    </div>
  );
};

// ===== Main App =====
const App = () => {
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [model, setModel] = useState("aria3-max");
  const [conversations] = useState([
    { id: "1", title: "如何提升团队协作效率", group: "today" },
    { id: "2", title: "React 性能优化方案", group: "today" },
    { id: "3", title: "帮我写一份产品需求文档", group: "today" },
    { id: "4", title: "Python 数据分析入门", group: "week" },
    { id: "5", title: "周末杭州旅行规划", group: "week" },
    { id: "6", title: "营销文案创意头脑风暴", group: "week" },
    { id: "7", title: "深度学习模型对比", group: "month" },
    { id: "8", title: "古诗词翻译练习", group: "month" },
  ]);
  const [activeId, setActiveId] = useState("1");
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages]);

  const mockReplies = [
    "好的！让我来帮你解决这个问题。\n\n首先，我们需要明确几个关键点：\n\n1. **目标定义**：清晰的目标是成功的基石\n2. **方法选择**：选择适合的工具和方法\n3. **执行落地**：将想法转化为实际行动\n\n如果你有更具体的需求或场景，欢迎进一步告诉我，我会给出更精准的建议～",
    "这是一个很有意思的问题。从我的理解来看，可以从以下几个维度来思考：\n\n• **技术维度**：考虑可行性和实现成本\n• **业务维度**：关注用户价值和商业回报\n• **体验维度**：注重交互流畅和视觉美感\n\n你希望我重点展开哪个方面？",
    "我已经理解了你的需求。基于智言助手大模型的能力，我建议这样处理：\n\n**步骤一**：收集和整理相关信息\n**步骤二**：分析数据找出关键模式\n**步骤三**：制定可执行的方案\n**步骤四**：评估并持续优化\n\n需要我帮你详细展开任何一步吗？",
  ];

  const sendMessage = (text) => {
    const userMsg = { id: Date.now(), role: "user", content: text };
    const aiMsg = { id: Date.now() + 1, role: "assistant", content: "", streaming: true };
    setMessages(prev => [...prev, userMsg, aiMsg]);
    setLoading(true);

    const reply = mockReplies[Math.floor(Math.random() * mockReplies.length)];
    let i = 0;
    timerRef.current = setInterval(() => {
      i += 2;
      if (i >= reply.length) {
        setMessages(prev => prev.map(m => m.id === aiMsg.id ? { ...m, content: reply, streaming: false } : m));
        setLoading(false);
        clearInterval(timerRef.current);
      } else {
        setMessages(prev => prev.map(m => m.id === aiMsg.id ? { ...m, content: reply.slice(0, i) } : m));
      }
    }, 30);
  };

  const handleStop = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setMessages(prev => prev.map(m => m.streaming ? { ...m, streaming: false } : m));
    setLoading(false);
  };

  const handleNew = () => {
    setMessages([]);
    setLoading(false);
    if (timerRef.current) clearInterval(timerRef.current);
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar
        collapsed={sidebarCollapsed}
        onToggle={() => setSidebarCollapsed(!sidebarCollapsed)}
        conversations={conversations}
        activeId={activeId}
        setActiveId={setActiveId}
        onNew={handleNew}
      />
      <main className="flex-1 flex flex-col h-screen overflow-hidden">
        <TopBar
          onToggleSidebar={() => setSidebarCollapsed(!sidebarCollapsed)}
          sidebarCollapsed={sidebarCollapsed}
          model={model}
          setModel={setModel}
        />
        {messages.length === 0 ? (
          <WelcomeScreen onSendPrompt={sendMessage} />
        ) : (
          <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-6">
            <div className="max-w-3xl mx-auto">
              {messages.map(m => <MessageBubble key={m.id} msg={m} />)}
            </div>
          </div>
        )}
        <InputArea onSend={sendMessage} loading={loading} onStop={handleStop} />
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
