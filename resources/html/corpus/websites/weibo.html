<!DOCTYPE html>
<html>
  <head>
    <title>Weibo</title>
  </head>
  <body style="width: 390px; height: 780px; background-color: #F4F4F6; font-family: PingFang SC; font-size: 14px; color: #1A1A1A;">

    <!-- Top bar -->
    <div style="display: flex; flex-direction: row; align-items: center; padding: 12px 16px; background-color: #FFFFFF; gap: 12px;">
      <div style="width: 28px; height: 28px; border-radius: 14px; background-color: #FF8200;"></div>
      <div style="flex: 1; display: flex; flex-direction: row; align-items: center; padding: 6px 12px; background-color: #F2F2F5; border-radius: 16px; gap: 6px;">
        <div style="width: 14px; height: 14px; border-radius: 7px; background-color: #BDBDBD;"></div>
        <span style="font-size: 13px; color: #9A9A9A;">搜索微博热点</span>
      </div>
      <div style="width: 24px; height: 24px; border-radius: 12px; background-color: #FFE4CC;"></div>
    </div>

    <!-- Tabs -->
    <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-around; padding: 10px 16px; background-color: #FFFFFF;">
      <span style="font-size: 15px; color: #9A9A9A;">推荐</span>
      <span style="font-size: 17px; font-weight: bold; color: #1A1A1A;">关注</span>
      <span style="font-size: 15px; color: #9A9A9A;">热门</span>
      <span style="font-size: 15px; color: #9A9A9A;">视频</span>
      <span style="font-size: 15px; color: #9A9A9A;">同城</span>
    </div>

    <!-- Divider line -->
    <div style="width: 100%; height: 6px; background-color: #F4F4F6;"></div>

    <!-- Weibo card -->
    <div style="display: flex; flex-direction: column; padding: 14px 16px; background-color: #FFFFFF; gap: 10px;">

      <!-- Header: avatar + name + follow -->
      <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; overflow: hidden;">
          <img src="images_weibo/avatar.png" width="44" height="44"/>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
          <div style="display: flex; flex-direction: row; align-items: center; gap: 4px;">
            <span style="font-size: 15px; font-weight: bold; color: #1A1A1A;">林小满的旅行日记</span>
            <div style="width: 14px; height: 14px; border-radius: 7px; background-color: #FFB300;"></div>
          </div>
          <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
            <span style="font-size: 12px; color: #9A9A9A;">10分钟前</span>
            <span style="font-size: 12px; color: #9A9A9A;">来自 iPhone 15 Pro</span>
          </div>
        </div>
        <div style="padding: 6px 14px; background-color: #FFF3E6; border-radius: 14px;">
          <span style="font-size: 13px; color: #FF8200;">+ 关注</span>
        </div>
      </div>

      <!-- Body text -->
      <p style="font-size: 15px; color: #1A1A1A; line-height: 22px;">周末逃离城市，去山里看了一场绝美的日落，云像被打翻的橘子汽水。回家路上还吸了猫、吃了一碗超满足的拉面，幸福感拉满～<span style="color: #FF8200;">#周末去哪儿#</span> <span style="color: #FF8200;">#旅行手册#</span></p>

      <!-- Image grid: 3 images in a row -->
      <div style="display: flex; flex-direction: row; gap: 4px;">
        <div style="flex: 1; height: 112px; overflow: hidden; border-radius: 6px;">
          <img src="images_weibo/post1.png" width="112" height="112"/>
        </div>
        <div style="flex: 1; height: 112px; overflow: hidden; border-radius: 6px;">
          <img src="images_weibo/post2.png" width="112" height="112"/>
        </div>
        <div style="flex: 1; height: 112px; overflow: hidden; border-radius: 6px;">
          <img src="images_weibo/post3.png" width="112" height="112"/>
        </div>
      </div>

      <!-- Location chip -->
      <div style="display: flex; flex-direction: row; align-items: center; padding: 6px 10px; background-color: #F6F8FB; border-radius: 4px; gap: 6px;">
        <div style="width: 12px; height: 12px; border-radius: 6px; background-color: #4A90E2;"></div>
        <span style="font-size: 12px; color: #4A90E2;">浙江·莫干山</span>
      </div>

      <!-- Action bar -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 8px 0;">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
          <div style="width: 18px; height: 18px; border-radius: 9px; background-color: #BDBDBD;"></div>
          <span style="font-size: 13px; color: #6B6B6B;">转发 128</span>
        </div>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
          <div style="width: 18px; height: 18px; border-radius: 4px; background-color: #BDBDBD;"></div>
          <span style="font-size: 13px; color: #6B6B6B;">评论 342</span>
        </div>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
          <div style="width: 18px; height: 18px; border-radius: 9px; background-color: #FF4D6D;"></div>
          <span style="font-size: 13px; color: #FF4D6D;">2.1万</span>
        </div>
      </div>
    </div>

    <!-- Spacer -->
    <div style="width: 100%; height: 6px; background-color: #F4F4F6;"></div>

    <!-- Second card preview -->
    <div style="display: flex; flex-direction: column; padding: 14px 16px; background-color: #FFFFFF; gap: 10px;">
      <div style="display: flex; flex-direction: row; align-items: center; gap: 10px;">
        <div style="width: 40px; height: 40px; border-radius: 20px; background-color: #C5E1A5;"></div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
          <span style="font-size: 14px; font-weight: bold; color: #1A1A1A;">美食研究所</span>
          <span style="font-size: 12px; color: #9A9A9A;">25分钟前</span>
        </div>
        <div style="width: 20px; height: 20px; border-radius: 10px; background-color: #EAEAEA;"></div>
      </div>
      <p style="font-size: 14px; color: #1A1A1A; line-height: 20px;">下周更新预告：广州早茶探店合集，从虾饺到肠粉，一篇看遍～</p>
    </div>

    <!-- Bottom tab bar -->
    <div style="position: absolute; left: 0; bottom: 0; width: 390px; height: 60px; background-color: #FFFFFF;">
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-around; width: 100%; height: 100%; padding: 8px 16px;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
          <div style="width: 22px; height: 22px; border-radius: 4px; background-color: #FF8200;"></div>
          <span style="font-size: 11px; color: #FF8200;">首页</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
          <div style="width: 22px; height: 22px; border-radius: 4px; background-color: #BDBDBD;"></div>
          <span style="font-size: 11px; color: #6B6B6B;">视频</span>
        </div>
        <div style="width: 36px; height: 36px; border-radius: 18px; background-color: #FF8200;"></div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
          <div style="width: 22px; height: 22px; border-radius: 4px; background-color: #BDBDBD;"></div>
          <span style="font-size: 11px; color: #6B6B6B;">消息</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
          <div style="width: 22px; height: 22px; border-radius: 4px; background-color: #BDBDBD;"></div>
          <span style="font-size: 11px; color: #6B6B6B;">我</span>
        </div>
      </div>
    </div>

  </body>
</html>
