<style>
  html, body, #root { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* AuroraOS 桌面壁纸 - Nova 风格渐变 */
  .desktop-bg {
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255, 145, 86, 0.55), transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(255, 90, 160, 0.45), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.55), transparent 55%),
      radial-gradient(ellipse at 15% 85%, rgba(56, 189, 248, 0.45), transparent 55%),
      linear-gradient(135deg, #1e1b4b 0%, #312e81 35%, #4c1d95 70%, #831843 100%);
  }
  .glass {
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.22);
  }
  .glass-dark {
    background: rgba(28, 28, 30, 0.62);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }
  .glass-window {
    background: rgba(40, 40, 45, 0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .dock-icon {
    transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .dock-icon:hover {
    transform: translateY(-10px) scale(1.15);
  }
  .dock-icon:hover + .dock-tooltip,
  .dock-icon-wrap:hover .dock-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(-4px);
  }
  .dock-tooltip {
    opacity: 0;
    transition: all 0.15s ease;
    pointer-events: none;
  }
  .traffic-light {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: filter 0.15s ease;
  }
  .traffic-light:hover svg { opacity: 1; }
  .traffic-light svg { opacity: 0; transition: opacity 0.15s ease; }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  /* Dock 反射 */
  .dock-reflection {
    background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 100%);
  }
  /* 桌面图标选中态 */
  .desktop-icon:hover .icon-glow {
    background: rgba(255,255,255,0.18);
  }
  /* 启动动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.6s ease both; }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulse-dot { animation: pulseDot 2s ease-in-out infinite; }
</style>
</head>

/* ---------- 红绿灯按钮 ---------- */

/* ---------- 通用窗口外壳 ---------- */
function Window({ title, children, defaultPos, size = "lg", onClose, zIndex, onFocus, sidebar }) {
  const [pos, setPos] = useState(defaultPos);
  const [dragging, setDragging] = useState(false);
  const offset = useRef({ x: 0, y: 0 });

  const onMouseDown = (e) => {
    onFocus && onFocus();
    setDragging(true);
    offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
  };
  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => {
      setPos({ x: e.clientX - offset.current.x, y: Math.max(28, e.clientY - offset.current.y) });
    };
    const onUp = () => setDragging(false);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [dragging]);

  const sizeClass = {
    sm: "w-[520px] h-[380px]",
    md: "w-[720px] h-[480px]",
    lg: "w-[920px] h-[600px]",
  }[size];

  return (
    <div
      className={`glass-window absolute rounded-xl shadow-2xl overflow-hidden flex flex-col ${sizeClass} fade-in-up`}
      style={{ left: pos.x, top: pos.y, zIndex }}
      onMouseDown={onFocus}
    >
      {/* TitleBar */}
      <div
        className="h-10 flex items-center px-4 border-b border-white/10 cursor-grab active:cursor-grabbing select-none"
        onMouseDown={onMouseDown}
      >
        <TrafficLights onClose={onClose} />
        <div className="flex-1 text-center text-white/90 text-[13px] font-medium -ml-12">{title}</div>
      </div>
      {/* Body */}
      <div className="flex-1 flex overflow-hidden">
        {sidebar && <div className="w-52 bg-black/20 border-r border-white/10 overflow-y-auto scrollbar-thin">{sidebar}</div>}
        <div className="flex-1 overflow-y-auto scrollbar-thin">{children}</div>
      </div>
    </div>
  );
}

}

/* ---------- 桌面图标 ---------- */
function DesktopIcons() {
  const items = [
    { name: "Aurora HD", icon: "hard-drive", color: "text-white" },
    { name: "项目", icon: "folder", color: "text-sky-300" },
    { name: "屏幕快照.png", icon: "image", color: "text-pink-300" },
  ];
  return (
    <div className="absolute top-12 right-6 flex flex-col gap-5 z-10">
      {items.map((it, i) => (
        <div key={i} className="desktop-icon flex flex-col items-center gap-1 cursor-default w-20">
          <div className="icon-glow w-14 h-14 rounded-lg flex items-center justify-center transition">
            <i data-lucide={it.icon} className={`w-12 h-12 ${it.color} drop-shadow-lg`} style={{strokeWidth: 1.2}}></i>
          </div>
          <span className="text-white text-[11px] text-center leading-tight px-1 rounded" style={{textShadow: "0 1px 3px rgba(0,0,0,0.7)"}}>{it.name}</span>
        </div>
      ))}

/* ---------- Dock ---------- */
function Dock({ onOpen, runningApps }) {
  const apps = [
    { id: "finder", name: "访达", grad: "from-sky-400 via-blue-500 to-indigo-600", icon: "smile" },
    { id: "launchpad", name: "启动台", grad: "from-zinc-200 to-zinc-400", icon: "layout-grid", dark: true },
    { id: "safari", name: "Voyager 浏览器", grad: "from-blue-400 via-cyan-500 to-blue-600", icon: "compass" },
    { id: "messages", name: "信息", grad: "from-green-400 to-green-600", icon: "message-circle" },
    { id: "mail", name: "邮件", grad: "from-sky-400 to-blue-600", icon: "mail" },
    { id: "maps", name: "地图", grad: "from-emerald-300 via-green-400 to-teal-500", icon: "map" },
    { id: "photos", name: "照片", grad: "from-yellow-300 via-pink-400 to-purple-500", icon: "image" },
    { id: "facetime", name: "FaceTime", grad: "from-green-400 to-emerald-600", icon: "video" },
    { id: "calendar", name: "日历", grad: "from-white to-zinc-100", icon: "calendar", dark: true },
    { id: "notes", name: "备忘录", grad: "from-yellow-200 via-amber-300 to-yellow-500", icon: "notebook-pen", dark: true },
    { id: "music", name: "音乐", grad: "from-pink-400 via-red-400 to-rose-500", icon: "music" },
    { id: "appstore", name: "App Store", grad: "from-sky-400 to-blue-600", icon: "shopping-bag" },
    { id: "settings", name: "系统设置", grad: "from-zinc-400 to-zinc-700", icon: "settings" },
    { id: "terminal", name: "终端", grad: "from-zinc-700 to-black", icon: "square-terminal" },
    { id: "trash", name: "废纸篓", grad: "from-zinc-300 to-zinc-500", icon: "trash-2", dark: true, divider: true },
  ];
  return (
    <div className="fixed bottom-2 left-1/2 -translate-x-1/2 z-40">
      <div className="glass rounded-2xl px-2 py-2 flex items-end gap-1 shadow-2xl">
        {apps.map((a, i) => (
          <React.Fragment key={a.id}>
            {a.divider && <div className="w-px h-12 bg-white/25 mx-1 self-center"></div>}
            <div className="dock-icon-wrap relative flex flex-col items-center">
              <div className="dock-tooltip absolute -top-9 left-1/2 -translate-x-1/2 bg-black/70 text-white text-[12px] px-2 py-1 rounded-md whitespace-nowrap">
                {a.name}
              </div>
              <button
                onClick={() => onOpen(a.id)}
                className={`dock-icon w-14 h-14 rounded-xl bg-gradient-to-br ${a.grad} flex items-center justify-center shadow-lg ${a.dark?"text-zinc-700":"text-white"}`}
              >
                <i data-lucide={a.icon} className="w-8 h-8" style={{strokeWidth: 1.6}}></i>
              </button>
              <div className={`w-1 h-1 rounded-full mt-0.5 ${runningApps.includes(a.id)?"bg-white/80":"bg-transparent"}`}></div>
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ---------- 主应用 ---------- */
function App() {
  const [windows, setWindows] = useState([
    { id: "finder-1", app: "finder", z: 10, pos: { x: 80, y: 60 } },
    { id: "safari-1", app: "safari", z: 11, pos: { x: 220, y: 110 } },
    { id: "notes-1", app: "notes", z: 12, pos: { x: 360, y: 160 } },
  ]);
  const [topZ, setTopZ] = useState(12);
  const [showCC, setShowCC] = useState(false);
  const [time, setTime] = useState({ date: "", time: "" });

  useEffect(() => {
    const update = () => {
      const d = new Date();
      const days = ["周日","周一","周二","周三","周四","周五","周六"];
      setTime({
        date: `${days[d.getDay()]} ${d.getMonth()+1}月${d.getDate()}日`,
        time: d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false })
      });
    };
    update();
    const t = setInterval(update, 1000);
    return () => clearInterval(t);
  }, []);

  // Lucide 图标渲染
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  const focusWin = (id) => {
    const nz = topZ + 1;
    setTopZ(nz);
    setWindows(ws => ws.map(w => w.id === id ? { ...w, z: nz } : w));
  };
  const closeWin = (id) => setWindows(ws => ws.filter(w => w.id !== id));
  const openApp = (app) => {
    if (app === "trash") return;
    // 已存在则聚焦
    const existed = windows.find(w => w.app === app);
    if (existed) { focusWin(existed.id); return; }
    const nz = topZ + 1;
    setTopZ(nz);
    const id = `${app}-${Date.now()}`;
    setWindows(ws => [...ws, { id, app, z: nz, pos: { x: 100 + ws.length*40, y: 80 + ws.length*30 } }]);
  };

  const activeApp = windows.length ? (
    { finder: "访达", safari: "Voyager", notes: "备忘录" }[windows.reduce((a,b)=>a.z>b.z?a:b).app] || "访达"
  ) : "访达";

  const runningApps = [...new Set(windows.map(w => w.app))];

  return (
    <div className="desktop-bg w-full h-full relative overflow-hidden">
      <MenuBar activeApp={activeApp} time={time} />

      {/* 控制中心触发器（菜单栏右侧已展示图标，这里加个透明热区） */}
      <div className="fixed top-0 right-0 w-32 h-7 z-50 cursor-default" onClick={() => setShowCC(v => !v)}></div>
      <ControlCenter open={showCC} onClose={() => setShowCC(false)} />

      <DesktopIcons />

      {/* 窗口 */}
      {windows.map(w => {
        const common = {
          key: w.id,
          defaultPos: w.pos,
          zIndex: w.z,
          onClose: () => closeWin(w.id),
          onFocus: () => focusWin(w.id),
        };
        if (w.app === "finder") return <FinderApp {...common} />;
        if (w.app === "safari") return <VoyagerApp {...common} />;
        if (w.app === "notes") return <NotesApp {...common} />;
        return null;
      })}

      <Dock onOpen={openApp} runningApps={runningApps} />

      {/* 右下角 hint */}
      <div className="fixed bottom-3 right-4 text-white/50 text-[11px] z-30 select-none">
        提示：点击 Dock 打开应用 · 拖动标题栏移动窗口 · 点击右上角图标打开控制中心
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
