<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小红书 - 标记我的生活</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, "Microsoft YaHei", sans-serif;
      background-color: #f7f7f7;
    }
    /* 隐藏滚动条但保留滚动功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 瀑布流布局 */
    .masonry {
      column-count: 2;
      column-gap: 8px;
    }
    @media (min-width: 768px) {
      .masonry { column-count: 3; }
    }
    @media (min-width: 1024px) {
      .masonry { column-count: 4; }
    }
    @media (min-width: 1280px) {
      .masonry { column-count: 5; }
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
    }

    /* 小红书品牌色 */
    .text-xhs { color: #ff2442; }
    .bg-xhs { background-color: #ff2442; }
    .border-xhs { border-color: #ff2442; }

    /* 按钮交互 */
    .btn-press:active { transform: scale(0.96); }

    /* 卡片hover效果 */
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

    /* 心跳动画 */
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.3); }
      60% { transform: scale(0.95); }
    }
    .heart-beat { animation: heartBeat 0.5s ease; }

    /* 渐变遮罩 */
    .gradient-mask {
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 100%);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ============ Icon 组件（基于 lucide 风格的 SVG） ============
    const Icon = ({ name, size = 20, className = "", strokeWidth = 2, fill = "none" }) => {
      const icons = {
        search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
        bell: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
        message: <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
        heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
        comment: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>,
        share: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>,
        plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
        user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        play: <polygon points="5 3 19 12 5 21 5 3"/>,
        chevronDown: <polyline points="6 9 12 15 18 9"/>,
        bookmark: <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>,
        check: <polyline points="20 6 9 17 4 12"/>,
        camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
        moreHorizontal: <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
             fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
             className={className}>
          {icons[name]}
        </svg>
      );
    };

    // ============ shadcn 风格的基础组件 ============
    const Button = ({ children, variant = "default", size = "default", className = "", ...props }) => {
      const base = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-full font-medium transition-colors focus:outline-none btn-press";
      const variants = {
        default: "bg-xhs text-white hover:bg-red-600",
        outline: "border border-gray-200 bg-white text-gray-700 hover:bg-gray-50",
        ghost: "hover:bg-gray-100 text-gray-700",
        secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
      };
      const sizes = {
        default: "h-9 px-4 text-sm",
        sm: "h-8 px-3 text-xs",
        lg: "h-11 px-6 text-base",
        icon: "h-9 w-9",
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    };

    const Avatar = ({ src, alt, size = 32, ring = false }) => (
      <div className={`relative inline-flex items-center justify-center overflow-hidden rounded-full bg-gray-100 ${ring ? "ring-2 ring-xhs ring-offset-2" : ""}`}
           style={{ width: size, height: size }}>
        {src ? (
          <img src={src} alt={alt} className="h-full w-full object-cover"
               onError={(e)=>{ e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}/>
        ) : null}
        <div className="absolute inset-0 hidden items-center justify-center bg-gradient-to-br from-pink-400 to-red-500 text-white font-semibold"
             style={{ fontSize: size * 0.4 }}>
          {alt?.charAt(0) || "U"}
        </div>
      </div>
    );

    const Badge = ({ children, variant = "default", className = "" }) => {
      const variants = {
        default: "bg-xhs text-white",
        secondary: "bg-gray-100 text-gray-600",
        outline: "border border-gray-200 text-gray-600",
      };
      return (
        <span className={`inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    };

    // ============ 数据 ============
    const categories = ["关注", "发现", "附近", "穿搭", "美食", "彩妆", "影视", "职场", "情感", "家居", "游戏", "旅行", "健身"];

    const notes = [
      { id: 1, cover: "images_xiaohongshu/cover_fashion.png", title: "秋冬通勤穿搭｜法式优雅风格分享，超显气质的5套look", author: "时髦研究所", avatar: "images_xiaohongshu/avatar1.png", likes: 12483, height: 280, tag: "穿搭", verified: true },
      { id: 2, cover: "images_xiaohongshu/cover_food.png", title: "在家也能做的高级日料｜三文鱼牛油果盖饭", author: "小厨娘日记", avatar: "images_xiaohongshu/avatar2.png", likes: 8921, height: 220, tag: "美食" },
      { id: 3, cover: "images_xiaohongshu/cover_beauty.png", title: "新手化妆教程｜从零基础到日常通勤妆容", author: "美妆小课堂", avatar: "images_xiaohongshu/avatar3.png", likes: 23156, height: 320, tag: "彩妆", verified: true },
      { id: 4, cover: "images_xiaohongshu/cover_home.png", title: "30㎡小家改造日记｜ins风+治愈系软装搭配", author: "家居美学家", avatar: "images_xiaohongshu/avatar4.png", likes: 5672, height: 260, tag: "家居" },
      { id: 5, cover: "images_xiaohongshu/cover_fashion.png", title: "梨形身材救星！高腰阔腿裤显瘦穿搭合集", author: "穿搭博主Lily", avatar: "images_xiaohongshu/avatar2.png", likes: 18934, height: 300, tag: "穿搭" },
      { id: 6, cover: "images_xiaohongshu/cover_food.png", title: "周末brunch｜10分钟搞定的法式吐司", author: "懒人食谱", avatar: "images_xiaohongshu/avatar1.png", likes: 6543, height: 240, tag: "美食" },
      { id: 7, cover: "images_xiaohongshu/cover_beauty.png", title: "平价口红测评｜30支色号试色合集", author: "口红收藏家", avatar: "images_xiaohongshu/avatar3.png", likes: 31247, height: 340, tag: "彩妆", verified: true },
      { id: 8, cover: "images_xiaohongshu/cover_home.png", title: "出租屋改造｜不打洞也能拥有的高级感", author: "租房改造师", avatar: "images_xiaohongshu/avatar4.png", likes: 9856, height: 270, tag: "家居" },
      { id: 9, cover: "images_xiaohongshu/cover_fashion.png", title: "小个子穿搭｜155身高也能穿出168的气场", author: "矮个子也时髦", avatar: "images_xiaohongshu/avatar1.png", likes: 14523, height: 290, tag: "穿搭" },
      { id: 10, cover: "images_xiaohongshu/cover_food.png", title: "一周减脂餐计划｜好吃不胖的低卡食谱", author: "健康饮食家", avatar: "images_xiaohongshu/avatar2.png", likes: 21089, height: 310, tag: "美食", verified: true },
      { id: 11, cover: "images_xiaohongshu/cover_beauty.png", title: "敏感肌护肤指南｜温和有效的成分选择", author: "护肤研究员", avatar: "images_xiaohongshu/avatar3.png", likes: 7634, height: 250, tag: "彩妆" },
      { id: 12, cover: "images_xiaohongshu/cover_home.png", title: "厨房收纳秘籍｜让小厨房也能整洁如新", author: "整理收纳师", avatar: "images_xiaohongshu/avatar4.png", likes: 4892, height: 230, tag: "家居" },
    ];

    // ============ 顶部导航 ============
    const TopNav = ({ activeCategory, setActiveCategory }) => (
      <header className="sticky top-0 z-40 bg-white border-b border-gray-100">
        <div className="max-w-[1400px] mx-auto px-6 h-14 flex items-center gap-6">
          {/* Logo */}
          <div className="flex items-center gap-1 shrink-0">
            <div className="w-8 h-8 rounded-lg bg-xhs flex items-center justify-center">
              <span className="text-white font-bold text-sm">小</span>
            </div>
            <span className="text-xhs font-bold text-xl tracking-tight">小红书</span>
          </div>

          {/* 搜索框 */}
          <div className="flex-1 max-w-xl">
            <div className="relative">
              <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
              <input
                type="text"
                placeholder="搜索你感兴趣的内容"
                className="w-full h-10 pl-11 pr-12 bg-gray-100 rounded-full text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-xhs focus:bg-white transition-all"
              />
              <button className="absolute right-2 top-1/2 -translate-y-1/2 h-7 px-4 bg-xhs text-white rounded-full text-xs font-medium hover:bg-red-600 btn-press">
                搜索
              </button>
            </div>
          </div>

          {/* 右侧操作 */}
          <div className="flex items-center gap-2 shrink-0">
            <Button variant="default" size="sm" className="hidden md:inline-flex">
              <Icon name="plus" size={16} />
              发布
            </Button>
            <Button variant="ghost" size="icon" className="relative">
              <Icon name="bell" size={20} />
              <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-xhs rounded-full"></span>
            </Button>
            <Button variant="ghost" size="icon">
              <Icon name="message" size={20} />
            </Button>
            <Avatar src="images_xiaohongshu/avatar1.png" alt="我" size={32} />
          </div>
        </div>

        {/* 分类标签栏 */}
        <div className="max-w-[1400px] mx-auto px-6">
          <div className="flex items-center gap-1 overflow-x-auto no-scrollbar h-12">
            {categories.map((cat) => (
              <button
                key={cat}
                onClick={() => setActiveCategory(cat)}
                className={`shrink-0 px-4 h-8 rounded-full text-sm font-medium transition-all btn-press ${
                  activeCategory === cat
                    ? "bg-gray-900 text-white"
                    : "text-gray-600 hover:bg-gray-100"
                }`}
              >
                {cat}
              </button>
            ))}
          </div>
        </div>
      </header>
    );

    // ============ 左侧边栏 ============
    const Sidebar = () => {
      const [active, setActive] = useState("home");
      const items = [
        { id: "home", icon: "home", label: "首页" },
        { id: "explore", icon: "compass", label: "发现" },
        { id: "publish", icon: "plus", label: "发布" },
        { id: "notify", icon: "bell", label: "通知" },
        { id: "profile", icon: "user", label: "我" },
      ];
      return (
        <aside className="hidden lg:block w-56 shrink-0 sticky top-[112px] h-[calc(100vh-112px)] py-4 pr-4">
          <nav className="flex flex-col gap-1">
            {items.map((item) => (
              <button
                key={item.id}
                onClick={() => setActive(item.id)}
                className={`flex items-center gap-3 h-12 px-4 rounded-xl text-base font-medium transition-all btn-press ${
                  active === item.id
                    ? "bg-red-50 text-xhs"
                    : "text-gray-700 hover:bg-gray-100"
                }`}
              >
                <Icon name={item.icon} size={22} strokeWidth={active === item.id ? 2.5 : 2} />
                {item.label}
              </button>
            ))}
          </nav>

          <div className="mt-8 px-4">
            <div className="text-xs font-semibold text-gray-400 mb-3">我的关注</div>
            <div className="flex flex-col gap-3">
              {[
                { name: "时髦研究所", avatar: "images_xiaohongshu/avatar1.png" },
                { name: "小厨娘日记", avatar: "images_xiaohongshu/avatar2.png" },
                { name: "美妆小课堂", avatar: "images_xiaohongshu/avatar3.png" },
                { name: "家居美学家", avatar: "images_xiaohongshu/avatar4.png" },
              ].map((u, i) => (
                <button key={i} className="flex items-center gap-3 hover:bg-gray-50 p-1.5 -mx-1.5 rounded-lg transition btn-press">
                  <Avatar src={u.avatar} alt={u.name} size={32} />
                  <span className="text-sm text-gray-700 truncate">{u.name}</span>
                </button>
              ))}
            </div>
          </div>
        </aside>
      );
    };

    // ============ 笔记卡片 ============
    const NoteCard = ({ note }) => {
      const [liked, setLiked] = useState(false);
      const [likes, setLikes] = useState(note.likes);
      const [animating, setAnimating] = useState(false);

      const handleLike = (e) => {
        e.stopPropagation();
        setLiked(!liked);
        setLikes(liked ? likes - 1 : likes + 1);
        setAnimating(true);
        setTimeout(() => setAnimating(false), 500);
      };

      const formatLikes = (n) => n >= 10000 ? `${(n / 10000).toFixed(1)}w` : n.toLocaleString();

      return (
        <div className="masonry-item">
          <div className="bg-white rounded-2xl overflow-hidden card-hover cursor-pointer">
            {/* 封面 */}
            <div className="relative overflow-hidden bg-gray-100" style={{ height: note.height }}>
              <img
                src={note.cover}
                alt={note.title}
                className="w-full h-full object-cover transition-transform duration-300 hover:scale-105"
                onError={(e) => {
                  e.target.style.display = 'none';
                  e.target.parentElement.style.background = `linear-gradient(135deg, hsl(${note.id * 40}, 70%, 75%), hsl(${note.id * 40 + 60}, 70%, 65%))`;
                }}
              />
              {/* 标签 */}
              <div className="absolute top-2 left-2">
                <span className="inline-flex items-center px-2 py-1 bg-black/40 backdrop-blur-sm text-white text-xs rounded-md">
                  {note.tag}
                </span>
              </div>
              {/* 视频图标（部分笔记） */}
              {note.id % 3 === 0 && (
                <div className="absolute top-2 right-2 w-7 h-7 bg-black/40 backdrop-blur-sm rounded-full flex items-center justify-center">
                  <Icon name="play" size={14} className="text-white" fill="white" strokeWidth={0} />
                </div>
              )}
            </div>

            {/* 内容 */}
            <div className="p-3">
              <h3 className="text-sm text-gray-900 leading-snug line-clamp-2 mb-2.5">
                {note.title}
              </h3>

              <div className="flex items-center justify-between">
                <div className="flex items-center gap-1.5 min-w-0 flex-1">
                  <Avatar src={note.avatar} alt={note.author} size={20} />
                  <span className="text-xs text-gray-500 truncate">{note.author}</span>
                  {note.verified && (
                    <span className="shrink-0 w-3.5 h-3.5 bg-yellow-400 rounded-full flex items-center justify-center">
                      <Icon name="check" size={9} className="text-white" strokeWidth={3} />
                    </span>
                  )}
                </div>

                <button
                  onClick={handleLike}
                  className="flex items-center gap-1 shrink-0 ml-2 group btn-press"
                >
                  <Icon
                    name="heart"
                    size={16}
                    className={`transition-colors ${liked ? "text-xhs" : "text-gray-400 group-hover:text-gray-600"} ${animating ? "heart-beat" : ""}`}
                    fill={liked ? "#ff2442" : "none"}
                    strokeWidth={2}
                  />
                  <span className={`text-xs ${liked ? "text-xhs" : "text-gray-500"}`}>
                    {formatLikes(likes)}
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============ 右上角通知/提示 ============
    const Toast = ({ message, show }) => (
      <div className={`fixed top-20 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 ${show ? "opacity-100 translate-y-0" : "opacity-0 -translate-y-4 pointer-events-none"}`}>
        <div className="bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm shadow-lg flex items-center gap-2">
          <Icon name="check" size={16} className="text-green-400" strokeWidth={3} />
          {message}
        </div>
      </div>
    );

    // ============ 浮动发布按钮（移动端） ============
    const FloatingPublish = () => (
      <button className="lg:hidden fixed bottom-6 right-6 z-40 w-14 h-14 bg-xhs text-white rounded-full shadow-lg shadow-red-200 flex items-center justify-center btn-press hover:bg-red-600 transition-colors">
        <Icon name="plus" size={28} strokeWidth={2.5} />
      </button>
    );

    // ============ 主应用 ============
    const App = () => {
      const [activeCategory, setActiveCategory] = useState("发现");
      const [toast, setToast] = useState({ show: false, message: "" });
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        setLoaded(true);
      }, []);

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: "" }), 2000);
      };

      return (
        <div className="min-h-screen">
          <TopNav activeCategory={activeCategory} setActiveCategory={setActiveCategory} />

          <div className="max-w-[1400px] mx-auto px-6 flex">
            <Sidebar />

            <main className="flex-1 min-w-0 py-4">
              {/* 当前分类提示条 */}
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-semibold text-gray-900">
                  {activeCategory === "发现" ? "为你推荐" : activeCategory}
                </h2>
                <button className="text-sm text-gray-500 hover:text-gray-900 flex items-center gap-1">
                  最新
                  <Icon name="chevronDown" size={14} />
                </button>
              </div>

              {/* 瀑布流 */}
              <div className={`masonry transition-opacity duration-500 ${loaded ? "opacity-100" : "opacity-0"}`}>
                {notes.map((note) => (
                  <NoteCard key={note.id} note={note} />
                ))}
              </div>

              {/* 加载更多 */}
              <div className="flex justify-center py-8">
                <button
                  onClick={() => showToast("已经到底啦～看看其他内容吧")}
                  className="px-6 h-10 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-gray-50 btn-press"
                >
                  加载更多
                </button>
              </div>
            </main>
          </div>

          <FloatingPublish />
          <Toast message={toast.message} show={toast.show} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
