<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>存算分离架构图</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef4ff',
              100: '#e0ebff',
              200: '#c7daff',
              500: '#3b6fe0',
              600: '#2c5bd6',
              700: '#1e44b8',
              800: '#173a99',
              900: '#13306f',
            }
          },
          fontFamily: {
            sans: ['"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #f5f7fb; }
    .arrow-dashed {
      background-image: repeating-linear-gradient(90deg, #9db8e8 0, #9db8e8 6px, transparent 6px, transparent 12px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ---------- 图标（内联 SVG） ---------- */
    const Icon = ({ path, className = "w-5 h-5", stroke = 1.8 }) => (
      <svg className={className} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth={stroke}
           strokeLinecap="round" strokeLinejoin="round">
        {path}
      </svg>
    );

    const IChart   = (p) => <Icon {...p} path={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />;
    const IBrain   = (p) => <Icon {...p} path={<><path d="M12 5a3 3 0 0 0-6 0v1a3 3 0 0 0 0 6v1a3 3 0 0 0 6 3"/><path d="M12 5a3 3 0 0 1 6 0v1a3 3 0 0 1 0 6v1a3 3 0 0 1-6 3"/><path d="M12 5v14"/></>} />;
    const ITrend   = (p) => <Icon {...p} path={<><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></>} />;
    const IDb      = (p) => <Icon {...p} path={<><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/></>} />;
    const ITable   = (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></>} />;
    const IGear    = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />;
    const INet     = (p) => <Icon {...p} path={<><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><line x1="6.5" y1="7.5" x2="10.5" y2="16"/><line x1="17.5" y1="7.5" x2="13.5" y2="16"/></>} />;
    const ISquirrel= (p) => <Icon {...p} path={<><path d="M15.236 22a3 3 0 0 0-2.2-5"/><path d="M16 20a3 3 0 0 1 3-3h1a2 2 0 0 0 2-2v-2a4 4 0 0 0-4-4V4"/><path d="M18 13h.01"/><path d="M18 6a4 4 0 0 0-4 4 7 7 0 0 0-7 7c0-5 4-5 4-10.5a4.5 4.5 0 1 0-9 0 2.5 2.5 0 0 0 5 0V4"/></>} />;
    const ICloud   = (p) => <Icon {...p} path={<><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.7-1.5A4 4 0 0 0 6 19z"/></>} />;
    const IBulb    = (p) => <Icon {...p} path={<><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></>} />;
    const ISwap    = (p) => <Icon {...p} path={<><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></>} />;

    /* ---------- 通用组件 ---------- */
    const SceneItem = ({ icon: Ic, label }) => (
      <div className="flex flex-col items-center gap-2 text-brand-800 px-2">
        <Ic className="w-7 h-7 text-brand-600" />
        <span className="text-sm font-medium text-slate-700">{label}</span>
      </div>
    );

    // 小标签卡片（库内的功能条）
    const Pill = ({ children, sub }) => (
      <div className="rounded-md bg-brand-50 border border-brand-100 px-3 py-2 text-center text-[13px] text-slate-700 hover:bg-brand-100 transition-colors">
        {children}
        {sub && <span className="text-[11px] text-slate-400 ml-1">{sub}</span>}
      </div>
    );

    // 数据库子卡片（AP库 / TP库 / Maxcompute / Flink）
    const DbCard = ({ icon: Ic, title, tag, items }) => (
      <div className="flex-1 rounded-xl bg-white border border-brand-100 shadow-sm p-4">
        <div className="flex items-center gap-2 mb-3 pb-3 border-b border-slate-100">
          <Ic className="w-6 h-6 text-brand-600" />
          <span className="text-lg font-bold text-slate-800">{title}</span>
          {tag && <span className="text-xs text-slate-400 font-normal">{tag}</span>}
        </div>
        <div className="flex flex-col gap-2">
          {items.map((it, i) => <Pill key={i} sub={it.sub}>{it.label}</Pill>)}
        </div>
      </div>
    );

    /* ---------- 主体 ---------- */
    function App() {
      return (
        <div className="min-h-screen py-10 px-4 flex justify-center">
          <div className="w-full max-w-6xl bg-white rounded-2xl shadow-xl p-8 md:p-10">

            {/* 标题 */}
            <header className="mb-8">
              <div className="flex items-center gap-3">
                <span className="inline-block w-2.5 h-8 bg-brand-700 rounded-sm"></span>
                <h1 className="text-3xl font-extrabold text-slate-800 tracking-wide">存算分离架构图</h1>
              </div>
              <p className="text-brand-700 mt-2 ml-6 text-[15px]">计算与存储解耦，弹性扩展，按需使用，降本增效</p>
            </header>

            {/* 应用场景 */}
            <div className="flex items-stretch rounded-xl border border-brand-100 overflow-hidden shadow-sm mb-2">
              <div className="bg-brand-700 text-white font-bold flex items-center justify-center px-6 text-lg shrink-0 w-32">
                应用场景
              </div>
              <div className="flex-1 flex items-center justify-around py-5 bg-white">
                <SceneItem icon={IChart} label="数据分析" />
                <SceneItem icon={IBrain} label="机器学习" />
                <SceneItem icon={ITrend} label="实时计算" />
                <SceneItem icon={IDb} label="数据服务" />
                <span className="text-2xl text-slate-300 font-bold">···</span>
              </div>
            </div>

            {/* 向下箭头 */}
            <div className="grid grid-cols-2">
              <div className="flex justify-center"><DownArrow /></div>
              <div className="flex justify-center"><DownArrow /></div>
            </div>

            {/* 两大核心列 */}
            <div className="flex flex-col lg:flex-row items-stretch lg:items-center gap-4">

              {/* 左：统一数据目录 */}
              <section className="flex-1 rounded-xl border border-brand-200 bg-brand-50/40 p-5">
                <div className="flex items-center justify-center gap-2 mb-4">
                  <IDb className="w-6 h-6 text-brand-700" />
                  <h2 className="text-xl font-bold text-brand-800">统一数据目录（元数据管理）</h2>
                </div>
                <div className="flex gap-4 items-stretch">
                  <DbCard
                    icon={ITable} title="AP库" tag="（分析型库）"
                    items={[
                      { label: "宽表 / 列式存储" },
                      { label: "大规模分析" },
                      { label: "高吞吐读取" },
                      { label: "数据湖格式支持", sub: "" },
                    ]}
                  />
                  {/* 数据共享 中间分隔 */}
                  <div className="flex flex-col items-center justify-center gap-2 w-16 shrink-0">
                    <ISwap className="w-5 h-5 text-brand-500 rotate-90" />
                    <span className="text-xs text-brand-600 font-medium [writing-mode:vertical-rl] tracking-widest">数据共享</span>
                  </div>
                  <DbCard
                    icon={IDb} title="TP库" tag="（事务型库）"
                    items={[
                      { label: "行式存储" },
                      { label: "高并发事务" },
                      { label: "低延迟写入" },
                      { label: "ACID 事务保证" },
                    ]}
                  />
                </div>
                <p className="text-[11px] text-slate-400 text-center mt-3">（如：Parquet / ORC / Iceberg）</p>
              </section>

              {/* 中间「存算分离」卡片 —— 位于左右两板块之间，垂直居中 */}
              <div className="shrink-0 self-center flex flex-col items-center bg-white border border-brand-100 rounded-xl px-5 py-3 shadow-sm w-full lg:w-52">
                {/* 横向双箭头 */}
                <svg width="120" height="16" viewBox="0 0 120 16" className="text-brand-400 mb-1">
                  <polyline points="10,3 3,8 10,13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  <polyline points="110,3 117,8 110,13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  <line x1="6" y1="8" x2="114" y2="8" stroke="currentColor" strokeWidth="2" strokeDasharray="6 5" strokeLinecap="round"/>
                </svg>
                <h3 className="text-brand-800 font-bold text-lg mb-2">存算分离</h3>
                <div className="flex flex-col gap-1 text-[13px] text-slate-600">
                  {["解耦独立扩展","资源按需使用","弹性伸缩","降本增效"].map((t)=>(
                    <span key={t} className="flex items-center gap-1.5">
                      <span className="text-brand-600">✓</span>{t}
                    </span>
                  ))}
                </div>
              </div>

              {/* 右：计算引擎层 */}
              <section className="flex-1 rounded-xl border border-brand-200 bg-brand-50/40 p-5">
                <div className="flex items-center justify-center gap-2 mb-4">
                  <IGear className="w-6 h-6 text-brand-700" />
                  <h2 className="text-xl font-bold text-brand-800">计算引擎层（弹性计算）</h2>
                </div>
                <div className="flex gap-4 items-stretch">
                  <DbCard
                    icon={INet} title="Maxcompute"
                    items={[
                      { label: "离线批处理 / SQL 分析" },
                      { label: "大规模数据处理" },
                      { label: "与AP库深度集成" },
                      { label: "弹性资源调度" },
                    ]}
                  />
                  <DbCard
                    icon={ISquirrel} title="Flink"
                    items={[
                      { label: "实时流计算" },
                      { label: "低延迟处理" },
                      { label: "与TP库深度集成" },
                      { label: "状态管理 & 容错" },
                    ]}
                  />
                </div>
                <div className="mt-4 rounded-md bg-white border border-brand-100 px-4 py-2.5 flex items-center justify-center gap-3">
                  <span className="font-bold text-brand-800 text-sm">通用计算框架</span>
                  <span className="text-xs text-slate-400">（如：SQL / Python / UDF / ML Library）</span>
                </div>
              </section>
            </div>

            {/* 向下箭头到存储层 */}
            <div className="grid grid-cols-2">
              <div className="flex justify-center"><DownArrow /></div>
              <div className="flex justify-center"><DownArrow /></div>
            </div>

            {/* 存储服务层 */}
            <div className="flex items-stretch rounded-xl border border-brand-200 overflow-hidden shadow-sm mb-6">
              <div className="bg-brand-800 text-white font-bold flex items-center justify-center px-4 text-lg shrink-0 w-32 text-center leading-snug">
                存储服务层
              </div>
              <div className="flex-1 bg-white p-4">
                <div className="flex items-center justify-center gap-2 mb-3">
                  <ICloud className="w-6 h-6 text-brand-600" />
                  <span className="text-lg font-bold text-brand-800">统一存储（对象存储 / 分布式存储）</span>
                </div>
                <div className="grid grid-cols-3 md:grid-cols-6 gap-3">
                  {["高可靠","高扩展","低成本","多副本","生命周期管理","安全合规"].map((t)=>(
                    <Pill key={t}>{t}</Pill>
                  ))}
                </div>
              </div>
            </div>

            {/* 核心价值 */}
            <div className="rounded-xl border-2 border-dashed border-brand-200 bg-brand-50/40 px-5 py-4 flex items-center justify-center gap-3 text-center">
              <IBulb className="w-6 h-6 text-amber-400 shrink-0" />
              <p className="text-slate-700 text-[15px]">
                <span className="font-bold text-brand-800">存算分离的核心价值：</span>
                计算与存储独立演进，灵活弹性，满足多样化业务需求
              </p>
            </div>

          </div>
        </div>
      );
    }

    function DownArrow() {
      return (
        <svg width="22" height="34" viewBox="0 0 22 34" className="text-brand-600 my-1">
          <line x1="11" y1="2" x2="11" y2="26" stroke="currentColor" strokeWidth="2" />
          <polygon points="11,32 5,24 17,24" fill="currentColor" />
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
