<!DOCTYPE html>

<style>

  }

    position: absolute; background: #ffffff; border-radius: 999px;
    box-shadow: 0 0 0 1px rgba(20,30,50,0.05);
  }
  .road-yellow { background: #FFD58A; }
  .pulse-ring {
    box-shadow: 0 0 0 0 rgba(255,126,26,0.45);
    animation: pulse 1.8s infinite;

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,126,26,0.45); }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ---------- 工具 ---------- */
function cn(...classes) { return classes.filter(Boolean).join(" "); }

/* ---------- shadcn 风格基础组件 ---------- */
const Card = ({ className, children }) => (
  <div className={cn("rounded-lg bg-card text-card-foreground shadow-card", className)}>{children}</div>
);

const Button = ({ className, variant = "default", size = "md", children, ...props }) => {
  const variants = {
    default: "bg-primary text-primary-foreground hover:opacity-90",
    secondary: "bg-secondary text-secondary-foreground",
    ghost: "bg-transparent text-foreground hover:bg-muted",
    outline: "border border-border bg-card text-foreground",
  };
  const sizes = {
    sm: "h-8 px-3 text-xs",
    md: "h-10 px-4 text-sm",
    lg: "h-12 px-5 text-base",
    icon: "h-10 w-10",
  };
  return (
    <button className={cn("inline-flex items-center justify-center rounded-md font-medium transition-all active:scale-[0.98]", variants[variant], sizes[size], className)} {...props}>
      {children}
    </button>
  );
};

const Badge = ({ className, children }) => (
  <span className={cn("inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-semibold", className)}>{children}</span>
);

const Separator = ({ className }) => (
  <div className={cn("h-px w-full bg-border", className)} />
);

/* ---------- 图标（内联 SVG） ---------- */

    scan: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M21 7V5a2 2 0 0 0-2-2h-2"/><path d="M3 17v2a2 2 0 0 0 2 2h2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M3 12h18"/></svg>,
    location: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M12 22s7-7.58 7-13a7 7 0 0 0-14 0c0 5.42 7 13 7 13Z"/><circle cx="12" cy="9" r="2.5"/></svg>,

    taxi: <svg viewBox="0 0 24 24" className={className} {...common}><rect x="3" y="11" width="18" height="7" rx="1.5"/><path d="M5 11 7 6h10l2 5"/><path d="M9 6V4h6v2"/><circle cx="7.5" cy="18" r="1.2"/><circle cx="16.5" cy="18" r="1.2"/></svg>,
    bus: <svg viewBox="0 0 24 24" className={className} {...common}><rect x="5" y="4" width="14" height="13" rx="2"/><path d="M5 11h14"/><circle cx="8.5" cy="14.5" r="1"/><circle cx="15.5" cy="14.5" r="1"/><path d="m7 17-1 2"/><path d="m17 17 1 2"/></svg>,

    grid: <svg viewBox="0 0 24 24" className={className} {...common}><rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="4" y="14" width="6" height="6" rx="1.5"/><rect x="14" y="14" width="6" height="6" rx="1.5"/></svg>,

    coupon: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z"/><path d="M12 6v12" strokeDasharray="2 2"/></svg>,
    safe: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="m9 12 2 2 4-4"/></svg>,
    star: <svg viewBox="0 0 24 24" className={className} fill="currentColor" stroke="none"><path d="m12 2 2.9 6.6 7.1.6-5.4 4.7L18.2 21 12 17.3 5.8 21l1.6-7.1L2 9.2l7.1-.6z"/></svg>,
    clock: <svg viewBox="0 0 24 24" className={className} {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
    chevron: <svg viewBox="0 0 24 24" className={className} {...common}><path d="m9 6 6 6-6 6"/></svg>,
    wallet: <svg viewBox="0 0 24 24" className={className} {...common}><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="17" cy="14.5" r="1.2"/></svg>,
    gift: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M3 10h18v4H3z"/><path d="M5 14v6h14v-6"/><path d="M12 8v14"/><path d="M8 8a2 2 0 1 1 4 0"/><path d="M16 8a2 2 0 1 0-4 0"/></svg>,
    headset: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><rect x="3" y="14" width="4" height="6" rx="1.5"/><rect x="17" y="14" width="4" height="6" rx="1.5"/></svg>,
    invite: <svg viewBox="0 0 24 24" className={className} {...common}><circle cx="9" cy="9" r="3.5"/><path d="M3 20c.8-3.4 3.5-5.5 6-5.5s5.2 2.1 6 5.5"/><path d="M17 8v6"/><path d="M14 11h6"/></svg>,
    settings: <svg viewBox="0 0 24 24" className={className} {...common}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3 1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8 1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>,
    voice: <svg viewBox="0 0 24 24" className={className} {...common}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>,
    target: <svg viewBox="0 0 24 24" className={className} {...common}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>,
    plus: <svg viewBox="0 0 24 24" className={className} {...common}><path d="M12 5v14"/><path d="M5 12h14"/></svg>,
  };
  return map[name] || null;
};

/* ---------- 顶部状态栏 ---------- */
function StatusBar({ light = false }) {
  const color = light ? "text-white" : "text-foreground";
  return (
    <div className={cn("flex items-center justify-between px-5 pt-2 pb-1 text-[12px] font-semibold", color)}>
      <span className="num">9:41</span>

        {/* 信号 */}
        <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5" opacity=".4"/></svg>
        {/* wifi */}
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><path d="M1 3.5a10 10 0 0 1 13 0"/><path d="M3 6a7 7 0 0 1 9 0"/><path d="M5 8.5a4 4 0 0 1 5 0"/><circle cx="7.5" cy="10.2" r=".7" fill="currentColor"/></svg>
        {/* 电池 */}
        <svg width="26" height="11" viewBox="0 0 26 11" fill="none" stroke="currentColor" strokeWidth="1"><rect x="0.5" y="0.5" width="22" height="10" rx="2.5"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="23.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
      </div>
    </div>
  );
}

/* ---------- 地图模拟 ---------- */

      {/* 道路 */}

      <div className="road h-2.5 w-[100%] left-0 top-[78%] rotate-[-2deg]" />

      {/* 绿地块 */}

      {/* 河流 */}
      <div className="absolute -right-6 top-[12%] w-40 h-8 rounded-full bg-sky-200/70 rotate-[18deg]" />

      {/* POI */}

        <span className="w-3 h-3 rounded-full bg-blue-500 ring-2 ring-white" />

      </div>
      <div className="absolute right-[18%] top-[62%] flex items-center gap-1">

      <div className="absolute left-[44%] top-[44%]">

}

/* ---------- 顶部搜索 ---------- */
function TopBar() {
  return (
    <div className="px-4 pt-1 pb-3">
      <div className="flex items-center gap-2">
        <button className="w-10 h-10 rounded-full bg-white/95 shadow-card flex items-center justify-center text-foreground">
          <Icon name="user" className="w-5 h-5" />
        </button>
        <div className="flex-1 h-10 rounded-full bg-white/95 shadow-card flex items-center px-3 gap-2">
          <Icon name="search" className="w-4 h-4 text-muted-foreground" />
          <span className="text-sm text-foreground">搜索：地点、车站、品牌</span>
          <span className="ml-auto text-[11px] text-primary font-semibold">滴滴一下</span>
        </div>
        <button className="w-10 h-10 rounded-full bg-white/95 shadow-card flex items-center justify-center">
          <Icon name="scan" className="w-5 h-5" />
        </button>
      </div>
    </div>
  );
}

/* ---------- 服务 Tab ---------- */
const SERVICE_TABS = [
  { key: "car", label: "打车", icon: "car" },
  { key: "premium", label: "专车", icon: "taxi" },
  { key: "hitch", label: "顺风车", icon: "bus" },
  { key: "bike", label: "单车", icon: "bike" },
  { key: "flight", label: "代驾", icon: "plane" },
  { key: "freight", label: "货运", icon: "package" },
];

function ServiceTabs({ active, setActive }) {
  return (
    <div className="px-4">
      <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
        {SERVICE_TABS.map(t => (
          <button key={t.key} onClick={()=>setActive(t.key)}
            className={cn(
              "flex items-center gap-1.5 px-3.5 h-9 rounded-full text-sm font-medium shrink-0 transition-all",
              active === t.key ? "chip-active" : "chip-tab bg-white/15"
            )}>
            <Icon name={t.icon} className="w-4 h-4" />
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---------- 出发到达卡片 ---------- */

              <span className="text-[15px] font-semibold text-foreground">国贸 SKP（建国路 87 号）</span>

      <div className="flex items-center gap-2 mt-3">

/* ---------- 推荐车型 ---------- */
const CAR_TYPES = [
  { name: "特惠快车", tag: "推荐", price: 32.8, sub: "新一口价，更便宜", color: "bg-amber-50 text-amber-700" },
  { name: "快车",      tag: "",     price: 38.0, sub: "5 分钟内接驾",      color: "" },
  { name: "优享",      tag: "舒适", price: 48.0, sub: "舒适车型 / 准时", color: "bg-blue-50 text-blue-700" },
  { name: "专车",      tag: "",     price: 58.0, sub: "高端商务出行",      color: "" },
];

function CarTypeList() {
  const [selected, setSelected] = useState([0,1]);
  const toggle = (i) => setSelected(s => s.includes(i) ? s.filter(x=>x!==i) : [...s, i]);
  return (
    <Card className="mx-4 mt-3 p-2">
      <div className="px-2 pt-2 pb-1 flex items-center justify-between">
        <span className="text-sm font-semibold text-foreground">勾选车型 同时呼叫</span>
        <span className="text-xs text-muted-foreground">已选 {selected.length} 种</span>
      </div>
      <div className="grid grid-cols-2 gap-2 p-1">
        {CAR_TYPES.map((c, i) => {
          const on = selected.includes(i);
          return (
            <button key={i} onClick={()=>toggle(i)}
              className={cn(
                "rounded-md p-3 text-left border transition-all",
                on ? "border-primary bg-secondary/60" : "border-border bg-card"
              )}>
              <div className="flex items-center gap-1.5">
                <span className="text-[15px] font-semibold text-foreground">{c.name}</span>
                {c.tag && <Badge className={cn("font-medium", c.color || "bg-secondary text-secondary-foreground")}>{c.tag}</Badge>}
              </div>
              <div className="text-[11px] text-muted-foreground mt-0.5">{c.sub}</div>
              <div className="mt-1.5 flex items-baseline gap-1">
                <span className="text-[11px] text-muted-foreground">¥</span>
                <span className="text-lg font-bold text-foreground num">{c.price.toFixed(1)}</span>
              </div>
            </button>
          );
        })}
      </div>
    </Card>
  );
}
