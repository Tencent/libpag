<!DOCTYPE html>
<html>
  <head>
    <title>Bilibili Home</title>
  </head>
  <body style="width: 375px; height: 812px; background-color: #F4F5F7; font-family: PingFang SC; display: flex; flex-direction: column;">

    <!-- Status Bar -->
    <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 14px 20px 6px 20px; height: 24px; background-color: #FFFFFF;">
      <span style="font-size: 15px; font-weight: bold; color: #1A1A1A;">9:41</span>
      <div style="display: flex; flex-direction: row; align-items: center; gap: 6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="12" viewBox="0 0 18 12">
          <rect x="0" y="8" width="3" height="4" rx="0.5" fill="#1A1A1A"/>
          <rect x="5" y="5" width="3" height="7" rx="0.5" fill="#1A1A1A"/>
          <rect x="10" y="2" width="3" height="10" rx="0.5" fill="#1A1A1A"/>
          <rect x="15" y="0" width="3" height="12" rx="0.5" fill="#1A1A1A"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="12" viewBox="0 0 26 12">
          <rect x="0" y="0" width="22" height="12" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1"/>
          <rect x="2" y="2" width="16" height="8" rx="1" fill="#1A1A1A"/>
          <rect x="23" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
        </svg>
      </div>
    </div>

    <!-- Top Bar: avatar + search + icons -->
    <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; padding: 8px 14px; background-color: #FFFFFF;">
      <div style="width: 32px; height: 32px; border-radius: 16px; overflow: hidden;">
        <img src="images/bili_avatar_gamer.png" width="32" height="32"/>
      </div>
      <div style="flex: 1; display: flex; flex-direction: row; align-items: center; gap: 8px; height: 32px; padding: 0 12px; background-color: #F4F5F7; border-radius: 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" fill="none" stroke="#9499A0" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="#9499A0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span style="font-size: 13px; color: #9499A0;">原神 4.5 版本前瞻</span>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <rect x="3" y="6" width="18" height="12" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
        <circle cx="8" cy="12" r="1.5" fill="#1A1A1A"/>
        <circle cx="16" cy="12" r="1.5" fill="#1A1A1A"/>
        <line x1="2" y1="9" x2="2" y2="15" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="22" y2="15" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path d="M5 8 a7 7 0 0 1 14 0 v5 l2 3 H3 l2 -3 z" fill="none" stroke="#1A1A1A" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M10 19 a2 2 0 0 0 4 0" fill="none" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Top Tabs -->
    <div style="display: flex; flex-direction: row; align-items: center; gap: 22px; padding: 10px 16px; background-color: #FFFFFF;">
      <span style="font-size: 14px; color: #61666D;">直播</span>
      <span style="font-size: 14px; color: #61666D;">影视</span>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
        <span style="font-size: 16px; font-weight: bold; color: #1A1A1A;">推荐</span>
        <div style="width: 18px; height: 3px; border-radius: 2px; background-color: #FB7299;"></div>
      </div>
      <span style="font-size: 14px; color: #61666D;">热门</span>
      <span style="font-size: 14px; color: #61666D;">追番</span>
      <span style="font-size: 14px; color: #61666D;">知识</span>
    </div>

    <!-- Category Icons Row -->
    <div style="display: flex; flex-direction: row; justify-content: space-evenly; align-items: center; padding: 12px 8px; background-color: #FFFFFF;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #FFEEF3; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <rect x="3" y="6" width="18" height="13" rx="3" fill="#FB7299"/>
            <path d="M7 6 L10 2" stroke="#FB7299" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 6 L14 2" stroke="#FB7299" stroke-width="2" stroke-linecap="round"/>
            <circle cx="9" cy="13" r="1.5" fill="#FFFFFF"/>
            <circle cx="15" cy="13" r="1.5" fill="#FFFFFF"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">动画</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #E8F5FF; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="14" rx="2" fill="#23ADE5"/>
            <polygon points="10,8 16,11 10,14" fill="#FFFFFF"/>
            <line x1="8" y1="21" x2="16" y2="21" stroke="#23ADE5" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">番剧</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #FFF1E6; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" fill="#FF9933"/>
            <path d="M12 6 L13 11 L18 11 L14 14 L15 19 L12 16 L9 19 L10 14 L6 11 L11 11 Z" fill="#FFFFFF"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">国创</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #F0E8FF; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <path d="M9 4 L9 16 a3 3 0 1 1 -3 -3 a3 3 0 0 1 1.5 0.4 L7.5 5 L18 3 L18 14 a3 3 0 1 1 -3 -3 a3 3 0 0 1 1.5 0.4 L16.5 5 Z" fill="#9B59FF"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">音乐</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #E6FBF1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <rect x="3" y="6" width="14" height="10" rx="2" fill="#22C58B"/>
            <polygon points="17,9 22,6 22,16 17,13" fill="#22C58B"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">直播</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
        <div style="width: 44px; height: 44px; border-radius: 22px; background-color: #FFEEEE; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="14" rx="2" fill="none" stroke="#F4434A" stroke-width="2"/>
            <line x1="8" y1="20" x2="16" y2="20" stroke="#F4434A" stroke-width="2" stroke-linecap="round"/>
            <polygon points="10,7 15,10 10,13" fill="#F4434A"/>
          </svg>
        </div>
        <span style="font-size: 11px; color: #1A1A1A;">课堂</span>
      </div>
    </div>

    <!-- Video Grid -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 8px; padding: 8px;">
      <!-- Row 1 -->
      <div style="display: flex; flex-direction: row; gap: 8px;">
        <!-- Card 1 -->
        <div style="flex: 1; display: flex; flex-direction: column; background-color: #FFFFFF; border-radius: 6px; overflow: hidden;">
          <div style="width: 100%; height: 96px; overflow: hidden;">
            <img src="images/bili_cover_game.png" width="100%" height="96"/>
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; padding: 6px 8px 8px 8px;">
            <span style="font-size: 12px; color: #1A1A1A; line-height: 16px;">【4K60帧】原神璃月新地图全收集 顶级画质演示</span>
            <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <polygon points="6,4 20,12 6,20" fill="#9499A0"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">128.6万</span>
              </div>
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9499A0" stroke-width="2"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke="#9499A0" stroke-width="2"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">2.3万</span>
              </div>
            </div>
          </div>
        </div>
        <!-- Card 2 -->
        <div style="flex: 1; display: flex; flex-direction: column; background-color: #FFFFFF; border-radius: 6px; overflow: hidden;">
          <div style="width: 100%; height: 96px; overflow: hidden;">
            <img src="images/bili_cover_food.png" width="100%" height="96"/>
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; padding: 6px 8px 8px 8px;">
            <span style="font-size: 12px; color: #1A1A1A; line-height: 16px;">深夜炸厨房！博多豚骨拉面从0到1全教程</span>
            <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <polygon points="6,4 20,12 6,20" fill="#9499A0"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">56.2万</span>
              </div>
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9499A0" stroke-width="2"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke="#9499A0" stroke-width="2"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">8932</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Row 2 -->
      <div style="display: flex; flex-direction: row; gap: 8px;">
        <!-- Card 3 -->
        <div style="flex: 1; display: flex; flex-direction: column; background-color: #FFFFFF; border-radius: 6px; overflow: hidden;">
          <div style="width: 100%; height: 96px; overflow: hidden;">
            <img src="images/bili_cover_tech.png" width="100%" height="96"/>
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; padding: 6px 8px 8px 8px;">
            <span style="font-size: 12px; color: #1A1A1A; line-height: 16px;">2026 旗舰手机横评：影像/性能/续航 谁是真王者</span>
            <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <polygon points="6,4 20,12 6,20" fill="#9499A0"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">312.4万</span>
              </div>
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9499A0" stroke-width="2"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke="#9499A0" stroke-width="2"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">5.6万</span>
              </div>
            </div>
          </div>
        </div>
        <!-- Card 4 -->
        <div style="flex: 1; display: flex; flex-direction: column; background-color: #FFFFFF; border-radius: 6px; overflow: hidden;">
          <div style="width: 100%; height: 96px; overflow: hidden;">
            <img src="images/bili_cover_anime.png" width="100%" height="96"/>
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; padding: 6px 8px 8px 8px;">
            <span style="font-size: 12px; color: #1A1A1A; line-height: 16px;">小猫日常 | 第一次见到雪是什么反应？太萌了</span>
            <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <polygon points="6,4 20,12 6,20" fill="#9499A0"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">88.1万</span>
              </div>
              <div style="display: flex; flex-direction: row; align-items: center; gap: 3px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24">
                  <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9499A0" stroke-width="2"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke="#9499A0" stroke-width="2"/>
                </svg>
                <span style="font-size: 11px; color: #9499A0;">1.2万</span>
              </div>
            </div>
          </div>
        </div>

    <!-- Bottom Tab Bar -->
    <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-evenly; padding: 6px 0 18px 0; background-color: #FFFFFF; border: 1px solid #EFEFEF;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <path d="M3 11 L12 3 L21 11 V20 a1 1 0 0 1 -1 1 H4 a1 1 0 0 1 -1 -1 Z" fill="#FB7299"/>
        </svg>
        <span style="font-size: 10px; color: #FB7299;">首页</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="#9499A0" stroke-width="2"/>
          <polygon points="10,9 16,12 10,15" fill="#9499A0"/>
        </svg>
        <span style="font-size: 10px; color: #9499A0;">频道</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" fill="none" stroke="#9499A0" stroke-width="2"/>

        <span style="font-size: 10px; color: #9499A0;">动态</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <path d="M3 7 L6 4 H18 L21 7 V19 a1 1 0 0 1 -1 1 H4 a1 1 0 0 1 -1 -1 Z" fill="none" stroke="#9499A0" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 11 a3 3 0 0 0 6 0" fill="none" stroke="#9499A0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span style="font-size: 10px; color: #9499A0;">会员购</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4" fill="none" stroke="#9499A0" stroke-width="2"/>
          <path d="M4 21 a8 8 0 0 1 16 0" fill="none" stroke="#9499A0" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span style="font-size: 10px; color: #9499A0;">我的</span>
      </div>
    </div>
