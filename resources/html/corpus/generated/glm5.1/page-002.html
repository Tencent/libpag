<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>报告目录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; padding: 0; }
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; margin: 0; font-family: 'Noto Sans SC', sans-serif; }
  *, *::before, *::after { animation: none !important; transition: none !important; }
  .star-decor { color: #2563EB; font-weight: bold; }
  .italic-heading { font-style: italic; transform: skewX(-5deg); }
</style>
</head>
<body>
<div class="slide bg-[#F5F0E8]">
  <!-- 页眉 -->
  <div class="absolute top-[0px] left-[0px] right-[0px] h-[72px] flex items-center justify-between px-[48px] pt-[8px]">
    <div class="flex items-center gap-[12px]">
      <span class="star-decor text-[24px]">*</span>
      <span class="text-[16px] font-[500] text-[#111827]">报告目录</span>
    </div>
    <span class="text-[14px] text-[#6B7280]">第 02 页</span>
  </div>

  <!-- 标题 -->
  <div class="pt-[100px] px-[48px]">
    <div class="italic-heading">
      <h1 class="text-[60px] font-[900] italic leading-[1.25] text-[#111827]" style="transform: skewX(-5deg);">
        报告目录
      </h1>
    </div>
    <div class="w-[96px] h-[4px] bg-[#2563EB] mt-[16px]"></div>
    <div class="text-[18px] text-[#4B5563] mt-[16px]">五大维度，全景透视中国宠物经济</div>
  </div>

  <!-- 目录列表 -->
  <div class="px-[48px] mt-[40px]">
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">01</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">市场全景</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">3100亿时代来临</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">02</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">猫经济崛起</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">从追赶到超越</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">03</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">消费结构</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">食品为王，医疗承压</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">04</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">宠主画像</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">年轻化浪潮</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">05</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">消费升级</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">拟人化驱动增长</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px] border-b-[1px] border-[#D1D5DB]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">06</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">新兴赛道</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">智能与跨界双轮驱动</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
    <div class="flex items-start gap-[24px] py-[20px]">
      <span class="text-[36px] font-[900] italic text-[#2563EB]">07</span>
      <div class="flex-1">
        <div class="text-[20px] font-[700] text-[#111827]">未来展望</div>
        <div class="text-[14px] text-[#4B5563] mt-[4px]">迈向万亿市场</div>
      </div>
      <span class="star-decor text-[20px]">*</span>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="absolute bottom-[32px] left-[48px] flex items-center gap-[12px]">
    <i class="ph ph-fish text-[#2563EB] text-[24px]"></i>
    <span class="text-[14px] text-[#6B7280]">中国宠物经济趋势洞察</span>
  </div>
  <div class="absolute bottom-[32px] right-[48px] grid grid-cols-3 gap-[4px]">
    <div class="w-[16px] h-[16px] bg-[#2563EB]/20"></div>
    <div class="w-[16px] h-[16px] bg-[#2563EB]/40"></div>
    <div class="w-[16px] h-[16px] bg-[#2563EB]/20"></div>
    <div class="w-[16px] h-[16px] bg-[#2563EB]/40"></div>
    <div class="w-[16px] h-[16px] bg-[#2563EB]/20"></div>
    <div class="w-[16px] h-[16px] bg-[#2563EB]/40"></div>
  </div>
</div>
</body>
</html>
