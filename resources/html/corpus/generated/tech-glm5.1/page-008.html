<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球UI/UX市场分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus_Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
    .geometric-ring {
      border: 1px solid #111111;
      border-radius: 50%;
      position: absolute;
    }
    .grid-line {
      position: absolute;
      background: rgba(17,17,17,0.06);
    }
    .metric-card {
      border: 1px solid rgba(17,17,17,0.2);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .metric-value {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#DFDDDA;">
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Grid lines -->
    <div class="grid-line" style="top:0; left:500px; width:1px; height:720px;"></div>
    <div class="grid-line" style="top:100px; left:0; width:1280px; height:1px;"></div>

    <!-- Geometric ring decorations -->
    <div class="geometric-ring" style="top:-30px; right:-30px; width:120px; height:120px;"></div>
    <div class="geometric-ring" style="bottom:40px; left:-25px; width:90px; height:90px;"></div>

    <!-- Header (zone-1) -->
    <div style="position:absolute; top:30px; left:60px; width:1160px; height:60px;">
      <p style="font-size:14px; font-weight:400; opacity:0.5; margin:0 0 4px 0;">08</p>
      <h1 style="font-size:56px; font-weight:600; letter-spacing:-0.025em; margin:0; line-height:1.1;">全球UI/UX市场分析</h1>
    </div>

    <!-- Left side - Data metrics (zone-2) -->
    <div style="position:absolute; top:110px; left:60px; width:420px; height:530px;">
      <p style="font-size:20px; font-weight:500; opacity:0.6; margin:0 0 20px 0;">高速增长的千亿级赛道</p>

      <div class="metric-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
          <i class="ph ph-chart-bar" style="font-size:20px; opacity:0.5;"></i>
          <span style="font-size:14px; font-weight:400; opacity:0.5;">2025年市场规模</span>
        </div>
        <p class="metric-value">21.4<span style="font-size:16px; font-weight:400; opacity:0.5; margin-left:4px;">亿美元</span></p>
      </div>

      <div class="metric-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
          <i class="ph ph-globe-hemisphere-west" style="font-size:20px; opacity:0.5;"></i>
          <span style="font-size:14px; font-weight:400; opacity:0.5;">2035年预计规模</span>
        </div>
        <p class="metric-value">159.9<span style="font-size:16px; font-weight:400; opacity:0.5; margin-left:4px;">亿美元</span></p>
      </div>

      <div class="metric-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;">
          <i class="ph ph-arrow-up-right" style="font-size:20px; opacity:0.5;"></i>
          <span style="font-size:14px; font-weight:400; opacity:0.5;">复合年增长率</span>
        </div>
        <p class="metric-value">22.25<span style="font-size:16px; font-weight:400; opacity:0.5; margin-left:4px;">%</span></p>
        <p style="font-size:13px; font-weight:400; opacity:0.4; margin:4px 0 0 0;">CAGR</p>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="metric-card" style="margin-bottom:0;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <i class="ph ph-cloud" style="font-size:18px; opacity:0.5;"></i>
            <span style="font-size:13px; font-weight:400; opacity:0.5;">云部署</span>
          </div>
          <p style="font-size:28px; font-weight:600; margin:0; letter-spacing:-0.025em;">61%</p>
        </div>
        <div class="metric-card" style="margin-bottom:0;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <i class="ph ph-hard-drives" style="font-size:18px; opacity:0.5;"></i>
            <span style="font-size:13px; font-weight:400; opacity:0.5;">本地部署</span>
          </div>
          <p style="font-size:28px; font-weight:600; margin:0; letter-spacing:-0.025em;">39%</p>
        </div>
      </div>

      <div style="margin-top:14px; padding:12px 16px; border:1px solid rgba(17,17,17,0.15); border-radius:6px; display:flex; align-items:flex-start; gap:8px;">
        <i class="ph ph-crown-simple" style="font-size:18px; opacity:0.5; flex-shrink:0; margin-top:2px;"></i>
        <p style="font-size:14px; font-weight:400; line-height:1.5; opacity:0.7; margin:0;">Figma市占率80-90%，约54万付费客户，一超多强格局</p>
      </div>
    </div>

    <!-- Right side - Chart (zone-3) -->
    <div style="position:absolute; top:110px; left:520px; width:700px; height:530px;">
      <div id="market-chart" style="width:700px; height:530px;"></div>
    </div>

    <!-- Highlight bar (zone-4) -->
    <div style="position:absolute; top:660px; left:60px; width:1160px; height:30px; display:flex; align-items:center; border-top:1px solid rgba(17,17,17,0.2); padding-top:4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="margin-right:8px; flex-shrink:0;">
        <path d="M7 7l10 10M17 7v10H7"/>
      </svg>
      <p style="font-size:14px; font-weight:500; margin:0;">十年七倍增长，CAGR 22.25%</p>
    </div>

    <!-- Footer -->
    <div style="position:absolute; bottom:16px; left:60px; right:60px; display:flex; justify-content:space-between;">
      <p style="font-size:14px; font-weight:400; opacity:0.4; margin:0;">腾讯Ardot设计平台 - 分析与竞品分析报告</p>
      <p style="font-size:14px; font-weight:400; opacity:0.4; margin:0;">08</p>
    </div>
  </div>

  <script>
    var chart = echarts.init(document.getElementById('market-chart'));
    var option = {
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        backgroundColor: '#111111',
        borderColor: '#111111',
        textStyle: { color: '#DFDDDA', fontFamily: 'Plus Jakarta Sans', fontSize: 13 },
        formatter: function(params) {
          var p = params[0];
          return p.name + '<br/>市场规模: ' + p.value + ' 亿美元';
        }
      },
      grid: {
        left: 60,
        right: 30,
        top: 50,
        bottom: 50
      },
      title: {
        text: '全球UI/UX市场规模趋势 (2025-2035)',
        left: 'left',
        top: 8,
        textStyle: {
          fontFamily: 'Plus Jakarta Sans',
          fontSize: 16,
          fontWeight: 500,
          color: '#111111'
        }
      },
      xAxis: {
        type: 'category',
        data: ['2025', '2026', '2028', '2030', '2032', '2035'],
        axisLine: { lineStyle: { color: 'rgba(17,17,17,0.2)' } },
        axisTick: { show: false },
        axisLabel: {
          fontFamily: 'Plus Jakarta Sans',
          fontSize: 14,
          color: '#111111'
        }
      },
      yAxis: {
        type: 'value',
        name: '亿美元',
        nameTextStyle: {
          fontFamily: 'Plus Jakarta Sans',
          fontSize: 12,
          color: 'rgba(17,17,17,0.5)',
          padding: [0, 40, 0, 0]
        },
        splitNumber: 4,
        axisLine: { show: false },
        axisTick: { show: false },
        splitLine: { lineStyle: { color: 'rgba(17,17,17,0.08)', type: 'dashed' } },
        axisLabel: {
          fontFamily: 'Plus Jakarta Sans',
          fontSize: 12,
          color: 'rgba(17,17,17,0.5)'
        }
      },
      series: [
        {
          name: '市场规模(亿美元)',
          type: 'bar',
          barWidth: 52,
          data: [21.4, 26.2, 39.1, 58.4, 87.2, 159.9],
          itemStyle: {
            color: function(params) {
              var colors = ['#E5E5E5', '#E5E5E5', '#A3A3A3', '#A3A3A3', '#666666', '#111111'];
              return colors[params.dataIndex];
            },
            borderRadius: [4, 4, 0, 0]
          },
          label: {
            show: true,
            position: 'top',
            fontFamily: 'Plus Jakarta Sans',
            fontSize: 13,
            fontWeight: 500,
            color: '#111111',
            formatter: function(params) {
              return params.value + '';
            }
          }
        }
      ]
    };
    chart.setOption(option);
  </script>
</body>
</html>
