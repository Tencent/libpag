<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI协同设计能力</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus_Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
    .grid-line {
      position: absolute;
      background: rgba(17,17,17,0.2);
    }
    .grid-line-h {
      width: 100%;
      height: 1px;
      left: 0;
    }
    .feature-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(17,17,17,0.1);
      height: 100%;
    }
    .feature-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(17,17,17,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .connector-line {
      position: absolute;
      left: 99px;
      width: 1px;
      background: rgba(17,17,17,0.2);
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#DFDDDA;">
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Grid lines -->
    <div class="grid-line grid-line-h" style="top: 100px;"></div>

    <!-- Vertical connector line between feature items -->
    <div class="connector-line" style="top: 165px; height: 450px;"></div>

    <!-- zone-1: Title area -->
    <div style="position:absolute; top:30px; left:60px; width:1160px; height:70px;">
      <h1 style="font-size:56px; font-weight:600; letter-spacing:-0.025em; margin:0; line-height:1.2;">AI协同设计能力</h1>
      <p style="font-size:20px; font-weight:500; color:rgba(17,17,17,0.5); margin:8px 0 0 0;">五大AI功能矩阵</p>
    </div>

    <!-- zone-2: Feature 1 - 文生UI -->
    <div style="position:absolute; top:120px; left:60px; width:1160px; height:90px;">
      <div class="feature-row">
        <div class="feature-icon"><i class="ph ph-text-aa" style="font-size:20px;"></i></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <div>
          <p style="font-size:18px; font-weight:500; margin:0;">文生UI，描述即生成</p>
          <p style="font-size:14px; font-weight:400; line-height:1.5; color:rgba(17,17,17,0.6); margin:4px 0 0 0;">用自然语言描述需求，AI自动生成布局与组件，快速搭建起稿结构</p>
        </div>
      </div>
    </div>

    <!-- zone-3: Feature 2 - 图片转稿 -->
    <div style="position:absolute; top:220px; left:60px; width:1160px; height:90px;">
      <div class="feature-row">
        <div class="feature-icon"><i class="ph ph-image" style="font-size:20px;"></i></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <div>
          <p style="font-size:18px; font-weight:500; margin:0;">图片秒变设计稿</p>
          <p style="font-size:14px; font-weight:400; line-height:1.5; color:rgba(17,17,17,0.6); margin:4px 0 0 0;">上传图片，智能分层，转为可编辑设计稿</p>
        </div>
      </div>
    </div>

    <!-- zone-4: Feature 3 - AI助手 -->
    <div style="position:absolute; top:320px; left:60px; width:1160px; height:90px;">
      <div class="feature-row">
        <div class="feature-icon"><i class="ph ph-chat-circle-dots" style="font-size:20px;"></i></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <div>
          <p style="font-size:18px; font-weight:500; margin:0;">AI助手</p>
          <p style="font-size:14px; font-weight:400; line-height:1.5; color:rgba(17,17,17,0.6); margin:4px 0 0 0;">智能重命名、生成图片、链接转UI、AI搜索，协作每个设计环节</p>
        </div>
      </div>
    </div>

    <!-- zone-5: Feature 4 - 图文生图 -->
    <div style="position:absolute; top:420px; left:60px; width:1160px; height:90px;">
      <div class="feature-row">
        <div class="feature-icon"><i class="ph ph-paint-brush" style="font-size:20px;"></i></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <div>
          <p style="font-size:18px; font-weight:500; margin:0;">文/图生图</p>
          <p style="font-size:14px; font-weight:400; line-height:1.5; color:rgba(17,17,17,0.6); margin:4px 0 0 0;">快速生成插画、配图、运营海报等视觉素材</p>
        </div>
      </div>
    </div>

    <!-- zone-6: Feature 5 - 批量图标 -->
    <div style="position:absolute; top:520px; left:60px; width:1160px; height:90px;">
      <div class="feature-row" style="border-bottom:none;">
        <div class="feature-icon"><i class="ph ph-stack" style="font-size:20px;"></i></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <div>
          <p style="font-size:18px; font-weight:500; margin:0;">批量生成同风格矢量图标</p>
          <p style="font-size:14px; font-weight:400; line-height:1.5; color:rgba(17,17,17,0.6); margin:4px 0 0 0;">一键生成整套风格统一的矢量图标</p>
        </div>
      </div>
    </div>

    <!-- zone-7: Highlight bar -->
    <div style="position:absolute; top:640px; left:60px; width:1160px; height:40px; display:flex; align-items:center; gap:8px; border-top:1px solid rgba(17,17,17,0.2); padding-top:8px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <span style="font-size:16px; font-weight:500; color:rgba(17,17,17,0.8);">从描述到设计稿，AI贯穿每个环节</span>
    </div>

    <!-- Footer -->
    <div style="position:absolute; bottom:20px; left:60px; width:1160px; height:20px; display:flex; justify-content:space-between;">
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">腾讯Ardot设计平台</span>
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">04 / 15</span>
    </div>

  </div>
</body>
</html>
