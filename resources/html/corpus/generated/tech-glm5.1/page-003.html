<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品概述与定位</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus_Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
    .grid-line {
      position: absolute;
      background: rgba(17,17,17,0.2);
    }
    .grid-line-h {
      width: 100%;
      height: 1px;
      left: 0;
    }
    .grid-line-v {
      height: 100%;
      width: 1px;
      top: 0;
    }
    .tag {
      border: 1px solid rgba(17,17,17,0.2);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      display: inline-block;
      margin: 6px;
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#DFDDDA;">
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Grid lines -->
    <div class="grid-line grid-line-h" style="top: 100px;"></div>
    <div class="grid-line grid-line-v" style="left: 670px;"></div>

    <!-- zone-1: Title area -->
    <div style="position:absolute; top:30px; left:60px; width:1160px; height:70px;">
      <h1 style="font-size:56px; font-weight:600; letter-spacing:-0.025em; margin:0; line-height:1.2;">产品概述与定位</h1>
    </div>

    <!-- zone-2: Left - Positioning description -->
    <div style="position:absolute; top:120px; left:60px; width:600px; height:480px;">
      <p style="font-size:20px; font-weight:500; color:rgba(17,17,17,0.6); margin:0 0 24px 0;">AI驱动的产设研协作平台</p>

      <div style="margin-bottom:20px; display:flex; align-items:flex-start; gap:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0; margin-top:4px;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p style="font-size:16px; font-weight:400; line-height:1.625; color:rgba(17,17,17,0.75); margin:0;">Ardot是腾讯设计推出的下一代AI驱动智能设计工具，由开发腾讯CodeBuddy的同一团队打造</p>
      </div>

      <div style="margin-bottom:20px; display:flex; align-items:flex-start; gap:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0; margin-top:4px;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p style="font-size:16px; font-weight:400; line-height:1.625; color:rgba(17,17,17,0.75); margin:0;">底层基于腾讯混元大模型与优图视觉算法，面向设计师与产品经理</p>
      </div>

      <div style="margin-bottom:20px; display:flex; align-items:flex-start; gap:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0; margin-top:4px;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p style="font-size:16px; font-weight:400; line-height:1.625; color:rgba(17,17,17,0.75); margin:0;">支持多人实时协作的UI/UX设计工具</p>
      </div>

      <div style="margin-bottom:20px; display:flex; align-items:flex-start; gap:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" style="flex-shrink:0; margin-top:4px;"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p style="font-size:16px; font-weight:400; line-height:1.625; color:rgba(17,17,17,0.75); margin:0;">核心定位：AI驱动的产设研协作平台，让AI生成的每一个设计稿都成为可编辑、可复用、可交付的团队资产</p>
      </div>

      <div style="margin-top:36px; padding:20px 24px; border-left:3px solid #111111; background:rgba(17,17,17,0.03);">
        <p style="font-size:18px; font-weight:500; margin:0; color:#111111;">智能设计工具，让灵感鲜活落地</p>
      </div>
    </div>

    <!-- zone-3: Right - Capability tags -->
    <div style="position:absolute; top:120px; left:700px; width:520px; height:480px;">
      <div style="display:flex; flex-wrap:wrap; align-content:flex-start; gap:0;">
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-brain" style="font-size:18px;"></i>混元大模型</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-eye" style="font-size:18px;"></i>优图视觉算法</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-users-three" style="font-size:18px;"></i>多人实时协作</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-puzzle-piece" style="font-size:18px;"></i>UI/UX设计</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-code" style="font-size:18px;"></i>代码交付</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-target" style="font-size:18px;"></i>资产化管理</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-plug-connected" style="font-size:18px;"></i>MCP协议</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-cloud" style="font-size:18px;"></i>云端部署</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-shield-check" style="font-size:18px;"></i>企业级安全</div>
        <div class="tag" style="display:flex; align-items:center; gap:8px;"><i class="ph ph-arrow-right" style="font-size:18px;"></i>Figma导入</div>
      </div>

      <!-- Geometric ring decoration -->
      <div style="position:absolute; bottom:40px; right:20px; width:160px; height:160px; border:1px solid #111111; border-radius:50%; opacity:0.15;"></div>
      <div style="position:absolute; bottom:60px; right:60px; width:80px; height:80px; border:1px solid #111111; border-radius:50%; opacity:0.1;"></div>
    </div>

    <!-- zone-4: Highlight bar -->
    <div style="position:absolute; top:630px; left:60px; width:1160px; height:50px; display:flex; align-items:center; gap:8px; border-top:1px solid rgba(17,17,17,0.2); padding-top:16px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <span style="font-size:16px; font-weight:500; color:rgba(17,17,17,0.8);">可编辑、可复用、可交付的团队资产</span>
    </div>

    <!-- Footer -->
    <div style="position:absolute; bottom:20px; left:60px; width:1160px; height:20px; display:flex; justify-content:space-between;">
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">腾讯Ardot设计平台</span>
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">03 / 15</span>
    </div>

  </div>
</body>
</html>
