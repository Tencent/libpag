<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>腾讯Ardot设计平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus_Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
    .geometric-ring {
      border: 1px solid #111111;
      border-radius: 50%;
      position: absolute;
    }
    .grid-line {
      position: absolute;
      background: rgba(17,17,17,0.2);
    }
    .grid-line-h {
      width: 100%;
      height: 1px;
      left: 0;
    }
    .grid-line-v {
      height: 100%;
      width: 1px;
      top: 0;
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#DFDDDA;">
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif;">

    <!-- Grid lines -->
    <div class="grid-line grid-line-h" style="top: 200px;"></div>
    <div class="grid-line grid-line-h" style="top: 330px;"></div>
    <div class="grid-line grid-line-h" style="top: 480px;"></div>
    <div class="grid-line grid-line-v" style="left: 340px;"></div>
    <div class="grid-line grid-line-v" style="left: 940px;"></div>

    <!-- Geometric decorations - top left -->
    <div class="geometric-ring" style="top: 30px; left: 60px; width: 120px; height: 120px;"></div>
    <div class="geometric-ring" style="top: 60px; left: 150px; width: 80px; height: 80px;"></div>
    <div class="geometric-ring" style="top: 20px; left: 200px; width: 40px; height: 40px;"></div>

    <!-- Geometric decorations - bottom right -->
    <div class="geometric-ring" style="bottom: 40px; right: 80px; width: 140px; height: 140px;"></div>
    <div class="geometric-ring" style="bottom: 60px; right: 180px; width: 60px; height: 60px;"></div>
    <div class="geometric-ring" style="bottom: 20px; right: 240px; width: 30px; height: 30px;"></div>

    <!-- zone-1: Main title -->
    <div style="position:absolute; top:200px; left:340px; width:600px; height:120px;">
      <h1 style="font-size:96px; font-weight:600; letter-spacing:-0.025em; line-height:1.1; margin:0;">
        腾讯Ardot设计平台
      </h1>
    </div>

    <!-- zone-2: Subtitle -->
    <div style="position:absolute; top:330px; left:340px; width:600px; height:60px;">
      <p style="font-size:24px; font-weight:500; color:rgba(17,17,17,0.7); margin:0;">
        分析与竞品分析报告
      </p>
    </div>

    <!-- zone-3: Highlight text -->
    <div style="position:absolute; top:410px; left:340px; width:600px; height:40px;">
      <p style="font-size:16px; font-weight:400; line-height:1.625; color:rgba(17,17,17,0.6); margin:0; display:flex; align-items:center; gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2"><path d="M7 7l10 10M17 7v10H7"/></svg>
        AI驱动的产设研协作平台深度解读
      </p>
    </div>

    <!-- zone-4: Date -->
    <div style="position:absolute; top:480px; left:490px; width:300px; height:36px;">
      <p style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.5); margin:0; text-align:center;">
        2026年5月
      </p>
    </div>

    <!-- Footer -->
    <div style="position:absolute; bottom:20px; left:60px; width:1160px; height:20px; display:flex; justify-content:space-between;">
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">腾讯Ardot设计平台</span>
      <span style="font-size:14px; font-weight:400; color:rgba(17,17,17,0.4);">01 / 15</span>
    </div>

  </div>
</body>
</html>
