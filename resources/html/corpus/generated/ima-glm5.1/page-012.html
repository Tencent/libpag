<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>从工具到伙伴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<style>
body { margin: 0; padding: 0; }
.slide {
  width: 1280px; height: 720px; overflow: hidden; position: relative; margin: 0;
  background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);
  font-family: 'Noto Sans SC', sans-serif; color: #FFFFFF;
}
*, *::before, *::after { animation: none !important; transition: none !important; }
</style>
</head>
<body>
<div class="slide">
  <!-- Watermark -->
  <div class="absolute text-[500px] font-[900] text-[#FFFFFF]/[0.02] leading-none whitespace-nowrap select-none" style="z-index:0; top: 60px; left: 100px;">PARTNER</div>

  <!-- Giant Parentheses Statement -->
  <div class="absolute flex flex-col items-center justify-center" style="z-index:20; top: 100px; left: 0; right: 0;">
    <div class="text-[16px] font-[300] text-[#FFFFFF]/40 tracking-[0.1em] mb-[16px]">ESSENCE OF NURTURING PERSONALITY</div>
    <div class="flex items-center gap-[24px]">
      <span class="text-[100px] font-[300] text-[#FFFFFF] leading-none">(</span>
      <div class="flex flex-col items-center">
        <h1 class="text-[72px] font-[300] text-[#FFFFFF] leading-[1.1] tracking-[0.05em]">从工具</h1>
        <h1 class="text-[72px] font-[300] text-[#82D0A4] leading-[1.1] tracking-[0.05em]">到伙伴</h1>
      </div>
      <span class="text-[100px] font-[300] text-[#FFFFFF] leading-none">)</span>
    </div>
    <div class="text-[16px] font-[300] text-[#FFFFFF]/40 mt-[20px] max-w-[600px] text-center leading-[1.6]">它不是一个功能，而是一种产品哲学——<br>从"人使用工具"变成"人养育伙伴"</div>
  </div>

  <!-- Summary Table -->
  <div class="absolute" style="z-index:20; top: 380px; left: 140px; width: 1000px;">
    <div class="flex flex-col gap-[10px]">
      <div class="flex items-center gap-[16px]">
        <div class="w-[80px] text-[14px] font-[500] text-[#82D0A4]">灵魂层</div>
        <div class="w-[80px] text-[13px] text-[#FFFFFF]/40">它是谁</div>
        <div class="flex-1 h-[1px] bg-[#FFFFFF]/10"></div>
        <div class="w-[160px] text-[13px] text-[#FFFFFF]/50">SOUL + IDENTITY</div>
        <div class="w-[200px] text-[12px] text-[#FFFFFF]/30">人的性格和名字</div>
      </div>
      <div class="flex items-center gap-[16px]">
        <div class="w-[80px] text-[14px] font-[500] text-[#82D0A4]">关系层</div>
        <div class="w-[80px] text-[13px] text-[#FFFFFF]/40">它认识谁</div>
        <div class="flex-1 h-[1px] bg-[#FFFFFF]/10"></div>
        <div class="w-[160px] text-[13px] text-[#FFFFFF]/50">USER + MEMORY</div>
        <div class="w-[200px] text-[12px] text-[#FFFFFF]/30">人的社交关系和记忆</div>
      </div>
      <div class="flex items-center gap-[16px]">
        <div class="w-[80px] text-[14px] font-[500] text-[#82D0A4]">流程层</div>
        <div class="w-[80px] text-[13px] text-[#FFFFFF]/40">它怎么做事</div>
        <div class="flex-1 h-[1px] bg-[#FFFFFF]/10"></div>
        <div class="w-[160px] text-[13px] text-[#FFFFFF]/50">AGENTS</div>
        <div class="w-[200px] text-[12px] text-[#FFFFFF]/30">人的工作方法论</div>
      </div>
      <div class="flex items-center gap-[16px]">
        <div class="w-[80px] text-[14px] font-[500] text-[#82D0A4]">能力层</div>
        <div class="w-[80px] text-[13px] text-[#FFFFFF]/40">它能做什么</div>
        <div class="flex-1 h-[1px] bg-[#FFFFFF]/10"></div>
        <div class="w-[160px] text-[13px] text-[#FFFFFF]/50">Skills</div>
        <div class="w-[200px] text-[12px] text-[#FFFFFF]/30">人的专业技能</div>
      </div>
      <div class="flex items-center gap-[16px]">
        <div class="w-[80px] text-[14px] font-[500] text-[#82D0A4]">行为层</div>
        <div class="w-[80px] text-[13px] text-[#FFFFFF]/40">主动做什么</div>
        <div class="flex-1 h-[1px] bg-[#FFFFFF]/10"></div>
        <div class="w-[160px] text-[13px] text-[#FFFFFF]/50">Heartbeat / Cron</div>
        <div class="w-[200px] text-[12px] text-[#FFFFFF]/30">人的主动性和责任心</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center" style="z-index:50;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]">养成·共生</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
  </div>
</div>
</body>
</html>
