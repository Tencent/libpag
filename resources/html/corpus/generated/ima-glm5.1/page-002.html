<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>什么是养成系人格体系</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<style>
body { margin: 0; padding: 0; }
.slide {
  width: 1280px; height: 720px; overflow: hidden; position: relative; margin: 0;
  background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);
  font-family: 'Noto Sans SC', sans-serif; color: #FFFFFF;
}
*, *::before, *::after { animation: none !important; transition: none !important; }
</style>
</head>
<body>
<div class="slide">
  <!-- Watermark -->
  <div class="absolute text-[400px] font-[900] text-[#FFFFFF]/[0.02] leading-none whitespace-nowrap select-none" style="z-index:0; top: 120px; left: 300px;">DEFINE</div>

  <!-- Page Header -->
  <div class="absolute top-[32px] right-[48px]" style="z-index:50;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
  </div>

  <!-- Core Statement -->
  <div class="absolute" style="z-index:20; top: 160px; left: 140px; width: 1000px;">
    <div class="text-[20px] font-[300] text-[#FFFFFF]/60 tracking-[0.1em] mb-[16px]">WHAT IS NURTURING PERSONALITY</div>
    <h1 class="text-[36px] font-[300] text-[#FFFFFF] leading-[1.4]">
      让 AI 从"冷冰冰的工具"变成<br>"越用越懂你的<span class="text-[#82D0A4]">专属伙伴</span>"
    </h1>
  </div>

  <!-- Three Pillars -->
  <div class="absolute flex gap-[40px]" style="z-index:20; top: 340px; left: 140px; width: 1000px;">
    <div class="flex-1 border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[16px] p-[32px] flex flex-col items-center">
      <i class="ph ph-brain text-[32px] text-[#82D0A4] mb-[12px]"></i>
      <div class="text-[20px] font-[400] text-[#FFFFFF] mb-[8px]">持久的记忆</div>
      <div class="text-[14px] text-[#FFFFFF]/50 leading-[1.6] text-center">不再每次对话都失忆<br>越聊越懂你</div>
    </div>
    <div class="flex-1 border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[16px] p-[32px] flex flex-col items-center">
      <i class="ph ph-heart text-[32px] text-[#82D0A4] mb-[12px]"></i>
      <div class="text-[20px] font-[400] text-[#FFFFFF] mb-[8px]">稳定的人格</div>
      <div class="text-[14px] text-[#FFFFFF]/50 leading-[1.6] text-center">有独特性格和价值观<br>千人千面</div>
    </div>
    <div class="flex-1 border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[16px] p-[32px] flex flex-col items-center">
      <i class="ph ph-rocket text-[32px] text-[#82D0A4] mb-[12px]"></i>
      <div class="text-[20px] font-[400] text-[#FFFFFF] mb-[8px]">可进化的能力</div>
      <div class="text-[14px] text-[#FFFFFF]/50 leading-[1.6] text-center">越用越好用<br>持续成长</div>
    </div>
  </div>

  <!-- Analogy -->
  <div class="absolute" style="z-index:20; top: 580px; left: 340px; width: 600px;">
    <div class="text-center text-[16px] font-[300] text-[#FFFFFF]/40 leading-[1.6]">
      像养一只宠物或带一个新员工一样，越"养"越好用
    </div>
  </div>

  <!-- Footer -->
  <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center" style="z-index:50;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]">萌芽·生长</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
  </div>
</div>

</html>
