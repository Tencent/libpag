<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>五层架构总览</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<style>
body { margin: 0; padding: 0; }
.slide {
  width: 1280px; height: 720px; overflow: hidden; position: relative; margin: 0;
  background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);
  font-family: 'Noto Sans SC', sans-serif; color: #FFFFFF;
}
*, *::before, *::after { animation: none !important; transition: none !important; }
</style>
</head>
<body>
<div class="slide">
  <!-- Watermark -->
  <div class="absolute text-[300px] font-[900] text-[#FFFFFF]/[0.02] leading-none whitespace-nowrap select-none" style="z-index:0; top: 180px; left: 100px;">ARCHITECTURE</div>

  <!-- Page Header -->
  <div class="absolute top-[32px] right-[48px]" style="z-index:50;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
  </div>

  <!-- Section Title -->
  <div class="absolute" style="z-index:20; top: 50px; left: 80px;">
    <div class="text-[12px] font-[500] tracking-[0.15em] text-[#82D0A4] mb-[8px]">FIVE-LAYER ARCHITECTURE</div>
    <h1 class="text-[32px] font-[300] text-[#FFFFFF]">五层架构总览</h1>
  </div>

  <!-- Concentric Diagram -->
  <div class="absolute flex items-center justify-center" style="z-index:20; top: 130px; left: 140px; width: 1000px; height: 500px;">
    <!-- Layer 5 - outermost -->
    <div class="absolute w-[880px] h-[460px] border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[24px] flex items-center justify-center">
      <div class="absolute top-[10px] left-[24px] text-[14px] text-[#FFFFFF]/40">
        <i class="ph ph-heartbeat mr-[4px]"></i>L5 主动行为层 · <span class="text-[#FFFFFF]/30">Heartbeat — 它会主动做什么</span>
      </div>

      <!-- Layer 4 -->
      <div class="absolute w-[740px] h-[380px] border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[20px] flex items-center justify-center">
        <div class="absolute top-[10px] left-[24px] text-[14px] text-[#FFFFFF]/40">
          <i class="ph ph-puzzle-piece mr-[4px]"></i>L4 能力扩展层 · <span class="text-[#FFFFFF]/30">Skills — 它能做什么</span>
        </div>

        <!-- Layer 3 -->
        <div class="absolute w-[600px] h-[300px] border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[16px] flex items-center justify-center">
          <div class="absolute top-[10px] left-[24px] text-[14px] text-[#FFFFFF]/40">
            <i class="ph ph-flow-arrow mr-[4px]"></i>L3 工作流程层 · <span class="text-[#FFFFFF]/30">Agents — 它怎么干活</span>
          </div>

          <!-- Layer 2 -->
          <div class="absolute w-[460px] h-[220px] border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] flex items-center justify-center">
            <div class="absolute top-[10px] left-[24px] text-[14px] text-[#FFFFFF]/40">
              <i class="ph ph-users mr-[4px]"></i>L2 关系认知层 · <span class="text-[#FFFFFF]/30">User+Memory</span>
            </div>

            <!-- Layer 1 - innermost -->
            <div class="w-[280px] h-[140px] bg-[#82D0A4]/[0.1] border-[1px] border-[#82D0A4]/30 rounded-[12px] flex flex-col items-center justify-center">
              <div class="text-[12px] text-[#82D0A4]/60 mb-[4px]">L1</div>
              <div class="text-[24px] font-[400] text-[#82D0A4] mb-[4px]">灵魂内核层</div>
              <div class="text-[12px] text-[#FFFFFF]/40">Soul + Identity — 它是谁</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center" style="z-index:50;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]">萌芽·生长</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
  </div>
</div>
</body>
</html>
