<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>

<style>

        <div>

      <div class="flex items-start gap-[14px]">

          <p class="text-[12px]/[1.5] opacity-60 mt-[2px]">组件/颜色/文本样式全局同步，自由组合，一键复用</p>

      </div>
      <div class="flex items-start gap-[14px]">
