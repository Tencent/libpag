<!DOCTYPE html>

<head>

<script src="https://cdn.tailwindcss.com"></script>

      </div>
      <p class="text-[12px]/[1.5] opacity-60">自然语言理解与生成能力</p>

      <div class="flex items-center gap-[8px] mb-[8px]">
