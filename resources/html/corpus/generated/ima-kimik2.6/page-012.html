<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 12 - IMA 养成系人格体系</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
body { margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; }
.slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%); }
*, *::before, *::after { animation: none !important; transition: none !important; }
</style>
</head>
<body>
<div class="slide">
  <!-- 背景水印 -->
  <div class="absolute top-[80px] left-[-50px] text-[400px] font-[900] text-[#FFFFFF]/[0.02] whitespace-nowrap select-none z-0" style="font-family:'Noto Sans SC',sans-serif;">IMA</div>

  <!-- 页眉 -->
  <div class="absolute top-[32px] right-[48px] z-50">
    <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
  </div>

  <!-- 核心括号标题 -->
  <div class="absolute top-[180px] left-0 right-0 flex flex-col items-center justify-center z-20">
    <div class="flex items-center gap-[24px]">
      <span class="text-[100px] font-[300] text-[#FFFFFF] leading-none" style="font-family:'Noto Sans SC',sans-serif;">(</span>
      <div class="flex flex-col items-center">
        <h1 class="text-[64px] font-[400] text-[#FFFFFF] leading-[1.1] tracking-[0.05em]">从工具到伙伴</h1>
      </div>
      <span class="text-[100px] font-[300] text-[#FFFFFF] leading-none" style="font-family:'Noto Sans SC',sans-serif;">)</span>
    </div>
  </div>

  <!-- 副标题 -->
  <div class="absolute top-[340px] left-0 right-0 text-center z-20">
    <p class="text-[20px] font-[300] text-[#FFFFFF]/60 tracking-[0.1em]">从通用到专属</p>
  </div>

  <!-- 核心标语 -->
  <div class="absolute top-[420px] left-0 right-0 text-center z-20">
    <div class="inline-block px-[32px] py-[12px] border-[1px] border-dashed border-[#82D0A4]/40 rounded-full">
      <p class="text-[16px] font-[400] text-[#82D0A4]">每个人养出来的 AI 都不一样</p>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center z-50">
    <span class="text-[14px] font-[400] text-[#FFFFFF]">IMA 养成系人格体系</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
  </div>
</div>
</body>
</html>
