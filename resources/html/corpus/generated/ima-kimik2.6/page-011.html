<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 11 - 总结：养成系的本质</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
body { margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; }
.slide { width: 1280px; height: 720px; overflow: hidden; position: relative; background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%); }
*, *::before, *::after { animation: none !important; transition: none !important; }
</style>
</head>
<body>
<div class="slide">
  <!-- 页眉 -->
  <div class="absolute top-[32px] right-[48px] z-50">
    <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
  </div>

  <!-- 标题区 -->
  <div class="absolute top-[48px] left-[64px] z-20">
    <h1 class="text-[36px] font-[400] text-[#FFFFFF] tracking-[0.02em]">总结：养成系的本质</h1>
    <p class="text-[16px] font-[300] text-[#FFFFFF]/60 mt-[8px] tracking-[0.05em]">五层架构速览</p>
  </div>

  <!-- 引言 -->
  <div class="absolute top-[140px] left-[64px] right-[64px] z-20">
    <p class="text-[14px] font-[400] text-[#FFFFFF]/70 leading-[1.8]">它不是一个功能，而是一种产品哲学——从人使用工具变成人养育伙伴。</p>
  </div>

  <!-- 表格 -->
  <div class="absolute top-[200px] left-[64px] right-[64px] z-20">
    <div class="border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] overflow-hidden">
      <!-- 表头 -->
      <div class="grid grid-cols-4 gap-0 border-b-[1px] border-dashed border-[#FFFFFF]/20" style="background: rgba(30,51,42,0.4);">
        <div class="p-[16px] text-[13px] font-[500] text-[#FFFFFF]/60 uppercase tracking-[0.05em]">层次</div>
        <div class="p-[16px] text-[13px] font-[500] text-[#FFFFFF]/60 uppercase tracking-[0.05em]">解决的问题</div>
        <div class="p-[16px] text-[13px] font-[500] text-[#FFFFFF]/60 uppercase tracking-[0.05em]">对应机制</div>
        <div class="p-[16px] text-[13px] font-[500] text-[#FFFFFF]/60 uppercase tracking-[0.05em]">类比</div>
      </div>
      <!-- 灵魂层 -->
      <div class="grid grid-cols-4 gap-0 border-b-[1px] border-dashed border-[#FFFFFF]/10">
        <div class="p-[14px] text-[14px] font-[400] text-[#82D0A4]">灵魂层</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">它是谁</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">SOUL + IDENTITY</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/60">人的性格和名字</div>
      </div>
      <!-- 关系层 -->
      <div class="grid grid-cols-4 gap-0 border-b-[1px] border-dashed border-[#FFFFFF]/10">
        <div class="p-[14px] text-[14px] font-[400] text-[#82D0A4]">关系层</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">它认识谁</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">USER + MEMORY</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/60">人的社交关系和记忆</div>
      </div>
      <!-- 流程层 -->
      <div class="grid grid-cols-4 gap-0 border-b-[1px] border-dashed border-[#FFFFFF]/10">
        <div class="p-[14px] text-[14px] font-[400] text-[#82D0A4]">流程层</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">它怎么做事</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">AGENTS</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/60">人的工作方法论</div>
      </div>
      <!-- 能力层 -->
      <div class="grid grid-cols-4 gap-0 border-b-[1px] border-dashed border-[#FFFFFF]/10">
        <div class="p-[14px] text-[14px] font-[400] text-[#82D0A4]">能力层</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">它能做什么</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">Skills</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/60">人的专业技能</div>
      </div>
      <!-- 行为层 -->
      <div class="grid grid-cols-4 gap-0">
        <div class="p-[14px] text-[14px] font-[400] text-[#82D0A4]">行为层</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">它会主动做什么</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/80">Heartbeat / Cron</div>
        <div class="p-[14px] text-[14px] font-[400] text-[#FFFFFF]/60">人的主动性和责任心</div>
      </div>
    </div>
  </div>

  <!-- 金句 -->
  <div class="absolute top-[560px] left-[64px] right-[64px] z-20">
    <div class="p-[20px] border-[1px] border-dashed border-[#82D0A4]/30 rounded-[12px] text-center" style="background: rgba(130,208,164,0.03);">
      <p class="text-[15px] font-[300] text-[#FFFFFF]/80 leading-[1.7]">五层加在一起，就是一个完整的数字人格。而养成的过程，就是用户通过持续交互让这个数字人格变得越来越独特、越来越不可替代的过程。</p>
    </div>
  </div>

  <!-- 页脚 -->
  <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center z-50">
    <span class="text-[14px] font-[400] text-[#FFFFFF]">本质</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
  </div>

</html>
