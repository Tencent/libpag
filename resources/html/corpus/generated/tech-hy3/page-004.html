<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>核心功能：AI协同设计</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
    <!-- Hairline Grid -->
    <div class="absolute left-[33%] top-0 bottom-0 w-[1px] bg-[#111111]/20"></div>
    <div class="absolute left-[66%] top-0 bottom-0 w-[1px] bg-[#111111]/20"></div>
    <div class="absolute left-0 right-0 top-[25%] h-[1px] bg-[#111111]/20"></div>

    <!-- Header -->
    <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px] z-[10]">
      <i class="ph ph-robot text-[20px]"></i>
      <span class="text-[14px]/[20px]">核心功能 · AI协同</span>
    </div>

    <!-- Page Title -->
    <div class="absolute top-[60px] left-[80px] z-[10]">
      <h1 class="text-[56px] font-[600] leading-[1.2] tracking-[-0.01em]">核心功能：AI协同设计</h1>
      <div class="w-[80px] h-[2px] bg-[#111111] mt-[12px]"></div>
    </div>

    <!-- 3-Column Feature Cards -->
    <!-- Row 1 -->
    <div class="absolute top-[190px] left-[60px] w-[360px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[12px] p-[24px] h-[200px]">
        <i class="ph ph-text-aa text-[28px] mb-[12px] block"></i>
        <h3 class="text-[17px] font-[600] mb-[8px]">文生UI，描述即生成</h3>
        <p class="text-[13px]/[20px] leading-[1.55] text-[#111111]/70">用自然语言描述需求，AI自动生成布局与组件，快速搭建起稿结构</p>
      </div>
    </div>
    <div class="absolute top-[190px] left-[460px] w-[360px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[12px] p-[24px] h-[200px]">
        <i class="ph ph-image text-[28px] mb-[12px] block"></i>
        <h3 class="text-[17px] font-[600] mb-[8px]">图片秒变设计稿</h3>
        <p class="text-[13px]/[20px] leading-[1.55] text-[#111111]/70">上传图片，智能分层，转为可编辑设计稿</p>
      </div>
    </div>
    <div class="absolute top-[190px] left-[860px] w-[360px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[12px] p-[24px] h-[200px]">
        <i class="ph ph-robot text-[28px] mb-[12px] block"></i>
        <h3 class="text-[17px] font-[600] mb-[8px]">AI助手</h3>
        <p class="text-[13px]/[20px] leading-[1.55] text-[#111111]/70">智能重命名、生成图片、链接转UI、AI搜索，协作每个设计环节</p>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="absolute top-[420px] left-[200px] w-[360px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[12px] p-[24px] h-[200px]">
        <i class="ph ph-paint-brush text-[28px] mb-[12px] block"></i>
        <h3 class="text-[17px] font-[600] mb-[8px]">文/图生图</h3>
        <p class="text-[13px]/[20px] leading-[1.55] text-[#111111]/70">快速生成插画、配图、运营海报等视觉素材</p>
      </div>
    </div>
    <div class="absolute top-[420px] left-[600px] w-[360px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[12px] p-[24px] h-[200px]">
        <i class="ph ph-icons text-[28px] mb-[12px] block"></i>
        <h3 class="text-[17px] font-[600] mb-[8px]">批量生成矢量图标</h3>
        <p class="text-[13px]/[20px] leading-[1.55] text-[#111111]/70">一键生成整套风格统一的矢量图标</p>
      </div>
    </div>

    <!-- Bottom border -->
    <div class="absolute bottom-[40px] left-[80px] right-[80px] h-[1px] bg-[#111111]/20 z-[10]"></div>
  </div>
</body>
</html>
