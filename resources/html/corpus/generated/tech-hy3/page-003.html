<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ardot 产品概述与定位</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
    <!-- Hairline Grid -->
    <div class="absolute left-[50%] top-0 bottom-0 w-[1px] bg-[#111111]/20"></div>
    <div class="absolute left-0 right-0 top-[25%] h-[1px] bg-[#111111]/20"></div>

    <!-- Header -->
    <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px] z-[10]">
      <i class="ph ph-target text-[20px]"></i>
      <span class="text-[14px]/[20px]">产品概述 · Ardot</span>
    </div>

    <!-- Page Title -->
    <div class="absolute top-[60px] left-[80px] z-[10]">
      <h1 class="text-[56px] font-[600] leading-[1.2] tracking-[-0.01em]">Ardot 产品概述与定位</h1>
      <div class="w-[80px] h-[2px] bg-[#111111] mt-[12px]"></div>
    </div>

    <!-- Left Column -->
    <div class="absolute top-[200px] left-[80px] w-[520px] z-[10] space-y-[28px]">
      <div>
        <div class="flex items-center gap-[10px] mb-[12px]">
          <i class="ph ph-puzzle-piece text-[18px]"></i>
          <h2 class="text-[18px] font-[600]">产品定义</h2>
        </div>
        <p class="text-[15px]/[24px] leading-[1.625] text-[#111111]/80">Ardot是腾讯设计推出的下一代AI驱动智能设计工具，由开发腾讯CodeBuddy的同一团队打造，底层基于腾讯混元大模型与优图视觉算法</p>
      </div>
      <div>
        <div class="flex items-center gap-[10px] mb-[12px]">
          <i class="ph ph-users text-[18px]"></i>
          <h2 class="text-[18px] font-[600]">目标用户</h2>
        </div>
        <p class="text-[15px]/[24px] leading-[1.625] text-[#111111]/80">主要面向设计师与产品经理，是一款支持多人实时协作的UI/UX设计工具</p>
      </div>
    </div>

    <!-- Right Column -->
    <div class="absolute top-[200px] left-[680px] w-[520px] z-[10] space-y-[28px]">
      <div>
        <div class="flex items-center gap-[10px] mb-[12px]">
          <i class="ph ph-bullseye text-[18px]"></i>
          <h2 class="text-[18px] font-[600]">核心定位</h2>
        </div>
        <div class="border-l-[2px] border-[#111111]/30 pl-[16px]">
          <p class="text-[15px]/[24px] leading-[1.625]">AI驱动的产设研协作平台，让AI生成的每一个设计稿都成为可编辑、可复用、可交付的团队资产</p>
        </div>
      </div>
      <div>
        <div class="flex items-center gap-[10px] mb-[12px]">
          <i class="ph ph-megaphone text-[18px]"></i>
          <h2 class="text-[18px] font-[600]">产品口号</h2>
        </div>
        <div class="bg-[#111111]/5 rounded-[8px] px-[20px] py-[16px]">
          <p class="text-[20px]/[28px] font-[500] leading-[1.4] text-center">"智能设计工具，让灵感鲜活落地"</p>
        </div>
      </div>
    </div>

    <!-- Bottom border -->
    <div class="absolute bottom-[40px] left-[80px] right-[80px] h-[1px] bg-[#111111]/20 z-[10]"></div>
  </div>
</body>
</html>
