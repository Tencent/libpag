<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>竞品分析：Figma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
    <!-- Hairline Grid -->
    <div class="absolute left-[50%] top-0 bottom-0 w-[1px] bg-[#111111]/20"></div>
    <div class="absolute left-0 right-0 top-[25%] h-[1px] bg-[#111111]/20"></div>

    <!-- Header -->
    <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px] z-[10]">
      <i class="ph ph-compare text-[20px]"></i>
      <span class="text-[14px]/[20px]">竞品分析 · Figma</span>
    </div>

    <!-- Page Title -->
    <div class="absolute top-[60px] left-[80px] z-[10]">
      <h1 class="text-[56px] font-[600] leading-[1.2] tracking-[-0.01em]">竞品分析：Figma</h1>
      <div class="w-[80px] h-[2px] bg-[#111111] mt-[12px]"></div>
    </div>

    <!-- Overview Banner -->
    <div class="absolute top-[180px] left-[80px] right-[80px] z-[10]">
      <div class="border-[1px] border-[#111111]/20 rounded-[8px] px-[24px] py-[14px]">
        <p class="text-[15px]/[24px] leading-[1.6]">Figma是全球最大的协作设计平台，2026年营收指引13.66-13.74亿美元，同比增长约30%。核心产品线已从上市前的4个扩展到8个</p>
      </div>
    </div>

    <!-- Left: 核心优势 -->
    <div class="absolute top-[290px] left-[80px] w-[520px] z-[10]">
      <div class="flex items-center gap-[10px] mb-[16px]">
        <i class="ph ph-check-circle text-[18px]"></i>
        <h2 class="text-[18px] font-[600]">核心优势</h2>
      </div>
      <div class="space-y-[14px]">
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">实时多人在线编辑，跨OS无缝协作</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">组件库/变体系统极其强大，设计系统管理成熟</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">插件生态极其丰富，第三方开发者生态成熟</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">AI功能全面：Figma Make、AI图像编辑、代码转设计等</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">净收入留存率高达131%（大客户）</p>
        </div>
      </div>
    </div>

    <!-- Right: 劣势与挑战 -->
    <div class="absolute top-[290px] left-[680px] w-[520px] z-[10]">
      <div class="flex items-center gap-[10px] mb-[16px]">
        <i class="ph ph-warning-circle text-[18px]"></i>
        <h2 class="text-[18px] font-[600]">劣势与挑战</h2>
      </div>
      <div class="space-y-[14px]">
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">网络依赖性强，国内访问速度和稳定性受限</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">高级功能需订阅付费（$12/人/月起）</p>
        </div>
        <div class="flex items-start gap-[10px]">
          <i class="ph ph-arrow-up-right text-[16px] mt-[4px] shrink-0"></i>
          <p class="text-[14px]/[22px] leading-[1.6]">数据存储在海外，存在合规风险</p>
        </div>
      </div>
    </div>

    <!-- Bottom border -->
    <div class="absolute bottom-[40px] left-[80px] right-[80px] h-[1px] bg-[#111111]/20 z-[10]"></div>
  </div>
</body>
</html>
