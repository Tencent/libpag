<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行业背景与市场分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    .bg-noise {
      background-color: #DFDDDA;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
    <!-- Hairline Grid -->
    <div class="absolute left-[55%] top-0 bottom-0 w-[1px] bg-[#111111]/20"></div>
    <div class="absolute left-0 right-0 top-[25%] h-[1px] bg-[#111111]/20"></div>

    <!-- Header -->
    <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px] z-[10]">
      <i class="ph ph-chart-bar text-[20px]"></i>
      <span class="text-[14px]/[20px]">市场分析 · Ardot</span>
    </div>

    <!-- Page Title -->
    <div class="absolute top-[60px] left-[80px] z-[10]">
      <h1 class="text-[56px] font-[600] leading-[1.2] tracking-[-0.01em]">行业背景与市场分析</h1>
      <div class="w-[80px] h-[2px] bg-[#111111] mt-[12px]"></div>
    </div>

    <!-- ECharts Bar Chart -->
    <div class="absolute top-[190px] left-[60px] w-[620px] h-[440px] z-[10]">
      <div id="marketChart" style="width:100%;height:100%;"></div>
    </div>

    <!-- Right: Stats -->
    <div class="absolute top-[200px] left-[740px] w-[460px] z-[10] space-y-[24px]">
      <div class="border-l-[2px] border-[#111111]/30 pl-[20px]">
        <p class="text-[13px]/[20px] text-[#111111]/50 mb-[4px]">复合年增长率</p>
        <p class="text-[48px] font-[600] leading-[1.1]">22.25%</p>
        <p class="text-[13px]/[20px] text-[#111111]/50 mt-[4px]">2025-2035</p>
      </div>
      <div class="border-l-[2px] border-[#111111]/30 pl-[20px]">
        <p class="text-[13px]/[20px] text-[#111111]/50 mb-[4px]">云部署占比</p>
        <p class="text-[36px] font-[600] leading-[1.1]">61%</p>
      </div>
      <div class="border-l-[2px] border-[#111111]/30 pl-[20px]">
        <p class="text-[13px]/[20px] text-[#111111]/50 mb-[4px]">本地部署占比</p>
        <p class="text-[36px] font-[600] leading-[1.1]">39%</p>
      </div>
      <div class="border-[1px] border-[#111111]/20 rounded-[8px] px-[16px] py-[12px] mt-[16px]">
        <p class="text-[12px]/[18px] leading-[1.6] text-[#111111]/50">数据来源：Business Research Insights 市场研究报告</p>
      </div>
    </div>

    <!-- Bottom border -->
    <div class="absolute bottom-[40px] left-[80px] right-[80px] h-[1px] bg-[#111111]/20 z-[10]"></div>

    <!-- ECharts Init -->
    <script>
      var chart = echarts.init(document.getElementById('marketChart'), {
        color: ['#E5E5E5', '#A3A3A3', '#111111'],
        textStyle: { fontFamily: 'Plus Jakarta Sans, sans-serif', color: '#111111' }
      });
      chart.setOption({
        title: { text: '全球UI/UX设计工具市场规模（亿美元）', textStyle: { color: '#111111', fontSize: 14, fontWeight: 500 }, left: 'center' },
        grid: { left: 60, right: 40, top: 60, bottom: 50 },
        xAxis: { type: 'category', data: ['2025', '2026', '2035'], axisLine: { lineStyle: { color: 'rgba(17,17,17,0.2)' } },        yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(17,17,17,0.1)', type: 'solid' } } },        series: [{ type: 'bar', data: [21.4, 26.2, 159.9], barWidth: '45%', itemStyle: { borderRadius: [4,4,0,0], color: '#111111' }, label: { show: true, position: 'top', fontFamily: 'Plus Jakarta Sans', fontSize: 13, color: '#111111' } }]
      });
    </script>
  </div>
</body>
</html>
