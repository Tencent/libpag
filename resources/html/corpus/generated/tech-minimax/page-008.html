<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>核心功能：设计到开发交付</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  .slide { width: 1280px; height: 720px; overflow: hidden; position: relative; margin: 0; background-color: #DFDDDA; font-family: 'Plus Jakarta Sans', sans-serif; color: #111111; box-sizing: border-box; }

  .hairline { position: absolute; background-color: rgba(17,17,17,0.2); }
  .meta-text { font-size: 14px; font-weight: 400; color: rgba(17,17,17,0.6); }
  .top-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(17,17,17,0.5); }
  .section-title { font-size: 48px; font-weight: 600; letter-spacing: -0.01em; color: #111111; line-height: 1.1; }
  .heading-xl { font-size: 88px; font-weight: 600; letter-spacing: -0.025em; color: #111111; line-height: 1.05; }
  .body-text { font-size: 14px; font-weight: 400; color: #111111; line-height: 1.6; }
  .sub-label { font-size: 13px; font-weight: 500; color: rgba(17,17,17,0.7); }
  .card { background-color: rgba(17,17,17,0.04); border: 1px solid rgba(17,17,17,0.15); padding: 28px; }
  .highlight-box { background-color: rgba(17,17,17,0.06); border: 1px solid rgba(17,17,17,0.2); padding: 20px 28px; }
  .vline { position: absolute; background-color: rgba(17,17,17,0.2); width: 1px; }
  .hl { position: absolute; left: 48px; right: 48px; height: 1px; background-color: rgba(17,17,17,0.2); }
  .circle-deco { border: 1px solid rgba(17,17,17,0.25); border-radius: 50%; position: absolute; }
  .arrow-icon { stroke: rgba(17,17,17,0.4); stroke-width: 1.5; fill: none; }
  *, *::before, *::after { animation: none !important; transition: none !important; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
</head>
<body>
<div class="slide bg-noise">
  <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px]">
  <svg class="w-[20px] h-[20px]" viewBox="0 0 24 24" fill="none" stroke="rgba(17,17,17,0.5)" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
  <span class="meta-text">Salford & Co.</span>
</div>
<div class="absolute top-[40px] right-[48px]">
  <span class="meta-text">May 2026</span>
</div>
  <div class="hl" style="top:0px;"></div>
  <div class="absolute top-[90px] left-[48px]"><span class="top-label">DEVELOPER HANDOFF</span></div>
  <div class="absolute" style="top:120px;left:48px;"><h2 class="section-title" style="margin:0;">核心功能：设计到开发交付</h2></div>
  <div class="hl" style="top:200px;"></div>
  <div class="card" style="position:absolute;top:240px;left:48px;width:220px;height:280px;">
      <i class="ph ph-ruler" style="font-size:28px;color:#111111;margin-bottom:20px;display:block;"></i>
      <div style="font-size:14px;font-weight:600;color:#111111;margin-bottom:12px;line-height:1.3;">高效查看标注信息</div>
      <div class="body-text" style="font-size:13px;">可视化查看尺寸、间距、样式等信息</div>
    </div><div class="card" style="position:absolute;top:240px;left:280px;width:220px;height:280px;">
      <i class="ph ph-stack" style="font-size:28px;color:#111111;margin-bottom:20px;display:block;"></i>
      <div style="font-size:14px;font-weight:600;color:#111111;margin-bottom:12px;line-height:1.3;">查看所有组件选项</div>
      <div class="body-text" style="font-size:13px;">查看所有可能的组件变体，并提供相应的代码</div>
    </div><div class="card" style="position:absolute;top:240px;left:512px;width:220px;height:280px;">
      <i class="ph ph-code" style="font-size:28px;color:#111111;margin-bottom:20px;display:block;"></i>
      <div style="font-size:14px;font-weight:600;color:#111111;margin-bottom:12px;line-height:1.3;">快速复制代码</div>
      <div class="body-text" style="font-size:13px;">涵盖CSS、iOS、Android常见代码类型</div>
    </div><div class="card" style="position:absolute;top:240px;left:744px;width:220px;height:280px;">
      <i class="ph ph-plugs-connected" style="font-size:28px;color:#111111;margin-bottom:20px;display:block;"></i>
      <div style="font-size:14px;font-weight:600;color:#111111;margin-bottom:12px;line-height:1.3;">MCP一键转代码</div>
      <div class="body-text" style="font-size:13px;">基于模型上下文协议，设计稿可直接导入CodeBuddy、Cursor、Claude Code等IDE</div>
    </div>
  <div class="hl" style="bottom:0px;"></div>
</div>
