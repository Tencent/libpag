<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>战略级差异化优势</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<style>
*, *::before, *::after { animation: none !important; transition: none !important; }
body { margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; }
</style>
</head>
<body>
<div class="slide" style="width:1280px;height:720px;overflow:hidden;position:relative;background:linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);">
  <!-- Watermark -->
  <div class="absolute z-0 text-[350px] font-[900] text-[#FFFFFF]/[0.02] leading-none whitespace-nowrap select-none" style="left:50%;top:55%;transform:translate(-50%,-50%);">EDGE</div>
  <!-- Header -->
  <div class="absolute z-20" style="top:40px;left:120px;width:1040px;">
    <div class="text-[14px] font-[300] text-[#FFFFFF]/40 tracking-[0.15em] uppercase mb-[8px]">Strategic Differentiation</div>
    <h2 class="text-[36px] font-[300] text-[#FFFFFF] leading-tight">战略级差异化优势</h2>
    <div class="w-[48px] h-[1px] bg-[#FFFFFF]/20 mt-[16px]"></div>
  </div>
  <!-- Quad 1: 不可替代的粘性 -->
  <div class="absolute z-20" style="top:150px;left:120px;width:490px;height:210px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:24px;">
    <div class="flex items-center mb-[14px]">
      <div class="w-[24px] h-[24px] rounded-full border border-[#82D0A4]/40 flex items-center justify-center mr-[12px]">
        <span class="text-[12px] font-[500] text-[#82D0A4]">1</span>
      </div>
      <i class="ph ph-lock-key text-[20px] text-[#82D0A4] mr-[8px]"></i>
      <div class="text-[18px] font-[400] text-[#FFFFFF]">不可替代的粘性</div>
    </div>
    <p class="text-[14px] font-[400] text-[#FFFFFF]/50 leading-[1.6]">积累了所有偏好、记忆、工作流，你舍不得换。这是比功能更强大的留存机制。</p>
    <div class="mt-[12px] border-l-[2px] border-[#FFFFFF]/10 pl-[12px]">
      <div class="text-[12px] font-[300] text-[#FFFFFF]/30 leading-[1.5]">类比：你可以随时换手机，但不会轻易换掉养了三年的宠物。</div>
    </div>
  </div>
  <!-- Quad 2: 网络效应 -->
  <div class="absolute z-20" style="top:150px;left:660px;width:490px;height:210px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:24px;">
    <div class="flex items-center mb-[14px]">
      <div class="w-[24px] h-[24px] rounded-full border border-[#82D0A4]/40 flex items-center justify-center mr-[12px]">
        <span class="text-[12px] font-[500] text-[#82D0A4]">2</span>
      </div>
      <i class="ph ph-users-three text-[20px] text-[#82D0A4] mr-[8px]"></i>
      <div class="text-[18px] font-[400] text-[#FFFFFF]">天然的网络效应</div>
    </div>
    <p class="text-[14px] font-[400] text-[#FFFFFF]/50 leading-[1.6]">每个人养出来的都不一样，用户会分享养成成果。Skills 可被社区创建和分享，形成生态飞轮。</p>
  </div>
  <!-- Quad 3: 数据飞轮 -->
  <div class="absolute z-20" style="top:410px;left:120px;width:490px;height:210px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:24px;">
    <div class="flex items-center mb-[14px]">
      <div class="w-[24px] h-[24px] rounded-full border border-[#82D0A4]/40 flex items-center justify-center mr-[12px]">
        <span class="text-[12px] font-[500] text-[#82D0A4]">3</span>
      </div>
      <i class="ph ph-arrow-clockwise text-[20px] text-[#82D0A4] mr-[8px]"></i>
      <div class="text-[18px] font-[400] text-[#FFFFFF]">数据飞轮</div>
    </div>
    <div class="flex items-center gap-[8px] flex-wrap">
      <div class="border border-[#FFFFFF]/10 rounded-full px-[14px] py-[6px]">
        <span class="text-[12px] font-[400] text-[#FFFFFF]/60">用户使用</span>
      </div>
      <i class="ph ph-arrow-right text-[14px] text-[#82D0A4]/40"></i>
      <div class="border border-[#FFFFFF]/10 rounded-full px-[14px] py-[6px]">
        <span class="text-[12px] font-[400] text-[#FFFFFF]/60">偏好数据</span>
      </div>
      <i class="ph ph-arrow-right text-[14px] text-[#82D0A4]/40"></i>
      <div class="border border-[#82D0A4]/30 rounded-full px-[14px] py-[6px]">
        <span class="text-[12px] font-[400] text-[#82D0A4]">更懂你</span>
      </div>
      <i class="ph ph-arrow-right text-[14px] text-[#82D0A4]/40"></i>
      <div class="border border-[#FFFFFF]/10 rounded-full px-[14px] py-[6px]">
        <span class="text-[12px] font-[400] text-[#FFFFFF]/60">体验更好</span>
      </div>
    </div>
  </div>
  <!-- Quad 4: 知识库闭环 -->
  <div class="absolute z-20" style="top:410px;left:660px;width:490px;height:210px;border:1px solid rgba(82,208,164,0.15);border-radius:8px;padding:24px;background:rgba(130,208,164,0.03);">
    <div class="flex items-center mb-[14px]">
      <div class="w-[24px] h-[24px] rounded-full border border-[#82D0A4]/60 flex items-center justify-center mr-[12px]">
        <span class="text-[12px] font-[500] text-[#82D0A4]">4</span>
      </div>
      <i class="ph ph-brain text-[20px] text-[#82D0A4] mr-[8px]"></i>
      <div class="text-[18px] font-[400] text-[#FFFFFF]">IMA 知识库闭环</div>
    </div>
    <div class="flex items-center gap-[6px] mb-[12px]">
      <div class="border border-[#82D0A4]/30 rounded-[6px] px-[14px] py-[8px] text-center">
        <div class="text-[16px] font-[500] text-[#82D0A4]">记</div>
        <div class="text-[10px] font-[300] text-[#FFFFFF]/40 mt-[2px]">收集存储</div>
      </div>
      <span class="text-[14px] text-[#FFFFFF]/30">+</span>
      <div class="border border-[#82D0A4]/30 rounded-[6px] px-[14px] py-[8px] text-center">
        <div class="text-[16px] font-[500] text-[#82D0A4]">找</div>
        <div class="text-[10px] font-[300] text-[#FFFFFF]/40 mt-[2px]">检索信息</div>
      </div>
      <span class="text-[14px] text-[#FFFFFF]/30">+</span>
      <div class="border border-[#82D0A4]/30 rounded-[6px] px-[14px] py-[8px] text-center">
        <div class="text-[16px] font-[500] text-[#82D0A4]">用</div>
        <div class="text-[10px] font-[300] text-[#FFFFFF]/40 mt-[2px]">自动创作</div>
      </div>
    </div>
    <div class="text-[12px] font-[300] text-[#FFFFFF]/40 leading-[1.5]">= 完整的第二大脑</div>
  </div>
  <!-- Footer -->
  <div class="absolute z-50 flex flex-col items-center justify-center" style="bottom:48px;left:0;right:0;">
    <span class="text-[14px] font-[400] text-[#FFFFFF]/70">ima</span>
    <div class="w-[24px] h-[1px] bg-[#FFFFFF]/30 mt-[8px]"></div>
  </div>
</div>
</body>
</html>
