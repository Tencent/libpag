<div class="slide" style="width:1280px;height:720px;overflow:hidden;position:relative;background:linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);">
  <!-- Watermark -->
  <div class="absolute z-0 text-[350px] font-[900] text-[#FFFFFF]/[0.02] leading-none whitespace-nowrap select-none" style="right:-50px;top:80px;">WHY</div>
  <!-- Header -->
  <div class="absolute z-20" style="top:60px;left:160px;width:960px;">
    <div class="text-[14px] font-[300] text-[#FFFFFF]/40 tracking-[0.15em] uppercase mb-[8px]">What is Persona System</div>
    <h2 class="text-[36px] font-[300] text-[#FFFFFF] leading-tight">什么是养成系人格体系？</h2>
    <div class="w-[48px] h-[1px] bg-[#FFFFFF]/20 mt-[16px]"></div>
  </div>
  <!-- Core Quote -->
  <div class="absolute z-20" style="top:220px;left:200px;width:880px;">
    <div class="border-l-[2px] border-[#82D0A4]/60 pl-[24px]">

    </div>
  </div>
  <!-- Body Text -->
  <div class="absolute z-20" style="top:380px;left:200px;width:880px;">
    <p class="text-[16px] font-[400] text-[#FFFFFF]/60 leading-[1.8]">传统 AI 助手每次对话都是「失忆」的——你跟它聊了三个月，它对你的了解和第一天一样。养成系人格体系的核心是让 AI 拥有<span class="text-[#82D0A4]">持久的记忆</span>、<span class="text-[#82D0A4]">稳定的人格</span>、<span class="text-[#82D0A4]">可进化的能力</span>，像养一只宠物或带一个新员工一样，越「养」越好用。</p>
  </div>
  <!-- Decorative -->
  <div class="absolute z-10 border-[1px] border-dashed border-[#FFFFFF]/[0.08] rounded-full" style="width:200px;height:200px;right:120px;bottom:100px;"></div>
  <div class="absolute z-10 w-[6px] h-[6px] rounded-full bg-[#82D0A4]/60" style="right:220px;bottom:200px;"></div>

  </div>
  <div class="absolute z-10" style="top:310px;right:160px;">
    <i class="ph ph-heart text-[32px] text-[#FFFFFF]/[0.06]"></i>
