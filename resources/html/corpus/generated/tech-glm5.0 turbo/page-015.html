<!DOCTYPE html>

<head>

  }

<body>
<div class="bg-noise w-[1280px] h-[720px] relative overflow-hidden">

  <!-- Decorative circle (right side) -->

    </div>
  </div>

  <!-- Decorative hairline grid lines -->
  <div class="absolute" style="top:0;left:0;width:1280px;height:1px;background:rgba(17,17,17,0.06);"></div>
  <div class="absolute" style="top:180px;left:0;width:1280px;height:1px;background:rgba(17,17,17,0.06);"></div>

  <div class="absolute" style="top:540px;left:0;width:1280px;height:1px;background:rgba(17,17,17,0.06);"></div>

  <div class="absolute" style="top:320px;left:80px;width:700px;height:240px;">
    <p class="text-[20px] font-normal leading-[1.8] mb-8" style="color:#111111;">随着AI技术与设计工具的深度融合，设计行业正在经历从"工具辅助"到"智能协同"的根本性转变。</p>
    <p class="text-[20px] font-normal leading-[1.8]" style="color:rgba(17,17,17,0.7);">未来竞争将不再局限于"谁的功能更多"，而是"谁的AI更懂设计"、"谁的生态更完整"、"谁的流转更顺畅"。</p>
  </div>

    <div style="border-top:1px solid rgba(17,17,17,0.15);padding-top:10px;">
      <span class="text-[12px]" style="color:rgba(17,17,17,0.5);">腾讯Ardot 竞品分析报告</span>
