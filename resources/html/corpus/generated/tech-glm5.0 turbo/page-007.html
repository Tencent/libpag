<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球UI/UX设计工具市场规模</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .bg-noise {
    background-color: #DFDDDA;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>
<div class="bg-noise w-[1280px] h-[720px] relative overflow-hidden">

  <!-- Geometric Circle Decorations -->
  <div class="absolute" style="top:60px;right:80px;width:80px;height:80px;border:1px solid #111111;border-radius:50%;opacity:0.06;"></div>

  <!-- Page Number -->
  <div class="absolute" style="top:688px;right:48px;">
    <span class="text-xs font-medium" style="color:rgba(17,17,17,0.4);">07</span>
  </div>

  <!-- Zone: header (top=40, left=48, w=1184, h=60) -->
  <div class="absolute" style="top:40px;left:48px;width:1184px;height:60px;">
    <div class="flex items-center gap-4">
      <i class="ph ph-chart-bar" style="font-size:32px;color:#111111;"></i>
      <h1 class="font-semibold tracking-tight" style="font-size:56px;color:#111111;letter-spacing:-0.01em;line-height:1;">
        全球UI/UX设计工具市场规模
      </h1>
    </div>
  </div>

  <!-- Body text below header -->
  <div class="absolute" style="top:108px;left:48px;width:1184px;">
    <p class="font-normal" style="font-size:15px;line-height:1.6;color:rgba(17,17,17,0.7);">
      全球UI/UX设计软件市场正处于快速增长阶段，云部署占比61%，本地部署占比39%。
    </p>
  </div>

  <!-- Zone: chart (top=140, left=48, w=720, h=380) -->
  <div class="absolute" style="top:150px;left:48px;width:720px;height:380px;">
    <div id="marketChart" style="width:700px;height:360px;"></div>
  </div>

  <!-- Zone: divider (top=140, left=784, w=1, h=380) -->
  <div class="absolute" style="top:150px;left:784px;width:1px;height:380px;background:rgba(17,17,17,0.2);"></div>

  <!-- Zone: key-data (top=140, left=800, w=432, h=380) -->
  <div class="absolute" style="top:150px;left:800px;width:432px;height:380px;">
    <div class="mb-6">
      <span class="text-xs font-semibold tracking-widest uppercase" style="color:rgba(17,17,17,0.4);">关键数据</span>
    </div>

    <div class="space-y-5">
      <!-- Data Item 1 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-1.5 h-1.5 rounded-full mt-2.5" style="background:#111111;"></div>
        <div>
          <div class="font-semibold" style="font-size:28px;color:#111111;line-height:1.2;">21.4亿美元</div>
          <div class="font-normal mt-1" style="font-size:14px;color:rgba(17,17,17,0.6);">2025年市场规模</div>
        </div>
      </div>

      <!-- Data Item 2 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-1.5 h-1.5 rounded-full mt-2.5" style="background:rgba(17,17,17,0.4);"></div>
        <div>
          <div class="font-semibold" style="font-size:28px;color:#111111;line-height:1.2;">26.2亿美元</div>
          <div class="font-normal mt-1" style="font-size:14px;color:rgba(17,17,17,0.6);">2026年预计</div>
        </div>
      </div>

      <!-- Data Item 3 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-1.5 h-1.5 rounded-full mt-2.5" style="background:rgba(17,17,17,0.4);"></div>
        <div>
          <div class="font-semibold" style="font-size:28px;color:#111111;line-height:1.2;">159.9亿美元</div>
          <div class="font-normal mt-1" style="font-size:14px;color:rgba(17,17,17,0.6);">2035年预计</div>
        </div>
      </div>

      <!-- CAGR Highlight -->
      <div class="mt-6 p-5" style="background:rgba(17,17,17,0.04);border:1px solid rgba(17,17,17,0.15);border-radius:8px;">
        <div class="text-xs font-medium tracking-widest uppercase mb-2" style="color:rgba(17,17,17,0.4);">CAGR</div>
        <div class="font-semibold" style="font-size:36px;color:#111111;line-height:1;">22.25%</div>
        <div class="font-normal mt-1" style="font-size:14px;color:rgba(17,17,17,0.6);">2025-2035 复合年增长率</div>
      </div>
    </div>
  </div>

  <!-- Bottom accent line -->
  <div class="absolute" style="bottom:0;left:48px;width:1184px;height:2px;background:#111111;"></div>

</div>

<script>
  const chart = echarts.init(document.getElementById('marketChart'));

  const chartTheme = {
    color: ['#E5E5E5', '#A3A3A3', '#111111'],
    backgroundColor: 'transparent',
    textStyle: { fontFamily: 'Plus Jakarta Sans, sans-serif', color: '#111111' },
    title: { textStyle: { color: '#111111', fontWeight: 500 } },
    line: { smooth: false, symbol: 'circle', symbolSize: 6, itemStyle: { color: '#111111' }, lineStyle: { width: 2, color: '#111111' } },
    bar: { itemStyle: { borderRadius: [4, 4, 0, 0] } },
    categoryAxis: { axisLine: { lineStyle: { color: 'rgba(17,17,17,0.2)' } }, axisTick: { show: false }, axisLabel: { color: '#111111' }, splitLine: { show: false } },
    valueAxis: { axisLine: { show: false }, axisTick: { show: false }, axisLabel: { color: '#111111' }, splitLine: { show: true, lineStyle: { color: 'rgba(17,17,17,0.1)' } } }
  };

  const option = {
    backgroundColor: 'transparent',
    grid: { left: 60, right: 30, top: 30, bottom: 40 },
    xAxis: {
      type: 'category',
      data: ['2025', '2026', '2035'],
      axisLine: { lineStyle: { color: 'rgba(17,17,17,0.2)' } },
      axisTick: { show: false },
      axisLabel: { color: '#111111', fontFamily: 'Plus Jakarta Sans', fontSize: 14, fontWeight: 500 }
    },
    yAxis: {
      type: 'value',
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { color: 'rgba(17,17,17,0.5)', fontFamily: 'Plus Jakarta Sans', fontSize: 12 },
      splitLine: { show: true, lineStyle: { color: 'rgba(17,17,17,0.1)' } }
    },
    series: [{
      name: '市场规模(亿美元)',
      type: 'bar',
      data: [21.4, 26.2, 159.9],
      barWidth: 80,
      itemStyle: {
        borderRadius: [4, 4, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#111111' },
          { offset: 1, color: 'rgba(17,17,17,0.6)' }
        ])
      },
      label: {
        show: true,
        position: 'top',
        color: '#111111',
        fontFamily: 'Plus Jakarta Sans',
        fontSize: 14,
        fontWeight: 600,
        formatter: '{c}'
      }
    }]
  };

  chart.setOption(option);
</script>
</body>
</html>
