<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
    body { margin: 0; padding: 0; overflow: hidden; }
    .slide {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);
      font-family: 'Noto Sans SC', sans-serif;
    }
  </style>
</head>
<body>
  <div class="slide">
    <!-- 背景水印 -->
    <div class="absolute text-[400px] font-[900] text-[#FFFFFF]/[0.02] whitespace-nowrap select-none z-0" style="top: -80px; left: 100px;">
      CONCEPT
    </div>

    <!-- 页眉 -->
    <div class="absolute top-[32px] right-[48px] z-50">
      <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
    </div>

    <!-- 标题区域 (Z-HEADER: x=0, y=0, w=1280, h=110) -->
    <div class="absolute z-20" style="top: 40px; left: 0; width: 1280px; height: 70px;">
      <div class="flex flex-col items-center justify-center h-full gap-[8px]">
        <div class="text-[16px] font-[300] text-[#FFFFFF]/60 tracking-[0.1em] uppercase">Core Concept</div>
        <h1 class="text-[36px] font-[300] text-[#FFFFFF] leading-[1.1]">什么是养成系人格体系</h1>
      </div>
    </div>

    <!-- 正文区域 (Z-BODY: x=120, y=150, w=1040, h=480) -->
    <div class="absolute z-20" style="top: 150px; left: 120px; width: 1040px; height: 480px;">
      <div class="flex flex-col gap-[32px] h-full">
        <!-- 定义 -->
        <div class="text-center">
          <div class="text-[20px] font-[400] text-[#82D0A4] mb-[16px]">定义</div>
          <div class="text-[28px] font-[300] text-[#FFFFFF] leading-[1.6]">
            让 AI 从<span class="text-[#82D0A4]">冷冰冰的工具</span>变成<span class="text-[#82D0A4]">越用越懂你的专属伙伴</span>
          </div>
        </div>

        <!-- 核心说明 -->
        <div class="bg-[#1E332A] rounded-[12px] p-[32px] border-[1px] border-[#FFFFFF]/10">
          <div class="text-[16px] font-[400] text-[#FFFFFF]/70 leading-[1.8]">
            <i class="ph ph-warning-circle text-[#82D0A4] mr-[8px]"></i>
            传统 AI 助手每次对话都是<span class="text-[#FFFFFF] font-[500]">失忆</span>的——你跟它聊了三个月，它对你的了解和第一天一样
          </div>
          <div class="mt-[16px] text-[16px] font-[400] text-[#FFFFFF]/70 leading-[1.8]">
            <i class="ph ph-check-circle text-[#82D0A4] mr-[8px]"></i>
            养成系人格体系的核心是让 AI 拥有<span class="text-[#FFFFFF] font-[500]">持久的记忆、稳定的人格、可进化的能力</span>
          </div>
          <div class="mt-[16px] text-[16px] font-[400] text-[#FFFFFF]/70 leading-[1.8]">
            <i class="ph ph-heart text-[#82D0A4] mr-[8px]"></i>
            像养一只宠物或带一个新员工一样，<span class="text-[#FFFFFF] font-[500]">越养越好用</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center z-50">
      <span class="text-[14px] font-[400] text-[#FFFFFF]">萌芽·生长</span>
      <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
    </div>
  </div>
</body>
</html>
