<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *, *::before, *::after { animation: none !important; transition: none !important; }
    body { margin: 0; padding: 0; overflow: hidden; }
    .slide {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, #051014 0%, #102322 42%, #233C39 100%);
      font-family: 'Noto Sans SC', sans-serif;
    }
  </style>
</head>
<body>
  <div class="slide">
    <!-- 背景水印 -->
    <div class="absolute text-[400px] font-[900] text-[#FFFFFF]/[0.02] whitespace-nowrap select-none z-0" style="top: 50px; left: -80px;">ARCHITECTURE</div>

    <!-- 页眉 -->
    <div class="absolute top-[32px] right-[48px] z-50">
      <span class="text-[14px] font-[400] text-[#FFFFFF]/40 tracking-[0.05em]">ima</span>
    </div>

    <!-- 标题区域 -->
    <div class="absolute z-20" style="top: 40px; left: 0; width: 1280px; height: 70px;">
      <div class="flex flex-col items-center justify-center h-full gap-[8px]">
        <div class="text-[16px] font-[300] text-[#FFFFFF]/60 tracking-[0.1em] uppercase">Five-Layer Architecture</div>
        <h1 class="text-[36px] font-[300] text-[#FFFFFF] leading-[1.1]">人格体系的五层架构</h1>
      </div>
    </div>

    <!-- 架构图区域 (Z-DIAGRAM: x=100, y=140, w=1080, h=500) -->
    <div class="absolute z-20" style="top: 140px; left: 100px; width: 1080px; height: 500px;">
      <div class="relative w-full h-full">
        <!-- 第5层 主动行为层 (顶部) -->
        <div class="absolute" style="top: 0px; left: 340px; width: 400px;">
          <div class="border-[1px] border-dashed border-[#82D0A4]/40 rounded-[12px] p-[16px] text-center">
            <div class="text-[14px] text-[#82D0A4] font-[400] mb-[4px]">第5层</div>
            <div class="text-[18px] text-[#FFFFFF] font-[400]">主动行为层</div>
            <div class="text-[12px] text-[#FFFFFF]/40 mt-[4px]">Heartbeat</div>
            <div class="text-[11px] text-[#FFFFFF]/50 mt-[6px]">它会主动做什么</div>
          </div>
        </div>

        <!-- 第4层 能力扩展层 (右上) -->
        <div class="absolute" style="top: 100px; left: 640px; width: 340px;">
          <div class="border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] p-[16px] text-center">
            <div class="text-[14px] text-[#FFFFFF]/60 font-[400] mb-[4px]">第4层</div>
            <div class="text-[18px] text-[#FFFFFF] font-[400]">能力扩展层</div>
            <div class="text-[12px] text-[#FFFFFF]/40 mt-[4px]">Skills</div>
            <div class="text-[11px] text-[#FFFFFF]/50 mt-[6px]">它能做什么</div>
          </div>
        </div>

        <!-- 第3层 工作流程层 (右中) -->
        <div class="absolute" style="top: 220px; left: 640px; width: 340px;">
          <div class="border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] p-[16px] text-center">
            <div class="text-[14px] text-[#FFFFFF]/60 font-[400] mb-[4px]">第3层</div>
            <div class="text-[18px] text-[#FFFFFF] font-[400]">工作流程层</div>
            <div class="text-[12px] text-[#FFFFFF]/40 mt-[4px]">Agents</div>
            <div class="text-[11px] text-[#FFFFFF]/50 mt-[6px]">它怎么干活</div>
          </div>
        </div>

        <!-- 第2层 关系认知层 (左下) -->
        <div class="absolute" style="top: 100px; left: 100px; width: 340px;">
          <div class="border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] p-[16px] text-center">
            <div class="text-[14px] text-[#FFFFFF]/60 font-[400] mb-[4px]">第2层</div>
            <div class="text-[18px] text-[#FFFFFF] font-[400]">关系认知层</div>
            <div class="text-[12px] text-[#FFFFFF]/40 mt-[4px]">User + Memory</div>
            <div class="text-[11px] text-[#FFFFFF]/50 mt-[6px]">它了解谁、记住了什么</div>
          </div>
        </div>

        <!-- 第1层 灵魂内核层 (左上) -->
        <div class="absolute" style="top: 220px; left: 100px; width: 340px;">
          <div class="border-[1px] border-dashed border-[#FFFFFF]/20 rounded-[12px] p-[16px] text-center">
            <div class="text-[14px] text-[#FFFFFF]/60 font-[400] mb-[4px]">第1层</div>
            <div class="text-[18px] text-[#FFFFFF] font-[400]">灵魂内核层</div>
            <div class="text-[12px] text-[#FFFFFF]/40 mt-[4px]">Soul + Identity</div>
            <div class="text-[11px] text-[#FFFFFF]/50 mt-[6px]">它是谁</div>
          </div>
        </div>

        <!-- 虚线连接 (装饰) -->
        <div class="absolute" style="top: 80px; left: 440px; width: 240px; height: 1px; border-top: 1px dashed rgba(255,255,255,0.1);"></div>
        <div class="absolute" style="top: 80px; left: 600px; width: 1px; height: 80px; border-left: 1px dashed rgba(255,255,255,0.1);"></div>
        <div class="absolute" style="top: 180px; left: 440px; width: 240px; height: 1px; border-top: 1px dashed rgba(255,255,255,0.1);"></div>
        <div class="absolute" style="top: 180px; left: 600px; width: 1px; height: 80px; border-left: 1px dashed rgba(255,255,255,0.1);"></div>

        <!-- 中心文字 -->
        <div class="absolute flex items-center justify-center" style="top: 150px; left: 400px; width: 280px; height: 80px;">
          <div class="text-[14px] text-[#FFFFFF]/40 text-center leading-[1.6]">从内到外<br>由核心到行为</div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="absolute bottom-[48px] left-0 right-0 flex flex-col items-center justify-center z-50">
      <span class="text-[14px] font-[400] text-[#FFFFFF]">萌芽·生长</span>
      <div class="w-[24px] h-[1px] bg-[#FFFFFF]/50 mt-[8px]"></div>
    </div>
  </div>
</body>
</html>
