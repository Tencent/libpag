<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专业设计与企业级协作</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .bg-noise {
    background-color: #DFDDDA;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  }
  .arrow-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 3px; }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">
<div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
  <!-- 页眉 -->
  <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px]">
    <i class="ph ph-pen-nib text-[20px]"></i>
    <span class="text-[14px]/[20px] font-[500]">Ardot Analysis</span>
  </div>
  <div class="absolute top-[40px] right-[48px]">
    <span class="text-[14px]/[20px]">07 / 15</span>
  </div>

  <!-- 标题区 -->
  <div class="absolute top-[60px] left-[80px] w-[1120px]">
    <h2 class="text-[56px] font-[600] tracking-[-0.025em]">专业设计与企业级协作</h2>
  </div>

  <!-- 分割线 -->
  <div class="absolute top-[150px] left-[0px] right-[0px] h-[1px] bg-[#111111]/20"></div>

  <!-- 左栏：专业设计特性 -->
  <div class="absolute top-[180px] left-[80px] w-[500px]">
    <div class="flex items-center gap-[12px] mb-[20px]">
      <i class="ph ph-pen-nib text-[28px]"></i>
      <h3 class="text-[24px] font-[600]">专业设计特性</h3>
    </div>
    <div class="flex flex-col gap-[14px]">
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">矢量编辑</span>：W3C标准斜切、3D旋转、增强形状工具</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">动态布局</span>：Grid布局、百分比定位、真实比例锁定</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">设计系统</span>：组件、颜色、文本样式全局同步，一键复用</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">设计变量</span>：颜色、数值、字符串令牌，支持多主题自动切换</p>
      </div>
    </div>
  </div>

  <!-- 竖分割线 -->
  <div class="absolute top-[180px] left-[620px] w-[1px] h-[480px] bg-[#111111]/20"></div>

  <!-- 右栏：企业级安全协作 -->
  <div class="absolute top-[180px] left-[660px] w-[500px]">
    <div class="flex items-center gap-[12px] mb-[20px]">
      <i class="ph ph-shield-check text-[28px]"></i>
      <h3 class="text-[24px] font-[600]">企业级安全与协作</h3>
    </div>
    <div class="flex flex-col gap-[14px]">
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">智能权限中心</span>：超管精细分配权限，关键资源更安全</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">行为追溯</span>：操作日志全记录，资产变更清晰可查</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">人员资产管理</span>：离职自动回收权限，数据交接省心</p>
      </div>
      <div class="flex items-start gap-[12px]">
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
        <p class="text-[15px]/[24px] leading-[1.6]"><span class="font-[600]">协同评审</span>：多人在线实时评论、标注反馈、版本比对</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
