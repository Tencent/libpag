<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球UI/UX设计工具市场规模</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  .bg-noise {
    background-color: #DFDDDA;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">
<div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
  <!-- 页眉 -->
  <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px]">
    <i class="ph ph-pen-nib text-[20px]"></i>
    <span class="text-[14px]/[20px] font-[500]">Ardot Analysis</span>
  </div>
  <div class="absolute top-[40px] right-[48px]">
    <span class="text-[14px]/[20px]">03 / 15</span>
  </div>

  <!-- 标题区 -->
  <div class="absolute top-[60px] left-[80px] w-[700px]">
    <h2 class="text-[48px] font-[600] tracking-[-0.025em] leading-[1.2]">全球UI/UX设计工具市场规模</h2>
  </div>
  <div class="absolute top-[125px] left-[80px] w-[700px]">
    <p class="text-[16px]/[24px] text-[#111111]/60">2025-2035年市场规模及预测（单位：亿美元）</p>
  </div>

  <!-- 分割线 -->
  <div class="absolute top-[170px] left-[0px] right-[0px] h-[1px] bg-[#111111]/20"></div>

  <!-- 图表区 -->
  <div class="absolute top-[200px] left-[80px] w-[700px] h-[400px]">
    <div id="marketChart" style="width:100%;height:100%;"></div>
  </div>

  <!-- 侧边数据区 -->
  <div class="absolute top-[200px] left-[820px] w-[380px] flex flex-col gap-[20px]">
    <div class="border-l-[2px] border-[#111111] pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">2025年市场规模</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">21.4<span class="text-[18px] font-[400]">亿美元</span></div>
    </div>
    <div class="border-l-[2px] border-[#111111]/40 pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">2026年预计规模</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">26.2<span class="text-[18px] font-[400]">亿美元</span></div>
    </div>
    <div class="border-l-[2px] border-[#111111]/40 pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">2030年预计规模</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">58.5<span class="text-[18px] font-[400]">亿美元</span></div>
    </div>
    <div class="border-l-[2px] border-[#111111] pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">2035年预计规模</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">159.9<span class="text-[18px] font-[400]">亿美元</span></div>
    </div>
    <div class="border-l-[2px] border-[#111111]/20 pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">复合年增长率</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">22.25%</div>
    </div>
    <div class="border-l-[2px] border-[#111111]/20 pl-[16px]">
      <div class="text-[14px]/[20px] text-[#111111]/60 mb-[4px]">云部署占比</div>
      <div class="text-[32px] font-[600] tracking-[-0.02em]">61%</div>
    </div>
  </div>

  <script>
    var chart = echarts.init(document.getElementById('marketChart'));
    var option = {
      backgroundColor: 'transparent',
      textStyle: { fontFamily: 'Plus Jakarta Sans, sans-serif', color: '#111111' },
      grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
      xAxis: {
        type: 'category',
        data: ['2025', '2026', '2028', '2030', '2035'],
        axisLine: { lineStyle: { color: 'rgba(17,17,17,0.2)' } },
        axisTick: { show: false },
        axisLabel: { color: '#111111', fontSize: 14, margin: 12 }
      },
      yAxis: {
        type: 'value',
        name: '亿美元',
        nameTextStyle: { color: '#111111', fontSize: 12 },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { color: '#111111', fontSize: 12 },
        splitLine: { show: true, lineStyle: { color: 'rgba(17,17,17,0.1)', type: 'solid' } }
      },
      series: [{
        data: [21.4, 26.2, 39.2, 58.5, 159.9],
        type: 'bar',
        barWidth: '50%',
        itemStyle: {
          color: function(params) {
            var colors = ['#E5E5E5', '#A3A3A3', '#A3A3A3', '#111111', '#111111'];
            return colors[params.dataIndex];
          },
          borderRadius: [4, 4, 0, 0]
        },
        label: { show: true, position: 'top', color: '#111111', fontSize: 14, fontWeight: 500 }
      }]
    };
    chart.setOption(option);
  </script>
</div>
</body>
</html>
