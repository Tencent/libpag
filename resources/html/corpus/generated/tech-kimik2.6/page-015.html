<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>总结与展望</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .bg-noise {
    background-color: #DFDDDA;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  }
  .arrow-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 3px; }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">
<div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
  <!-- 巨大装饰圆环 -->
  <div class="absolute -right-[10%] top-[5%] w-[700px] h-[700px] rounded-[9999px] border-[1px] border-[#111111] pointer-events-none"></div>
  <div class="absolute -right-[5%] top-[20%] w-[500px] h-[500px] rounded-[9999px] border-[1px] border-[#111111]/20 pointer-events-none"></div>

  <!-- 页眉 -->
  <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px] z-[10]">
    <i class="ph ph-pen-nib text-[20px]"></i>
    <span class="text-[14px]/[20px] font-[500]">Ardot Analysis</span>
  </div>
  <div class="absolute top-[40px] right-[48px] z-[10]">
    <span class="text-[14px]/[20px]">15 / 15</span>
  </div>

  <!-- 主标题 -->
  <div class="absolute top-[100px] left-[80px] w-[800px] z-[10]">
    <h2 class="text-[64px] font-[600] tracking-[-0.025em] leading-[1.15]">总结与展望</h2>
  </div>

  <!-- 分割线 -->
  <div class="absolute top-[200px] left-[80px] w-[700px] h-[1px] bg-[#111111]/20 z-[10]"></div>

  <!-- 内容区 -->
  <div class="absolute top-[230px] left-[80px] w-[800px] z-[10] flex flex-col gap-[18px]">
    <div class="flex items-start gap-[14px]">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <p class="text-[16px]/[26px] leading-[1.625]">Ardot标志国产AI设计工具进入<span class="font-[600]">资产化新阶段</span></p>
    </div>
    <div class="flex items-start gap-[14px]">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <p class="text-[16px]/[26px] leading-[1.625]">竞争从功能数量转向<span class="font-[600]">AI理解力、生态完整度、流转顺畅度</span></p>
    </div>
    <div class="flex items-start gap-[14px]">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <p class="text-[16px]/[26px] leading-[1.625]">对产品团队：加速<span class="font-[600]">插件生态、跨平台布局、设计系统投入</span></p>
    </div>
    <div class="flex items-start gap-[14px]">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <p class="text-[16px]/[26px] leading-[1.625]">对企业用户：优先考虑<span class="font-[600]">国产工具、渐进式迁移、关注MCP能力</span></p>
    </div>
    <div class="flex items-start gap-[14px]">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.5"><path d="M7 7l10 10M17 7v10H7"/></svg>
      <p class="text-[16px]/[26px] leading-[1.625]">Ardot凭借腾讯技术积累和产品视野，有望成为<span class="font-[600]">国产AI设计工具的重要引领者</span></p>
    </div>
  </div>

  <!-- 底部信息 -->
  <div class="absolute bottom-[60px] left-[80px] z-[10]">
    <p class="text-[14px]/[20px] text-[#111111]/60">2026年5月 | 腾讯Ardot设计平台分析与竞品分析报告</p>
  </div>
</div>
</body>
</html>
