<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腾讯Ardot设计平台分析与竞品分析报告</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .bg-noise {
    background-color: #DFDDDA;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  }
</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-8">
<div class="w-[1280px] h-[720px] bg-noise text-[#111111] relative overflow-hidden font-['Plus_Jakarta_Sans']">
  <!-- 巨大装饰圆环 -->
  <div class="absolute -right-[10%] top-[5%] w-[750px] h-[750px] rounded-[9999px] border-[1px] border-[#111111] pointer-events-none"></div>
  <div class="absolute -right-[5%] top-[15%] w-[550px] h-[550px] rounded-[9999px] border-[1px] border-[#111111]/20 pointer-events-none"></div>

  <!-- 页眉 -->
  <div class="absolute top-[40px] left-[48px] flex items-center gap-[8px]">
    <i class="ph ph-pen-nib text-[20px]"></i>
    <span class="text-[14px]/[20px] font-[500]">Ardot Analysis</span>
  </div>
  <div class="absolute top-[40px] right-[48px]">
    <span class="text-[14px]/[20px]">2026.05</span>
  </div>

  <!-- 极细网格线 -->
  <div class="absolute left-[33%] top-[0px] bottom-[0px] w-[1px] bg-[#111111]/20"></div>
  <div class="absolute left-[0px] right-[0px] top-[25%] h-[1px] bg-[#111111]/20"></div>

  <!-- 主标题区 -->
  <div class="absolute top-[220px] left-[80px] w-[700px] z-[10]">
    <h1 class="text-[80px] font-[600] leading-[1.15] tracking-[-0.025em] mb-[24px]">
      腾讯Ardot<br>设计平台<br>分析与竞品<br>分析报告
    </h1>
  </div>

  <!-- 副标题 -->
  <div class="absolute top-[520px] left-[80px] w-[500px] z-[10]">
    <p class="text-[22px]/[32px] leading-[1.625] text-[#111111]/80">
      AI驱动产设研协作平台的深度洞察
    </p>
  </div>

  <!-- 底部信息区 -->
  <div class="absolute bottom-[80px] right-[80px] flex gap-[64px] z-[10]">
    <div>
      <div class="flex items-center gap-[8px] mb-[4px]">
        <svg class="w-[20px] h-[20px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
        <span class="text-[16px]/[24px] text-[#111111]/60">Report Type</span>
      </div>
      <span class="text-[18px]/[28px] font-[500]">Competitive Analysis</span>
    </div>
    <div>
      <span class="block text-[16px]/[24px] mb-[4px] text-[#111111]/60">Industry</span>
      <span class="text-[18px]/[28px] font-[500]">UI/UX Design Tools</span>
    </div>
  </div>
</div>
</body>
</html>
