<!DOCTYPE html>
<html>
  <head>
    <title>Login Card</title>
    <style>
      .panel { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 12px; padding: 24px;
               background-color: #FFFFFF; border-radius: 16px;
               box-shadow: 0 6px 16px #00000022; overflow: hidden; }
      .title { font-size: 22px; font-weight: bold; color: #0F172A; }
      .subtitle { font-size: 13px; color: #64748B; }
      .input { padding: 10px 12px; border-radius: 8px; background-color: #F8FAFC;
               border: 1px solid #E2E8F0; color: #1E293B; font-size: 14px; }
      .cta { padding: 12px 16px; border-radius: 12px;
             background-image: linear-gradient(90deg, #6366F1 0%, #8B5CF6 100%);
             color: #FFFFFF; font-size: 15px; font-weight: bold; text-align: center; }
    </style>
  </head>
  <body style="width: 320px; height: 280px;">
    <div class="panel">
      <span class="title">Sign in</span>
      <span class="subtitle">Welcome back. Enter your credentials.</span>
      <div class="input">name@example.com</div>
      <div class="input">password</div>
      <div class="cta">Sign in</div>
    </div>
  </body>
</html>
