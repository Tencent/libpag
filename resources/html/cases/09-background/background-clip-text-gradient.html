<!DOCTYPE html>
<html>
  <head><title>background-clip text gradient</title></head>
  <body style="width: 300px; height: 70px; padding: 12px;">
    <p style="width: 100%; font-size: 40px; font-weight: bold; background-image: linear-gradient(90deg, #6366F1, #EC4899); -webkit-background-clip: text; background-clip: text; color: transparent;">Gradient</p>
  </body>
</html>
