<!DOCTYPE html>
<html>
  <head><title>card component</title></head>
  <body style="width: 260px; height: 120px; display: flex; padding: 12px; background-color: #F1F5F9;">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: row; align-items: center; gap: 12px; padding: 12px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 2px 6px #00000026;">
      <div style="width: 48px; height: 48px; border-radius: 24px; background-color: #6366F1;"></div>
      <div style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
        <span style="font-size: 16px; font-weight: bold; color: #1E293B;">Alice Chen</span>
        <span style="font-size: 13px; color: #64748B;">Product Designer</span>
      </div>
    </div>
  </body>
</html>
