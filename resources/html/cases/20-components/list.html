<!DOCTYPE html>
<html>
  <head><title>list component</title></head>
  <body style="width: 240px; height: 200px; display: flex; padding: 12px;">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; background-color: #F8FAFC;">
        <div style="width: 32px; height: 32px; border-radius: 8px; background-color: #6366F1;"></div>
        <span style="flex: 1; font-size: 14px; color: #1E293B;">First item</span>
      </div>
      <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; background-color: #F8FAFC;">
        <div style="width: 32px; height: 32px; border-radius: 8px; background-color: #8B5CF6;"></div>
        <span style="flex: 1; font-size: 14px; color: #1E293B;">Second item</span>
      </div>
      <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; background-color: #F8FAFC;">
        <div style="width: 32px; height: 32px; border-radius: 8px; background-color: #EC4899;"></div>
        <span style="flex: 1; font-size: 14px; color: #1E293B;">Third item</span>
      </div>
    </div>
  </body>
</html>
