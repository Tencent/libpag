<!DOCTYPE html>
<html>
  <head><title>stat tile component</title></head>
  <body style="width: 160px; height: 150px; display: flex; padding: 12px;">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; gap: 6px; padding: 16px; border-radius: 12px; background-image: linear-gradient(135deg, #6366F1, #8B5CF6);">
      <span style="font-size: 12px; color: #E0E7FF;">Revenue</span>
      <span style="font-size: 28px; font-weight: bold; color: #FFFFFF;">$12.4k</span>
      <span style="font-size: 12px; color: #C7D2FE;">+18% MoM</span>
    </div>
  </body>
</html>
