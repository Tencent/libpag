<!DOCTYPE html>
<html>
  <head><title>gallery via nested flex</title></head>
  <body style="width: 200px; height: 200px; display: flex; padding: 8px;">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; flex-direction: row; gap: 8px; flex: 1;">
        <div style="flex: 1; border-radius: 8px; background-color: #6366F1;"></div>
        <div style="flex: 1; border-radius: 8px; background-color: #8B5CF6;"></div>
      </div>
      <div style="display: flex; flex-direction: row; gap: 8px; flex: 1;">
        <div style="flex: 1; border-radius: 8px; background-color: #EC4899;"></div>
        <div style="flex: 1; border-radius: 8px; background-color: #F59E0B;"></div>
      </div>
    </div>
  </body>
</html>
