<!DOCTYPE html>
<html>
  <head><title>clip-path url(#id)</title></head>
  <body style="width: 200px; height: 200px; display: flex; padding: 20px;">
    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <clipPath id="hexClip" clipPathUnits="objectBoundingBox">
          <polygon points="0.5 0, 1 0.25, 1 0.75, 0.5 1, 0 0.75, 0 0.25"/>
        </clipPath>
      </defs>
    </svg>
    <div style="width: 100%; height: 100%; background-color: #6366F1; clip-path: url(#hexClip);"></div>
  </body>
</html>
