<!DOCTYPE html>
<html>
  <head><title>flex-shrink zero</title></head>
  <body style="width: 260px; height: 80px; padding: 8px;">
    <div style="display: flex; gap: 8px; width: 100%;">
      <div style="flex-shrink: 0; width: 80px; height: 60px; background-color: #6366F1;"></div>
      <div style="flex: 1; height: 60px; background-color: #8B5CF6;"></div>
    </div>
  </body>
</html>
