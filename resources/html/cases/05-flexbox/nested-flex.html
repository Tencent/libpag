<!DOCTYPE html>
<html>
  <head><title>nested flex</title></head>
  <body style="width: 240px; height: 120px; padding: 8px;">
    <div style="display: flex; flex-direction: column; width: 100%; gap: 8px;">
      <div style="display: flex; flex-direction: row; gap: 8px;">
        <div style="flex: 1; height: 40px; background-color: #6366F1;"></div>
        <div style="flex: 1; height: 40px; background-color: #8B5CF6;"></div>
      </div>
      <div style="display: flex; flex-direction: row; gap: 8px;">
        <div style="flex: 1; height: 40px; background-color: #EC4899;"></div>
        <div style="flex: 1; height: 40px; background-color: #F59E0B;"></div>
      </div>
    </div>
  </body>
</html>
