<!DOCTYPE html>
<html>
  <head><title>svg filter blur</title></head>

        <filter id="f"><feGaussianBlur stdDeviation="3"/></filter>

      <rect x="24" y="16" width="80" height="56" rx="12" fill="#6366F1" filter="url(#f)"/>
    </svg>
  </body>
</html>
