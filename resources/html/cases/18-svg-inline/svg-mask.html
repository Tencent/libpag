<!DOCTYPE html>
<html>
  <head><title>svg mask</title></head>
  <body style="width: 120px; height: 120px; display: flex; padding: 16px;">
    <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="m">
          <rect x="0" y="0" width="88" height="88" fill="black"/>
          <circle cx="44" cy="44" r="40" fill="white"/>
        </mask>
      </defs>
      <rect x="0" y="0" width="88" height="88" fill="#EC4899" mask="url(#m)"/>
    </svg>
  </body>
</html>
