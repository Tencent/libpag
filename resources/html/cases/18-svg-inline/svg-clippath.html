<!DOCTYPE html>
<html>
  <head><title>svg clipPath</title></head>
  <body style="width: 120px; height: 120px; display: flex; padding: 16px;">
    <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="c"><circle cx="44" cy="44" r="40"/></clipPath>
      </defs>
      <rect x="0" y="0" width="88" height="88" fill="#6366F1" clip-path="url(#c)"/>
    </svg>
  </body>
</html>
