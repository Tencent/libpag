<!DOCTYPE html>
<html>
  <head><title>svg linear gradient</title></head>
  <body style="width: 160px; height: 120px; display: flex; padding: 16px;">
    <svg width="128" height="88" viewBox="0 0 128 88" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#6366F1"/>
          <stop offset="1" stop-color="#EC4899"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="128" height="88" rx="12" fill="url(#g)"/>
    </svg>
  </body>
</html>
