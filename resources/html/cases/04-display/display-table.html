<!DOCTYPE html>
<html>
  <head><title>display table</title></head>
  <body style="width: 240px; height: 100px; padding: 8px;">
    <div style="display: table; width: 100%;">
      <div style="display: table-row;">
        <div style="display: table-cell; background-color: #6366F1;">A</div>
        <div style="display: table-cell; background-color: #EC4899;">B</div>
      </div>
    </div>
  </body>
</html>
