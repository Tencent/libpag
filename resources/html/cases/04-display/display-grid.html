<!DOCTYPE html>
<html>
  <head><title>display grid</title></head>
  <body style="width: 220px; height: 220px; padding: 8px;">
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">
      <div style="height: 90px; background-color: #6366F1;"></div>
      <div style="height: 90px; background-color: #8B5CF6;"></div>
      <div style="height: 90px; background-color: #EC4899;"></div>
      <div style="height: 90px; background-color: #F59E0B;"></div>
    </div>
  </body>
</html>
