<!DOCTYPE html>
<html>
  <head><title>grid auto-fit minmax</title></head>
  <body style="width: 300px; height: 120px; padding: 8px;">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px;">
      <div style="height: 50px; background-color: #6366F1;"></div>
      <div style="height: 50px; background-color: #8B5CF6;"></div>
      <div style="height: 50px; background-color: #EC4899;"></div>
      <div style="height: 50px; background-color: #F59E0B;"></div>
      <div style="height: 50px; background-color: #10B981;"></div>
      <div style="height: 50px; background-color: #0EA5E9;"></div>
    </div>
  </body>
</html>
