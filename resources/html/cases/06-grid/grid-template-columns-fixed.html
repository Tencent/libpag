<!DOCTYPE html>
<html>
  <head><title>grid-template-columns fixed</title></head>
  <body style="width: 240px; height: 100px; padding: 8px;">
    <div style="display: grid; grid-template-columns: 80px 80px 80px; gap: 8px; height: 84px;">
      <div style="background-color: #6366F1;"></div>
      <div style="background-color: #8B5CF6;"></div>
      <div style="background-color: #EC4899;"></div>
    </div>
  </body>
</html>
