<!DOCTYPE html>
<html>
  <head><title>grid-column span</title></head>
  <body style="width: 240px; height: 120px; padding: 8px;">
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
      <div style="grid-column: span 2; height: 48px; background-color: #6366F1;"></div>
      <div style="height: 48px; background-color: #8B5CF6;"></div>
      <div style="height: 48px; background-color: #EC4899;"></div>
    </div>
  </body>
</html>
