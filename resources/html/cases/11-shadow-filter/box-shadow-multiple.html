<!DOCTYPE html>
<html>
  <head><title>box-shadow multiple</title></head>
  <body style="width: 200px; height: 140px; display: flex; padding: 24px; background-color: #F1F5F9;">
    <div style="width: 100%; height: 100%; border-radius: 12px; background-color: #FFFFFF; box-shadow: 0 1px 2px #00000022, 0 8px 16px #00000022;"></div>
  </body>
</html>
