<!DOCTYPE html>
<html>
  <head><title>single line ellipsis trick</title></head>
  <body style="width: 180px; height: 50px; padding: 12px;">
    <p style="width: 100%; font-size: 16px; color: #1E293B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">A long single line clipped by overflow hidden</p>
  </body>
</html>
