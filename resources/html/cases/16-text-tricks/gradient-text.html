<!DOCTYPE html>
<html>
  <head><title>gradient text</title></head>
  <body style="width: 300px; height: 70px; padding: 12px;">
    <p style="width: 100%; font-size: 36px; font-weight: bold; background-image: linear-gradient(135deg, #6366F1, #06B6D4); -webkit-background-clip: text; background-clip: text; color: transparent;">Aurora</p>
  </body>
</html>
