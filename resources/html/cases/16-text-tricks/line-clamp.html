<!DOCTYPE html>
<html>
  <head><title>-webkit-line-clamp (unsupported)</title></head>
  <body style="width: 220px; height: 80px; padding: 12px;">
    <p style="width: 100%; font-size: 15px; color: #1E293B; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">This paragraph is clamped to two lines with an ellipsis in real browsers but the importer does not support multi-line clamp.</p>
  </body>
</html>
