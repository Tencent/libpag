<!DOCTYPE html>
<html>
  <head><title>absolute center via translate</title></head>
  <body style="width: 200px; height: 140px; display: flex; background-color: #E2E8F0;">
    <div style="position: absolute; left: 50%; top: 50%; width: 80px; height: 60px; transform: translate(-50%, -50%); background-color: #6366F1;"></div>
  </body>
</html>
