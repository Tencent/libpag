<!DOCTYPE html>
<html>
  <head><title>z-index stacking</title></head>
  <body style="width: 200px; height: 140px; background-color: #E2E8F0;">
    <div style="position: absolute; left: 20px; top: 20px; width: 100px; height: 80px; z-index: 1; background-color: #6366F1;"></div>
    <div style="position: absolute; left: 60px; top: 50px; width: 100px; height: 80px; z-index: 2; background-color: #EC4899;"></div>
  </body>
</html>
