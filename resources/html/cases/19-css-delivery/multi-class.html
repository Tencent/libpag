<!DOCTYPE html>
<html>
  <head>
    <title>multiple classes on one element</title>
    <style>
      .card { width: 100%; height: 100%; border-radius: 12px; background-color: #FFFFFF; }
      .shadow { box-shadow: 0 4px 12px #00000022; }
    </style>
  </head>
  <body style="width: 200px; height: 120px; display: flex; padding: 20px; background-color: #F1F5F9;">
    <div class="card shadow"></div>
  </body>
</html>
