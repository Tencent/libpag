<!DOCTYPE html>
<html>
  <head><title>text-overflow ellipsis</title></head>
  <body style="width: 180px; height: 50px; padding: 12px;">
    <p style="width: 100%; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #1E293B;">A very long single line that should be truncated with an ellipsis</p>
  </body>
</html>
